                    <div><label className="text-xs text-secondary mb-1 block">Last Name</label><input value={formData.last_name} onChange={e => setFormData({...formData, last_name: e.target.value})} className="input-glass w-full" required /></div>
                  </div>
                  <div><label className="text-xs text-secondary mb-1 block">Email</label><input type="email" value={formData.email} onChange={e => setFormData({...formData, email: e.target.value})} className="input-glass w-full" /></div>
                  <div><label className="text-xs text-secondary mb-1 block">Phone</label><input value={formData.phone} onChange={e => setFormData({...formData, phone: e.target.value})} className="input-glass w-full" /></div>
                  <div><label className="text-xs text-secondary mb-1 block">Address</label><input value={formData.address_street} onChange={e => setFormData({...formData, address_street: e.target.value})} className="input-glass w-full" /></div>
                  <div className="grid grid-cols-3 gap-3">
                    <input className="input-glass" placeholder="City" value={formData.address_city} onChange={e => setFormData({...formData, address_city: e.target.value})} />
                    <input className="input-glass" placeholder="State" value={formData.address_state} onChange={e => setFormData({...formData, address_state: e.target.value})} />
                    <input className="input-glass" placeholder="ZIP" value={formData.address_zip} onChange={e => setFormData({...formData, address_zip: e.target.value})} />
                  </div>

                  {/* Add to pipeline option */}
                  <div className="glass p-3" style={{background:'#FFF5F0'}}>
                    <label className="flex items-center gap-2 cursor-pointer">
                      <input type="checkbox" className="checkbox-glass" checked={formData.add_to_pipeline} onChange={e => setFormData({...formData, add_to_pipeline: e.target.checked})} />
                      <span className="text-sm font-medium">Add to pipeline</span>
                    </label>
                    {formData.add_to_pipeline && (
                      <div className="grid grid-cols-2 gap-2 mt-3">
                        <div><label className="text-xs text-secondary mb-1 block">Stage</label>
                          <select value={formData.pipeline_stage_id} onChange={e => setFormData({...formData, pipeline_stage_id: e.target.value})} className="input-glass w-full text-xs">
                            <option value="">Select stage...</option>
                            {stages.map(s => <option key={s.id} value={s.id}>{s.name}</option>)}
                          </select>
                        </div>
                        <div><label className="text-xs text-secondary mb-1 block">Type</label>
                          <select value={formData.lead_type} onChange={e => setFormData({...formData, lead_type: e.target.value})} className="input-glass w-full text-xs">
                            <option value="buyer">Buyer</option><option value="seller">Seller</option><option value="both">Both</option><option value="investor">Investor</option>
                          </select>
                        </div>
                      </div>
                    )}
                  </div>

                  <div className="flex gap-3 pt-2">
                    <button type="button" onClick={() => setShowAddForm(false)} className="btn-secondary flex-1">Cancel</button>
                    <button type="submit" className="btn-primary flex-1">Add Contact</button>
                  </div>
                </form>
              </div>
            </div>
          )}

          {/* Contact list */}
          <div className="flex-1 overflow-y-auto">
            <div className="grid grid-cols-1 gap-2">
              {filtered.map(contact => {
                const inPipeline = contact.pipeline_stage_id && !contact.pipeline_archived;
                return (
                  <div key={contact.id} className="glass-hover p-3 cursor-pointer" onClick={() => openContactDetail(contact)}>
                    <div className="flex items-center gap-3">
                      <div className="w-10 h-10 rounded-full flex items-center justify-center text-white font-semibold text-sm flex-shrink-0" style={{background: 'linear-gradient(135deg, #7F1330, #B72552)'}}>
                        {(contact.first_name?.[0] || '')}{(contact.last_name?.[0] || '')}
                      </div>
                      <div className="flex-1 min-w-0">
                        <div className="flex items-center gap-2 mb-0.5">
                          <p className="font-semibold text-sm">{contact.first_name} {contact.last_name}</p>
                          <span className="text-xs px-1.5 py-0.5 rounded-full text-white" style={{background: typeColor(contact.contact_type), fontSize:10}}>{contact.contact_type}</span>
                          {inPipeline && (
                            <span className="text-xs px-1.5 py-0.5 rounded-full" style={{background: (contact.pipeline_stages?.color || '#8b5cf6') + '20', color: contact.pipeline_stages?.color || '#8b5cf6', fontSize:10}}>
                              {contact.pipeline_stages?.name}
                            </span>
                          )}
                          {contact.temperature && inPipeline && (
                            <span className="text-xs" style={{color: contact.temperature === 'hot' ? '#ef4444' : contact.temperature === 'warm' ? '#f59e0b' : '#6b7280', fontSize:10}}>{contact.temperature}</span>
                          )}
                        </div>
                        <div className="flex items-center gap-3 text-xs text-secondary">
                          {contact.email && <span>{contact.email}</span>}
                          {contact.phone && <span>{contact.phone}</span>}
                        </div>
                      </div>
                    </div>
                  </div>
                );
              })}
            </div>
          </div>

          {/* Edit modal (from list) */}
          {editingContact && !selectedContact && (
            <div className="fixed inset-0 bg-black/20 z-[999] flex items-center justify-center" onClick={() => setEditingContact(null)}>
              <div className="bg-white rounded-2xl p-6 max-w-lg w-full mx-4 max-h-[85vh] overflow-y-auto border border-[#F0D5CC] shadow-lg" onClick={e => e.stopPropagation()}>
                <h3 className="text-lg font-semibold mb-6">Edit Contact</h3>
                <form onSubmit={(e) => { e.preventDefault(); handleUpdateContact(); }} className="space-y-4">
                  <div className="grid grid-cols-2 gap-3">
                    <div><label className="text-xs text-secondary mb-1 block">First Name</label><input value={editingContact.first_name || ''} onChange={e => setEditingContact({...editingContact, first_name: e.target.value})} className="input-glass w-full" /></div>
                    <div><label className="text-xs text-secondary mb-1 block">Last Name</label><input value={editingContact.last_name || ''} onChange={e => setEditingContact({...editingContact, last_name: e.target.value})} className="input-glass w-full" /></div>
                  </div>
                  <div><label className="text-xs text-secondary mb-1 block">Email</label><input type="email" value={editingContact.email || ''} onChange={e => setEditingContact({...editingContact, email: e.target.value})} className="input-glass w-full" /></div>
                  <div><label className="text-xs text-secondary mb-1 block">Phone</label><input value={editingContact.phone || ''} onChange={e => setEditingContact({...editingContact, phone: e.target.value})} className="input-glass w-full" /></div>
                  <div className="flex gap-3 pt-2">
                    <button type="button" onClick={() => setEditingContact(null)} className="btn-secondary flex-1">Cancel</button>
                    <button type="submit" className="btn-primary flex-1">Save</button>
                  </div>
                </form>
              </div>
            </div>
          )}
        </div>
      );
    }

    // COMMS HUB
    function CommsHub() {
      const [activeTab, setActiveTab] = useState('inbox');
      const [communications, setCommunications] = useState([]);
      const [contacts, setContacts] = useState([]);
      const [drafts, setDrafts] = useState([]);
      const [inboxEmails, setInboxEmails] = useState([]);
      const [inboxLoading, setInboxLoading] = useState(false);
      const [inboxLoadingMore, setInboxLoadingMore] = useState(false);
      const [inboxNextPage, setInboxNextPage] = useState(null);
      const inboxScrollRef = React.useRef(null);
      const [selectedEmail, setSelectedEmail] = useState(null);
      const [emailBody, setEmailBody] = useState('');
      const [loadingBody, setLoadingBody] = useState(false);
      const [showCompose, setShowCompose] = useState(false);
      const [showLogForm, setShowLogForm] = useState(false);
      const [editingDraft, setEditingDraft] = useState(null);
      const [composeData, setComposeData] = useState({ to: '', subject: '', body: '', contact_id: '' });
      const [logData, setLogData] = useState({ contact_id: '', channel: 'call', direction: 'outbound', subject: '', body: '' });

      const gmailOk = window.__amyCRM?.gmailConnected;

      useEffect(() => {
        fetchAll();
        const h = () => fetchAll();
        window.addEventListener('crm-data-changed', h);
        return () => window.removeEventListener('crm-data-changed', h);
      }, []);

      useEffect(() => {
        if (activeTab === 'inbox' && gmailOk) fetchInbox();
      }, [activeTab, gmailOk]);

      const fetchAll = async () => {
        const [commsRes, contactsRes, draftsRes] = await Promise.all([
          supabase.from('communications').select('*, contacts(*)').order('sent_at', {ascending: false}).limit(50),
          supabase.from('contacts').select('id, first_name, last_name, email'),
          supabase.from('drafts').select('*, contacts(*)').in('status', ['pending','approved']).order('created_at', {ascending: false})
        ]);
        if (commsRes.data) setCommunications(commsRes.data);
        if (contactsRes.data) setContacts(contactsRes.data);
        if (draftsRes.data) setDrafts(draftsRes.data);
      };

      const fetchInbox = async (loadMore = false) => {
        if (!window.__amyCRM?.userId) return;
        if (loadMore) { setInboxLoadingMore(true); } else { setInboxLoading(true); }
        try {
          const res = await fetch(SUPABASE_URL + '/functions/v1/gmail', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'apikey': SUPABASE_ANON_KEY },
            body: JSON.stringify({ action: 'list_emails', user_id: window.__amyCRM.userId, max_results: 20, page_token: loadMore ? inboxNextPage : undefined })
          });
          const data = await res.json();
          if (data.emails) {
            if (loadMore) { setInboxEmails(prev => [...prev, ...data.emails]); } else { setInboxEmails(data.emails); }
            setInboxNextPage(data.nextPageToken || null);
          }
        } catch (err) { console.error('Inbox fetch error:', err); }
        if (loadMore) { setInboxLoadingMore(false); } else { setInboxLoading(false); }
      };

      // Infinite scroll handler
      const handleInboxScroll = (e) => {
        const el = e.target;
        if (el.scrollHeight - el.scrollTop - el.clientHeight < 100 && inboxNextPage && !inboxLoadingMore) {
          fetchInbox(true);
        }
      };

      const openEmail = async (email) => {
        setSelectedEmail(email);
        setEmailBody('');
        setLoadingBody(true);
        try {
          const res = await fetch(SUPABASE_URL + '/functions/v1/gmail', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'apikey': SUPABASE_ANON_KEY },
            body: JSON.stringify({ action: 'get_email', user_id: window.__amyCRM.userId, message_id: email.id })
          });
          const data = await res.json();
          setEmailBody(data.body || data.snippet || '(No content)');
        } catch (err) { setEmailBody('Error loading email.'); }
        setLoadingBody(false);
      };

      const handleCompose = async (e) => {
        e.preventDefault();
        if (!gmailOk) { alert('Connect Gmail first.'); return; }
        try {
          const res = await fetch(SUPABASE_URL + '/functions/v1/gmail', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'apikey': SUPABASE_ANON_KEY },
            body: JSON.stringify({ action: 'send_email', user_id: window.__amyCRM.userId, to: composeData.to, subject: composeData.subject, email_body: composeData.body })
          });
          const data = await res.json();
          if (data.success) {
            // Log it
            if (composeData.contact_id) {
              await supabase.from('communications').insert([{ contact_id: composeData.contact_id, channel: 'email', direction: 'outbound', subject: composeData.subject, body: composeData.body, sent_at: new Date().toISOString() }]);
            }
            setShowCompose(false);
            setComposeData({ to: '', subject: '', body: '', contact_id: '' });
            fetchAll();
            alert('Email sent!');
          } else { alert('Send failed: ' + (data.error || 'Unknown')); }
        } catch (err) { alert('Error: ' + err.message); }
      };

      const handleSendDraft = async (draft) => {
        if (window.__amyCRM?.sendDraftEmail) window.__amyCRM.sendDraftEmail(draft);
        setTimeout(fetchAll, 1500);
      };

      const handleDiscardDraft = async (id) => {
        await supabase.from('drafts').update({ status: 'discarded' }).eq('id', id);
        fetchAll();
      };

      const handleApproveDraft = async (id) => {
        await supabase.from('drafts').update({ status: 'approved' }).eq('id', id);
        fetchAll();
      };

      const handleSaveDraftEdit = async () => {
        if (!editingDraft) return;
        await supabase.from('drafts').update({ subject: editingDraft.subject, body: editingDraft.body }).eq('id', editingDraft.id);
        setEditingDraft(null);
        fetchAll();
      };

      const handleLogComm = async (e) => {
        e.preventDefault();
        await supabase.from('communications').insert([{ ...logData, sent_at: new Date().toISOString() }]);
        setShowLogForm(false);
        setLogData({ contact_id: '', channel: 'call', direction: 'outbound', subject: '', body: '' });
        fetchAll();
      };

      const contactSelect = (val, setter, data) => (
        <select value={val} onChange={(e) => { setter(prev => ({...prev, contact_id: e.target.value})); const c = contacts.find(x => x.id === e.target.value); if (c?.email && data === 'compose') setter(prev => ({...prev, to: c.email})); }} className="input-glass w-full">
          <option value="">Select contact...</option>
          {contacts.map(c => <option key={c.id} value={c.id}>{c.first_name} {c.last_name}</option>)}
        </select>
      );

      const channelBadge = (ch) => {
        const bg = { email:'#FFF0EC', sms:'#FFEEE3', call:'#E0F0F2', in_person:'#FFF5F0' };
        const fg = { email:'#7F1330', sms:'#7A5A5A', call:'#003744', in_person:'#FE8982' };
        return <span className="badge" style={{backgroundColor: bg[ch], color: fg[ch]}}>{ch}</span>;
      };

      const parseFrom = (from) => {
        if (!from) return { name: 'Unknown', email: '' };
        const match = from.match(/^(.+?)\s*<(.+?)>$/);
        return match ? { name: match[1].replace(/"/g,''), email: match[2] } : { name: from, email: from };
      };

      const formatDate = (d) => {
        if (!d) return '';
        const date = new Date(d);
        const today = new Date();
        if (date.toDateString() === today.toDateString()) return date.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
        return date.toLocaleDateString([], {month:'short', day:'numeric'});
      };

      const tabCounts = { inbox: inboxEmails.length, drafts: drafts.length, log: communications.length };

      return (
        <div className="flex-1 flex flex-col p-3 sm:p-6 overflow-hidden min-h-0">
          {/* Header */}
          <div className="flex justify-between items-center mb-4">
            <h2 className="text-lg font-semibold">Communications</h2>
            <div className="flex gap-2">
              <button onClick={() => setShowLogForm(true)} className="btn-secondary text-xs">+ Log</button>
              <button onClick={() => { setShowCompose(true); setComposeData({ to:'', subject:'', body:'', contact_id:'' }); }} className="btn-primary text-xs" style={{opacity: gmailOk ? 1 : 0.5}}>
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="inline mr-1"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
                Compose
              </button>
            </div>
          </div>

          {/* Gmail status bar */}
          <div className="flex items-center gap-2 mb-4 px-3 py-2 rounded-xl" style={{backgroundColor: gmailOk ? '#F0FFF0' : '#FFF5F0'}}>
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke={gmailOk ? '#2D6A2D' : '#7A5A5A'} strokeWidth="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
            {gmailOk ? (
              <span className="text-xs"><span style={{color:'#2D6A2D'}}>Gmail connected</span> <span className="text-secondary">({window.__amyCRM?.gmailEmail})</span></span>
            ) : (
              <span className="text-xs text-secondary">Gmail not connected — <button onClick={() => window.__amyCRM?.connectGmail()} className="underline" style={{color:'#7F1330'}}>Connect now</button></span>
            )}
          </div>

          {/* Tabs */}
          <div className="flex gap-1 mb-4 border-b border-[#F0D5CC]">
            {[
              { id:'inbox', label:'Inbox', count: tabCounts.inbox },
              { id:'drafts', label:'Drafts', count: tabCounts.drafts },
              { id:'log', label:'Activity Log', count: tabCounts.log }
            ].map(t => (
              <button key={t.id} onClick={() => setActiveTab(t.id)} className="px-4 py-2 text-xs font-medium transition-all" style={{ borderBottom: activeTab===t.id ? '2px solid #7F1330' : '2px solid transparent', color: activeTab===t.id ? '#7F1330' : '#7A5A5A' }}>
                {t.label} {t.count > 0 && <span className="ml-1 px-1.5 py-0.5 rounded-full text-xs" style={{backgroundColor: activeTab===t.id ? '#FFF0EC' : '#F5F5F5'}}>{t.count}</span>}
              </button>
            ))}
          </div>

          {/* Tab Content */}
          <div className="flex-1 overflow-y-auto">

            {/* INBOX TAB */}
            {activeTab === 'inbox' && (
              <div>
                {!gmailOk ? (
                  <div className="text-center py-12">
                    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#F0D5CC" strokeWidth="1.5" className="mx-auto mb-4"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
                    <p className="text-secondary text-sm mb-3">Connect Gmail to see your inbox here</p>
                    <button onClick={() => window.__amyCRM?.connectGmail()} className="btn-primary text-sm">Connect Gmail</button>
                  </div>
                ) : inboxLoading ? (
                  <div className="text-center py-12"><p className="text-secondary text-sm">Loading inbox...</p></div>
                ) : selectedEmail ? (
                  <div>
                    <button onClick={() => { setSelectedEmail(null); setEmailBody(''); }} className="text-xs text-secondary mb-3 hover:underline flex items-center gap-1">
                      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg> Back to inbox
                    </button>
                    <div className="glass p-5">
                      <h3 className="font-semibold text-sm mb-1">{selectedEmail.subject || '(No subject)'}</h3>
                      <div className="flex justify-between items-center mb-4">
                        <p className="text-xs text-secondary">From: <span className="font-medium" style={{color:'#2D2D2D'}}>{parseFrom(selectedEmail.from).name}</span> &lt;{parseFrom(selectedEmail.from).email}&gt;</p>
                        <p className="text-xs text-secondary">{selectedEmail.date}</p>
                      </div>
                      {selectedEmail.isUnread && <span className="badge mb-3 inline-block" style={{backgroundColor:'#7F1330', color:'white'}}>Unread</span>}
                      <div className="border-t border-[#F0D5CC] pt-4 mt-2">
                        {loadingBody ? <p className="text-xs text-secondary">Loading...</p> : (
                          <div className="text-sm whitespace-pre-wrap" style={{maxHeight:'400px', overflowY:'auto', lineHeight:'1.6'}}>{emailBody}</div>
                        )}
                      </div>
                      <div className="mt-4 pt-3 border-t border-[#F0D5CC] flex gap-2">
                        <button onClick={() => { setShowCompose(true); setComposeData({ to: parseFrom(selectedEmail.from).email, subject: 'Re: ' + (selectedEmail.subject||''), body: '', contact_id: '' }); }} className="btn-primary text-xs">Reply</button>
                      </div>
                    </div>
                  </div>
                ) : (
                  <div className="space-y-1" onScroll={handleInboxScroll} ref={inboxScrollRef} style={{maxHeight:'calc(100vh - 320px)', overflowY:'auto'}}>
                    <div className="flex justify-between items-center mb-2">
                      <span className="text-xs text-secondary">{inboxEmails.length} emails loaded</span>
                      <button onClick={() => fetchInbox(false)} className="text-xs text-secondary hover:underline">Refresh</button>
                    </div>
                    {inboxEmails.map(email => {
                      const sender = parseFrom(email.from);
                      return (
                        <div key={email.id} onClick={() => openEmail(email)} className="flex items-start gap-3 p-3 rounded-xl cursor-pointer hover:bg-[#FFF5F0] transition-all" style={{backgroundColor: email.isUnread ? '#FFEEE3' : 'transparent'}}>
                          <div className="w-8 h-8 rounded-full flex-shrink-0 flex items-center justify-center text-xs font-semibold text-white" style={{backgroundColor:'#7F1330'}}>
                            {sender.name.charAt(0).toUpperCase()}
                          </div>
                          <div className="flex-1 min-w-0">
                            <div className="flex justify-between items-center mb-0.5">
                              <p className="text-xs font-semibold truncate" style={{fontWeight: email.isUnread ? 600 : 400}}>{sender.name}</p>
                              <span className="text-xs text-secondary flex-shrink-0 ml-2">{formatDate(email.date)}</span>
                            </div>
                            <p className="text-xs truncate" style={{fontWeight: email.isUnread ? 600 : 400, color:'#2D2D2D'}}>{email.subject || '(No subject)'}</p>
                            <p className="text-xs text-secondary truncate mt-0.5">{email.snippet}</p>
                          </div>
                        </div>
                      );
                    })}
                    {inboxLoadingMore && <div className="text-center py-4"><p className="text-xs text-secondary">Loading more emails...</p></div>}
                    {!inboxNextPage && inboxEmails.length > 0 && <div className="text-center py-4"><p className="text-xs text-secondary">You've reached the end</p></div>}
                    {inboxEmails.length === 0 && <p className="text-center text-secondary text-sm py-8">No emails found.</p>}
                  </div>
                )}
              </div>
            )}

            {/* DRAFTS TAB */}
            {activeTab === 'drafts' && (
              <div className="space-y-3">
                {drafts.length === 0 ? (
                  <div className="text-center py-12">
                    <p className="text-secondary text-sm mb-2">No pending drafts</p>
                    <p className="text-xs text-secondary">Ask the Assistant to draft an email or text for a client.</p>
                  </div>
                ) : drafts.map(d => (
                  <div key={d.id} className="glass p-4">
                    <div className="flex justify-between items-start mb-2">
                      <div className="flex-1 min-w-0">
                        <div className="flex items-center gap-2 mb-1">
                          {channelBadge(d.channel)}
                          <span className="badge" style={{backgroundColor: d.status==='approved' ? '#E8F5E8' : '#FFF5F0', color: d.status==='approved' ? '#2D6A2D' : '#7A5A5A'}}>{d.status}</span>
                        </div>
                        <p className="font-semibold text-sm">{d.contacts?.first_name} {d.contacts?.last_name}</p>
                        {d.subject && <p className="text-xs text-secondary">{d.subject}</p>}
                      </div>
                      <span className="text-xs text-secondary flex-shrink-0">{new Date(d.created_at).toLocaleDateString()}</span>
                    </div>
                    <p className="text-xs mt-2 p-2 rounded-lg" style={{backgroundColor:'#FFF5F0', lineHeight:'1.5'}}>{d.body}</p>
                    <div className="flex gap-2 mt-3">
                      <button onClick={() => setEditingDraft({...d})} className="text-xs px-3 py-1.5 rounded-lg" style={{backgroundColor:'#FFEEE3', color:'#7A5A5A'}}>Edit</button>
                      {d.channel === 'email' && gmailOk && (
                        <button onClick={() => handleSendDraft(d)} className="text-xs px-3 py-1.5 rounded-lg text-white" style={{backgroundColor:'#003744'}}>Send via Gmail</button>
                      )}
                      {d.status === 'pending' && (
                        <button onClick={() => handleApproveDraft(d.id)} className="text-xs px-3 py-1.5 rounded-lg" style={{backgroundColor:'#E8F5E8', color:'#2D6A2D'}}>Approve</button>
                      )}
                      <button onClick={() => handleDiscardDraft(d.id)} className="text-xs px-3 py-1.5 rounded-lg" style={{backgroundColor:'#FFE8E8', color:'#D32F2F'}}>Discard</button>
                    </div>
                  </div>
                ))}
              </div>
            )}

            {/* ACTIVITY LOG TAB */}
            {activeTab === 'log' && (
              <div className="space-y-2">
                {communications.map(comm => (
                  <div key={comm.id} className="glass p-4">
                    <div className="flex justify-between items-start mb-1">
                      <div className="flex-1">
                        <p className="font-semibold text-sm">{comm.contacts?.first_name} {comm.contacts?.last_name}</p>
                        <p className="text-secondary text-xs mt-0.5">{comm.subject || comm.body?.substring(0, 80)}</p>
                      </div>
                      <div className="flex items-center gap-2 flex-shrink-0">
                        {channelBadge(comm.channel)}
                        <span className="text-xs px-2 py-0.5 rounded-full" style={{backgroundColor: comm.direction==='outbound' ? '#E0F0F2' : '#FFEEE3', color: comm.direction==='outbound' ? '#003744' : '#7A5A5A'}}>{comm.direction}</span>
                      </div>
                    </div>
                    <p className="text-xs text-secondary mt-1">{new Date(comm.sent_at).toLocaleDateString()} at {new Date(comm.sent_at).toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})}</p>
                  </div>
                ))}
                {communications.length === 0 && <p className="text-center text-secondary text-sm py-8">No communications logged yet.</p>}
              </div>
            )}
          </div>

          {/* COMPOSE MODAL */}
          {showCompose && (
            <div className="fixed inset-0 bg-black/20 z-[999] flex items-center justify-center">
              <div className="bg-white rounded-2xl p-6 max-w-lg w-full mx-4 border border-[#F0D5CC] shadow-lg">
                <div className="flex justify-between items-center mb-4">
                  <h3 className="text-lg font-semibold">Compose Email</h3>
                  {!gmailOk && <span className="text-xs px-2 py-1 rounded-lg" style={{backgroundColor:'#FFE8E8', color:'#D32F2F'}}>Gmail not connected</span>}
                </div>
                <form onSubmit={handleCompose} className="space-y-3">
                  <div>
                    <label className="text-xs text-secondary mb-1 block">Contact (optional — auto-fills To)</label>
                    {contactSelect(composeData.contact_id, setComposeData, 'compose')}
                  </div>
                  <div>
                    <label className="text-xs text-secondary mb-1 block">To</label>
                    <input type="email" value={composeData.to} onChange={(e) => setComposeData({...composeData, to: e.target.value})} className="input-glass w-full" required placeholder="email@example.com" />
                  </div>
                  <div>
                    <label className="text-xs text-secondary mb-1 block">Subject</label>
                    <input type="text" value={composeData.subject} onChange={(e) => setComposeData({...composeData, subject: e.target.value})} className="input-glass w-full" required />
                  </div>
                  <div>
                    <label className="text-xs text-secondary mb-1 block">Message</label>
                    <textarea value={composeData.body} onChange={(e) => setComposeData({...composeData, body: e.target.value})} className="input-glass w-full h-32 resize-none" required />
                  </div>
                  <div className="flex gap-3 pt-2">
                    <button type="button" onClick={() => setShowCompose(false)} className="btn-secondary flex-1">Cancel</button>
                    <button type="submit" className="btn-primary flex-1" disabled={!gmailOk}>Send</button>
                  </div>
                </form>
              </div>
            </div>
          )}

          {/* LOG COMMUNICATION MODAL */}
          {showLogForm && (
            <div className="fixed inset-0 bg-black/20 z-[999] flex items-center justify-center">
              <div className="bg-white rounded-2xl p-6 max-w-lg w-full mx-4 border border-[#F0D5CC] shadow-lg">
                <h3 className="text-lg font-semibold mb-4">Log Communication</h3>
                <form onSubmit={handleLogComm} className="space-y-3">
                  <div>
                    <label className="text-xs text-secondary mb-1 block">Contact</label>
                    {contactSelect(logData.contact_id, setLogData, 'log')}
                  </div>
                  <div className="grid grid-cols-2 gap-3">
                    <div>
                      <label className="text-xs text-secondary mb-1 block">Channel</label>
                      <select value={logData.channel} onChange={(e) => setLogData({...logData, channel: e.target.value})} className="input-glass w-full">
                        <option value="email">Email</option>
                        <option value="sms">SMS</option>
                        <option value="call">Call</option>
                        <option value="in_person">In Person</option>
                      </select>
                    </div>
                    <div>
                      <label className="text-xs text-secondary mb-1 block">Direction</label>
                      <select value={logData.direction} onChange={(e) => setLogData({...logData, direction: e.target.value})} className="input-glass w-full">
                        <option value="outbound">Outbound</option>
                        <option value="inbound">Inbound</option>
                      </select>
                    </div>
                  </div>
                  <input type="text" placeholder="Subject (optional)" value={logData.subject} onChange={(e) => setLogData({...logData, subject: e.target.value})} className="input-glass w-full" />
                  <textarea placeholder="Notes" value={logData.body} onChange={(e) => setLogData({...logData, body: e.target.value})} className="input-glass w-full h-20 resize-none" />
                  <div className="flex gap-3 pt-2">
                    <button type="button" onClick={() => setShowLogForm(false)} className="btn-secondary flex-1">Cancel</button>
                    <button type="submit" className="btn-primary flex-1">Log</button>

              </div>

          {/* EDIT DRAFT MODAL */}
          {editingDraft && (
            <div className="fixed inset-0 bg-black/20 z-[999] flex items-center justify-center">
              <div className="bg-white rounded-2xl p-6 max-w-lg w-full mx-4 border border-[#F0D5CC] shadow-lg">
                <h3 className="text-lg font-semibold mb-4">Edit Draft</h3>
                <div className="space-y-3">
                  <p className="text-xs text-secondary">To: {editingDraft.contacts?.first_name} {editingDraft.contacts?.last_name}</p>
                  {editingDraft.channel === 'email' && (
                    <input type="text" value={editingDraft.subject || ''} onChange={(e) => setEditingDraft({...editingDraft, subject: e.target.value})} className="input-glass w-full" placeholder="Subject" />
                  )}
                  <textarea value={editingDraft.body} onChange={(e) => setEditingDraft({...editingDraft, body: e.target.value})} className="input-glass w-full h-32 resize-none" />
                  <div className="flex gap-3 pt-2">
                    <button onClick={() => setEditingDraft(null)} className="btn-secondary flex-1">Cancel</button>
                    <button onClick={handleSaveDraftEdit} className="btn-primary flex-1">Save</button>
                  </div>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    // TASKS
    function Tasks() {
      const [tasks, setTasks] = useState([]);
      const [contacts, setContacts] = useState([]);
      const [showAddForm, setShowAddForm] = useState(false);
      const [formData, setFormData] = useState({
        contact_id: '', title: '', description: '',
        task_type: 'follow_up', priority: 'medium', due_date: ''
      });

      useEffect(() => {
        fetchTasksAndContacts();
        const handleRefresh = () => fetchTasksAndContacts();
        window.addEventListener('crm-data-changed', handleRefresh);
        return () => window.removeEventListener('crm-data-changed', handleRefresh);
      }, []);

      const fetchTasksAndContacts = async () => {
        try {
          const [tasksRes, contactsRes] = await Promise.all([
            supabase.from('tasks').select('*, contacts(*)').order('due_date'),
            supabase.from('contacts').select('id, first_name, last_name')
          ]);
          if (tasksRes.data) setTasks(tasksRes.data);
          if (contactsRes.data) setContacts(contactsRes.data);
        } catch (err) {
          console.error('Error fetching tasks:', err);
        }
      };

      const handleAddTask = async (e) => {
        e.preventDefault();
        try {
          const { data, error } = await supabase.from('tasks').insert([{
            contact_id: formData.contact_id,
            title: formData.title,
            description: formData.description,
            task_type: formData.task_type,
            priority: formData.priority,
            due_date: formData.due_date,
            status: 'pending'
          }]).select();
          if (error) throw error;
          // Auto-sync to Google Calendar if connected and has due date
          if (data?.[0] && data[0].due_date && window.__amyCRM?.gmailConnected) {
            syncTaskToCalendar(data[0].id).then(r => {
              if (r.success) console.log('Task synced to Google Calendar');
              else console.warn('Task calendar sync failed:', r.error);
            });
          }
          setShowAddForm(false);
          setFormData({
            contact_id: '', title: '', description: '',
            task_type: 'follow_up', priority: 'medium', due_date: ''
          });
          fetchTasksAndContacts();
        } catch (err) {
          console.error('Error adding task:', err);
          alert('Error adding task');
        }
      };

      const handleToggleTask = async (taskId, status) => {
        try {
          const newStatus = status === 'completed' ? 'pending' : 'completed';
          const { error } = await supabase
            .from('tasks')
            .update({
              status: newStatus,
              completed_at: newStatus === 'completed' ? new Date().toISOString() : null
            })
            .eq('id', taskId);
          if (error) throw error;
          fetchTasksAndContacts();
        } catch (err) {
          console.error('Error updating task:', err);
        }
      };

      const handleDeleteTask = async (taskId) => {
        if (!window.confirm('Delete this task?')) return;
        try {
          await supabase.from('tasks').delete().eq('id', taskId);
          fetchTasksAndContacts();
        } catch (err) {
          console.error('Error deleting task:', err);
        }
      };

      const priorityColors = {
        urgent: '#B72552',
        high: '#FE8982',
        medium: '#7F1330',
        low: '#FFC6BF'
      };

      const groupedByPriority = {
        urgent: tasks.filter(t => t.priority === 'urgent'),
        high: tasks.filter(t => t.priority === 'high'),
        medium: tasks.filter(t => t.priority === 'medium'),
        low: tasks.filter(t => t.priority === 'low')
      };

      return (
        <div className="flex-1 flex flex-col p-3 sm:p-6 overflow-hidden min-h-0">
          <div className="flex justify-between items-center mb-6">
            <h2 className="text-lg font-semibold">Tasks</h2>
            <button onClick={() => setShowAddForm(true)} className="btn-primary">+ Add Task</button>
          </div>

          {showAddForm && (
            <div className="fixed inset-0 bg-black/20 z-[999] flex items-center justify-center">
              <div className="bg-white rounded-2xl p-8 max-w-lg w-full mx-4 max-h-[85vh] overflow-y-auto border border-[#F0D5CC] shadow-lg">
                <h3 className="text-lg font-semibold mb-6">Add Task</h3>
                <form onSubmit={handleAddTask} className="space-y-4">
                  <input
                    type="text"
                    placeholder="Title"
                    value={formData.title}
                    onChange={(e) => setFormData({...formData, title: e.target.value})}
                    className="input-glass w-full"
                    required
                  />
                  <div>
                    <label className="text-sm text-secondary mb-2 block">Contact</label>
                    <select
                      value={formData.contact_id}
                      onChange={(e) => setFormData({...formData, contact_id: e.target.value})}
                      className="input-glass w-full"
                    >
                      <option value="">Optional</option>
                      {contacts.map(c => (<option key={c.id} value={c.id}>{c.first_name} {c.last_name}</option>))}
                    </select>
                  </div>
                  <div className="grid grid-cols-2 gap-3">
                    <div>
                      <label className="text-sm text-secondary mb-2 block">Priority</label>
                      <select
                        value={formData.priority}
                        onChange={(e) => setFormData({...formData, priority: e.target.value})}
                        className="input-glass w-full"
                      >
                        <option value="urgent">Urgent</option>
                        <option value="high">High</option>
                        <option value="medium">Medium</option>
                        <option value="low">Low</option>
                      </select>
                    </div>
                    <div>
                      <label className="text-sm text-secondary mb-2 block">Due Date</label>
                      <input
                        type="date"
                        value={formData.due_date}
                        onChange={(e) => setFormData({...formData, due_date: e.target.value})}
                        className="input-glass w-full"
                      />
                    </div>
                  </div>
                  <div className="flex gap-3 pt-4">
                    <button type="button" onClick={() => setShowAddForm(false)} className="btn-secondary flex-1">Cancel</button>
                    <button type="submit" className="btn-primary flex-1">Add</button>
                  </div>
                </form>
              </div>
            </div>
          )}

          <div className="flex-1 overflow-y-auto">
            <div className="space-y-6">
              {Object.entries(groupedByPriority).map(([priority, taskList]) => (
                taskList.length > 0 && (
                  <div key={priority}>
                    <h3 className="font-semibold text-sm mb-3" style={{color: priorityColors[priority]}}>
                      {priority.toUpperCase()} ({taskList.length})
                    </h3>
                    <div className="space-y-2">
                      {taskList.map(task => (
                        <div key={task.id} className="glass p-3 flex items-center gap-3">
                          <input
                            type="checkbox"
                            checked={task.status === 'completed'}
                            onChange={() => handleToggleTask(task.id, task.status)}
                            className="checkbox-glass"
                          />
                          <div className="flex-1 min-w-0">
                            <p className={task.status === 'completed' ? 'line-through text-secondary text-sm' : 'text-sm font-medium'}>
                              {task.title}
                            </p>
                            <p className="text-xs text-secondary">
                              {task.contacts?.first_name || 'No contact'} - Due: {task.due_date}
                            </p>
                          </div>
                          {task.due_date && window.__amyCRM?.gmailConnected && (
                            <button onClick={() => syncTaskToCalendar(task.id).then(r => { if(r.success) { alert('Task synced to Google Calendar!'); fetchTasksAndContacts(); } else alert('Sync failed: ' + (r.error||'Unknown')); })} className="text-xs px-2 py-1 rounded-lg hover:bg-gray-100" style={{color: task.gcal_event_id ? '#2D6A2D' : '#003744'}} title={task.gcal_event_id ? 'Re-sync to calendar' : 'Sync to calendar'}>
                              {task.gcal_event_id ? '✓ Cal' : '📅'}
                            </button>
                          )}
                          <button
                            onClick={() => handleDeleteTask(task.id)}
                            className="text-secondary hover:text-[#B72552] text-xs"
                          >
                            Delete
                          </button>
                        </div>
                      ))}
                    </div>
                  </div>
                )
              ))}
            </div>
          </div>
        </div>
      );
    }

    // SHOWINGS (HARDCODED FOR NOW)
    function Showings() {
      const [showings, setShowings] = useState([]);
      const [loading, setLoading] = useState(true);
      const [showAddForm, setShowAddForm] = useState(false);
      const [contacts, setContacts] = useState([]);
      const [formData, setFormData] = useState({ contact_id: '', property_address: '', showing_date: '', showing_time: '', notes: '' });

      useEffect(() => {
        fetchShowings();
        fetchContacts();
        const handleRefresh = () => fetchShowings();
        window.addEventListener('crm-data-changed', handleRefresh);
        return () => window.removeEventListener('crm-data-changed', handleRefresh);
      }, []);

      const fetchShowings = async () => {
        const { data } = await supabase.from('showings').select('*, contacts(first_name, last_name)').order('showing_date', { ascending: false });
        if (data) setShowings(data);
        setLoading(false);
      };

      const fetchContacts = async () => {
        const { data } = await supabase.from('contacts').select('id, first_name, last_name').order('first_name');
        if (data) setContacts(data);
      };

      const addShowing = async (e) => {
        e.preventDefault();
        const { data, error } = await supabase.from('showings').insert([{ ...formData, status: 'scheduled' }]).select();
        if (!error && data?.[0]) {
          // Auto-sync to Google Calendar if connected
          if (window.__amyCRM?.gmailConnected) {
            syncShowingToCalendar(data[0].id).then(r => {
              if (r.success) console.log('Showing synced to Google Calendar');
              else console.warn('Calendar sync failed:', r.error);
            });
          }
          setShowAddForm(false);
          setFormData({ contact_id: '', property_address: '', showing_date: '', showing_time: '', notes: '' });
          fetchShowings();
        }
      };

      const updateStatus = async (id, status) => {
        await supabase.from('showings').update({ status }).eq('id', id);
        fetchShowings();
      };

      const deleteShowing = async (id) => {
        if (!confirm('Delete this showing?')) return;
        await supabase.from('showings').delete().eq('id', id);
        fetchShowings();
      };

      const statusColor = (s) => {
        const map = { scheduled: { bg: '#FFEEE3', text: '#7F1330' }, completed: { bg: '#E0F0E0', text: '#2D6A2D' }, cancelled: { bg: '#FFE0E0', text: '#B72552' }, no_show: { bg: '#F0E0E0', text: '#7A5A5A' } };
        return map[s] || map.scheduled;
      };

      if (loading) return <div className="p-3 sm:p-6"><p className="text-secondary">Loading showings...</p></div>;

      return (
        <div className="flex-1 flex flex-col p-3 sm:p-6 overflow-hidden min-h-0">
          <div className="flex flex-col sm:flex-row sm:items-center justify-between gap-3 mb-4">
            <div>
              <h2 className="text-lg font-semibold" style={{color:'#7F1330'}}>Showings</h2>
              <p className="text-secondary text-xs mt-0.5">{showings.length} total &middot; {showings.filter(s => s.status === 'scheduled').length} upcoming</p>
            </div>
            <button onClick={() => setShowAddForm(true)} className="btn-primary text-xs">+ Add Showing</button>
          </div>

          {showAddForm && (
            <div className="fixed inset-0 bg-black/20 z-[999] flex items-center justify-center">
              <div className="bg-white rounded-2xl p-6 sm:p-8 max-w-lg w-full mx-4 border border-[#F0D5CC] shadow-lg">
                <h3 className="text-lg font-semibold mb-6">Add Showing</h3>
                <form onSubmit={addShowing} className="space-y-4">
                  <div><label className="text-xs font-medium block mb-1" style={{color:'#7A5A5A'}}>Client</label>

                      {s.notes && <p className="text-xs text-secondary mt-1">{s.notes}</p>}

                    <div className="flex items-center gap-2 flex-shrink-0">
                      <select value={s.status} onChange={e => updateStatus(s.id, e.target.value)} className="text-xs rounded-full px-2 py-1 border-0 cursor-pointer" style={{background: sc.bg, color: sc.text}}>

                          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke={s.gcal_event_id ? '#2D6A2D' : '#003744'} strokeWidth="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>
                        </button>

                      <button onClick={() => deleteShowing(s.id)} className="p-1 rounded hover:bg-gray-100">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#B72552" strokeWidth="2"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
                      </button>
                    </div>
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      );
    }

    // CALENDAR MODULE
    function Calendar() {
      const [currentDate, setCurrentDate] = useState(new Date());
      const [showings, setShowings] = useState([]);
      const [tasks, setTasks] = useState([]);
      const [gcalEvents, setGcalEvents] = useState([]);
      const [selectedDate, setSelectedDate] = useState(null);
      const [syncing, setSyncing] = useState(false);
      const [calConnected, setCalConnected] = useState(false);

      useEffect(() => {
        fetchCalendarData();
        const handleRefresh = () => fetchCalendarData();
        window.addEventListener('crm-data-changed', handleRefresh);
        return () => window.removeEventListener('crm-data-changed', handleRefresh);
      }, []);

      useEffect(() => {
        // Fetch Google Calendar events when month changes
        if (window.__amyCRM?.gmailConnected) {
          setCalConnected(true);
          const y = currentDate.getFullYear();
          const m = currentDate.getMonth();
          const timeMin = new Date(y, m, 1).toISOString();
          const timeMax = new Date(y, m + 1, 0, 23, 59, 59).toISOString();
          fetchGoogleCalendarEvents(timeMin, timeMax).then(events => setGcalEvents(events));
        }
      }, [currentDate]);

      const fetchCalendarData = async () => {
        const [showingsRes, tasksRes] = await Promise.all([
          supabase.from('showings').select('*, contacts(first_name, last_name)').order('showing_date'),
          supabase.from('tasks').select('*').not('due_date', 'is', null).order('due_date')
        ]);
        if (showingsRes.data) setShowings(showingsRes.data);
        if (tasksRes.data) setTasks(tasksRes.data);
        if (window.__amyCRM?.gmailConnected) setCalConnected(true);
      };

      const syncAllToCalendar = async () => {
        if (!window.__amyCRM?.gmailConnected) { alert('Connect Gmail first to enable calendar sync.'); return; }
        setSyncing(true);
        let synced = 0;
        // Sync all scheduled showings without gcal_event_id
        const unsyncedShowings = showings.filter(s => !s.gcal_event_id && s.status === 'scheduled');
        for (const s of unsyncedShowings) {
          const r = await syncShowingToCalendar(s.id);
          if (r.success) synced++;
        }
        // Sync all pending tasks with due dates without gcal_event_id
        const unsyncedTasks = tasks.filter(t => !t.gcal_event_id && t.due_date && t.status === 'pending');
        for (const t of unsyncedTasks) {
          const r = await syncTaskToCalendar(t.id);
          if (r.success) synced++;
        }
        setSyncing(false);
        fetchCalendarData();
        // Refresh Google Calendar events
        const y = currentDate.getFullYear();
        const m = currentDate.getMonth();
        const timeMin = new Date(y, m, 1).toISOString();
        const timeMax = new Date(y, m + 1, 0, 23, 59, 59).toISOString();
        fetchGoogleCalendarEvents(timeMin, timeMax).then(events => setGcalEvents(events));
        alert(`Synced ${synced} items to Google Calendar!`);
      };

      const year = currentDate.getFullYear();
      const month = currentDate.getMonth();
      const today = new Date();
      const todayStr = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;

      const firstDay = new Date(year, month, 1).getDay();
      const daysInMonth = new Date(year, month + 1, 0).getDate();
      const monthName = currentDate.toLocaleString('en-US', { month: 'long', year: 'numeric' });

      const prevMonth = () => setCurrentDate(new Date(year, month - 1, 1));
      const nextMonth = () => setCurrentDate(new Date(year, month + 1, 1));
      const goToday = () => setCurrentDate(new Date());

      const getDateStr = (day) => `${year}-${String(month+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;

      // Parse Google Calendar events into date-keyed map
      const gcalByDate = {};
      gcalEvents.forEach(e => {
        const start = typeof e.start === 'string' ? e.start : (e.start?.dateTime || e.start?.date || '');
        const dateKey = start.substring(0, 10);
        if (!gcalByDate[dateKey]) gcalByDate[dateKey] = [];
        gcalByDate[dateKey].push(e);
      });

      const getEventsForDate = (dateStr) => {
        const dayShowings = showings.filter(s => s.showing_date === dateStr);
        const dayTasks = tasks.filter(t => t.due_date === dateStr);
        const dayGcal = (gcalByDate[dateStr] || []).filter(g => {
          // Exclude CRM-synced events (they'll show as showings/tasks)
          const desc = g.description || '';
          return !desc.includes('[AmyCRM') && !desc.includes('[AmyCRM Showing]') && !desc.includes('[AmyCRM Task]');
        });
        return { showings: dayShowings, tasks: dayTasks, gcal: dayGcal };
      };

      const selectedDateStr = selectedDate ? getDateStr(selectedDate) : null;
      const selectedEvents = selectedDate ? getEventsForDate(selectedDateStr) : null;

      // Upcoming events for sidebar
      const upcomingShowings = showings.filter(s => s.showing_date >= todayStr && s.status === 'scheduled').slice(0, 8);
      const upcomingTasks = tasks.filter(t => t.due_date >= todayStr && t.status === 'pending').slice(0, 8);

      const days = [];
      for (let i = 0; i < firstDay; i++) days.push(null);
      for (let d = 1; d <= daysInMonth; d++) days.push(d);

      return (
        <div className="flex-1 flex flex-col p-3 sm:p-6 overflow-hidden min-h-0">
          <div className="flex flex-col sm:flex-row sm:items-center justify-between gap-3 mb-4">
            <div>
              <h2 className="text-lg font-semibold" style={{color:'#7F1330'}}>Calendar</h2>
              <p className="text-secondary text-xs mt-0.5">{upcomingShowings.length} upcoming showings &middot; {upcomingTasks.length} pending tasks{calConnected ? ` &middot; ${gcalEvents.length} Google Calendar events` : ''}</p>
            </div>
            <div className="flex items-center gap-2">
              <button onClick={goToday} className="text-xs px-3 py-1.5 rounded-full" style={{background:'#FFEEE3', color:'#7F1330'}}>Today</button>
              {calConnected ? (
                <button onClick={syncAllToCalendar} disabled={syncing} className="text-xs px-3 py-1.5 rounded-full flex items-center gap-1" style={{background:'#E0F0E0', color:'#2D6A2D'}}>
                  <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="23 4 23 10 17 10"></polyline><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path></svg>
                  {syncing ? 'Syncing...' : 'Sync All to Google'}
                </button>
              ) : (
                <button onClick={() => window.__amyCRM?.connectGmail()} className="text-xs px-3 py-1.5 rounded-full" style={{background:'#FFF5F0', color:'#7A5A5A', border:'1px solid #F0D5CC'}}>Connect Google Calendar</button>
              )}
            </div>
          </div>

          {/* Legend */}
          <div className="flex items-center gap-4 mb-3">
            <div className="flex items-center gap-1"><div className="w-2 h-2 rounded-full" style={{background:'#B72552'}}></div><span className="text-xs text-secondary">Showings</span></div>
            <div className="flex items-center gap-1"><div className="w-2 h-2 rounded-full" style={{background:'#003744'}}></div><span className="text-xs text-secondary">Tasks</span></div>
            {calConnected && <div className="flex items-center gap-1"><div className="w-2 h-2 rounded-full" style={{background:'#4285F4'}}></div><span className="text-xs text-secondary">Google Calendar</span></div>}
          </div>

          <div className="flex-1 flex flex-col lg:flex-row gap-4 overflow-hidden min-h-0">
            <div className="flex-1 flex flex-col min-h-0">
              <div className="flex items-center justify-between mb-3">
                <button onClick={prevMonth} className="p-1.5 rounded-lg hover:bg-gray-100">
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#7F1330" strokeWidth="2"><polyline points="15 18 9 12 15 6"></polyline></svg>
                </button>
                <h3 className="font-semibold text-sm">{monthName}</h3>
                <button onClick={nextMonth} className="p-1.5 rounded-lg hover:bg-gray-100">
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#7F1330" strokeWidth="2"><polyline points="9 18 15 12 9 6"></polyline></svg>
                </button>
              </div>

              <div className="grid grid-cols-7 gap-0.5 mb-1">
                {['Sun','Mon','Tue','Wed','Thu','Fri','Sat'].map(d => (
                  <div key={d} className="text-center text-xs font-medium py-1" style={{color:'#7A5A5A'}}>{d}</div>
                ))}
              </div>

              <div className="grid grid-cols-7 gap-0.5 flex-1">
                {days.map((day, i) => {
                  if (!day) return <div key={`empty-${i}`} className="rounded-lg" style={{background:'#FAFAFA'}}></div>;
                  const dateStr = getDateStr(day);
                  const events = getEventsForDate(dateStr);
                  const totalEvents = events.showings.length + events.tasks.length + events.gcal.length;
                  const hasEvents = totalEvents > 0;
                  const isToday = dateStr === todayStr;
                  const isSelected = selectedDate === day;

                  return (
                    <div key={day} onClick={() => setSelectedDate(isSelected ? null : day)}
                      className="rounded-lg p-1 cursor-pointer transition-all hover:shadow-sm flex flex-col"
                      style={{
                        background: isSelected ? '#7F1330' : isToday ? '#FFF0EC' : '#FAFAFA',
                        border: isToday && !isSelected ? '1px solid #FFC6BF' : '1px solid transparent',
                        minHeight: '48px'
                      }}>
                      <span className="text-xs font-medium" style={{color: isSelected ? '#fff' : isToday ? '#7F1330' : '#2D2D2D'}}>{day}</span>
                      {hasEvents && (
                        <div className="flex gap-0.5 mt-auto flex-wrap">
                          {events.showings.slice(0,2).map((s,j) => (
                            <div key={j} className="w-full rounded-sm px-0.5 truncate" style={{background: isSelected ? 'rgba(255,255,255,0.3)' : '#FFC6BF', fontSize:'9px', color: isSelected ? '#fff' : '#7F1330'}}>
                              {s.showing_time || ''} {s.property_address?.split(',')[0]?.substring(0,15)}
                            </div>
                          ))}
                          {events.tasks.slice(0,1).map((t,j) => (
                            <div key={`t${j}`} className="w-full rounded-sm px-0.5 truncate" style={{background: isSelected ? 'rgba(255,255,255,0.2)' : '#E0F0F2', fontSize:'9px', color: isSelected ? '#fff' : '#003744'}}>
                              {t.title?.substring(0,18)}
                            </div>
                          ))}
                          {events.gcal.slice(0,1).map((g,j) => (
                            <div key={`g${j}`} className="w-full rounded-sm px-0.5 truncate" style={{background: isSelected ? 'rgba(255,255,255,0.2)' : '#D4E5FC', fontSize:'9px', color: isSelected ? '#fff' : '#1a73e8'}}>
                              {(g.start?.dateTime || '').substring(11,16)} {g.summary?.substring(0,15)}
                            </div>
                          ))}
                          {totalEvents > 3 && (
                            <span style={{fontSize:'8px', color: isSelected ? '#fff' : '#7A5A5A'}}>+{totalEvents - 3} more</span>
                          )}
                        </div>
                      )}
                    </div>
                  );
                })}
              </div>
            </div>

            <div className="lg:w-72 flex flex-col min-h-0 overflow-y-auto">
              {selectedDate && selectedEvents ? (
                <div>
                  <h3 className="font-semibold text-sm mb-3" style={{color:'#7F1330'}}>
                    {new Date(year, month, selectedDate).toLocaleDateString('en-US', { weekday:'long', month:'long', day:'numeric' })}
                  </h3>
                  {selectedEvents.showings.length === 0 && selectedEvents.tasks.length === 0 && selectedEvents.gcal.length === 0 ? (
                    <p className="text-secondary text-xs">Nothing scheduled for this day.</p>
                  ) : (
                    <div className="space-y-2">
                      {selectedEvents.showings.map(s => (
                        <div key={s.id} className="glass-card p-3" style={{borderLeft:'3px solid #B72552'}}>
                          <div className="flex items-center gap-1.5 mb-1">
                            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#B72552" strokeWidth="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
                            <span className="text-xs font-medium" style={{color:'#B72552'}}>Showing{s.showing_time ? ` at ${s.showing_time}` : ''}</span>
                            {s.gcal_event_id && <span className="text-xs" style={{color:'#2D6A2D'}} title="Synced to Google Calendar">✓</span>}
                          </div>
                          <p className="text-sm font-medium">{s.property_address}</p>
                          <p className="text-xs text-secondary">{s.contacts ? `${s.contacts.first_name} ${s.contacts.last_name}` : ''}</p>
                          {s.notes && <p className="text-xs text-secondary mt-1">{s.notes}</p>}
                        </div>
                      ))}
                      {selectedEvents.tasks.map(t => (
                        <div key={t.id} className="glass-card p-3" style={{borderLeft:'3px solid #003744'}}>
                          <div className="flex items-center gap-1.5 mb-1">
                            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#003744" strokeWidth="2"><polyline points="9 11 12 14 22 4"></polyline><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"></path></svg>
                            <span className="text-xs font-medium" style={{color:'#003744'}}>Task &middot; {t.priority}</span>
                            {t.gcal_event_id && <span className="text-xs" style={{color:'#2D6A2D'}} title="Synced to Google Calendar">✓</span>}
                          </div>
                          <p className="text-sm font-medium">{t.title}</p>
                          {t.description && <p className="text-xs text-secondary">{t.description}</p>}
                        </div>
                      ))}
                      {selectedEvents.gcal.map((g, i) => {
                        const startTime = (g.start?.dateTime || '').substring(11,16);
                        const endTime = (g.end?.dateTime || '').substring(11,16);
                        const isAllDay = !g.start?.dateTime;
                        return (
                          <div key={`gcal-${i}`} className="glass-card p-3" style={{borderLeft:'3px solid #4285F4'}}>
                            <div className="flex items-center gap-1.5 mb-1">
                              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#4285F4" strokeWidth="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>
                              <span className="text-xs font-medium" style={{color:'#4285F4'}}>{isAllDay ? 'All day' : `${startTime} — ${endTime}`}</span>
                            </div>
                            <p className="text-sm font-medium">{g.summary || '(No title)'}</p>
                            {g.location && <p className="text-xs text-secondary">{g.location}</p>}
                          </div>
                        );
                      })}
                    </div>
                  )}
                </div>
              ) : (
                <div>
                  <h3 className="font-semibold text-sm mb-3" style={{color:'#7F1330'}}>Upcoming</h3>
                  {upcomingShowings.length === 0 && upcomingTasks.length === 0 ? (
                    <p className="text-secondary text-xs">Nothing scheduled. Use the Assistant to add showings.</p>
                  ) : (
                    <div className="space-y-2">
                      {upcomingShowings.map(s => (
                        <div key={s.id} className="glass-card p-2.5">
                          <div className="flex items-center gap-1.5">
                            <div className="w-1.5 h-1.5 rounded-full flex-shrink-0" style={{background:'#B72552'}}></div>
                            <div className="min-w-0 flex-1">
                              <p className="text-xs font-medium truncate">{s.property_address}</p>
                              <p className="text-xs text-secondary">{s.showing_date}{s.showing_time ? ` at ${s.showing_time}` : ''} &middot; {s.contacts ? `${s.contacts.first_name} ${s.contacts.last_name}` : ''}</p>
                            </div>
                            {s.gcal_event_id && <span className="text-xs flex-shrink-0" style={{color:'#2D6A2D'}}>✓</span>}
                          </div>
                        </div>
                      ))}
                      {upcomingTasks.map(t => (
                        <div key={t.id} className="glass-card p-2.5">
                          <div className="flex items-center gap-1.5">
                            <div className="w-1.5 h-1.5 rounded-full flex-shrink-0" style={{background:'#003744'}}></div>
                            <div className="min-w-0 flex-1">
                              <p className="text-xs font-medium truncate">{t.title}</p>
                              <p className="text-xs text-secondary">{t.due_date} &middot; {t.priority}</p>
                            </div>
                            {t.gcal_event_id && <span className="text-xs flex-shrink-0" style={{color:'#2D6A2D'}}>✓</span>}
                          </div>
                        </div>
                      ))}
                    </div>
                  )}
                </div>
              )}
            </div>
          </div>
        </div>
      );
    }

    // NOTES MODULE
    function Notes() {
      const [notes, setNotes] = useState([]);
      const [loading, setLoading] = useState(true);
      const [searchQuery, setSearchQuery] = useState('');
      const [filterType, setFilterType] = useState('all');
      const [showAdd, setShowAdd] = useState(false);
      const [newNote, setNewNote] = useState({ content: '', contact_id: '', is_pinned: false });
      const [contacts, setContacts] = useState([]);
      const [editingId, setEditingId] = useState(null);
      const [editContent, setEditContent] = useState('');

      useEffect(() => {
        fetchNotes();
        fetchContacts();
        const handleRefresh = () => fetchNotes();
        window.addEventListener('crm-data-changed', handleRefresh);
        return () => window.removeEventListener('crm-data-changed', handleRefresh);
      }, []);

      const fetchNotes = async () => {
        try {
          const { data, error } = await supabase
            .from('notes')
            .select('*, contacts(first_name, last_name)')
            .order('is_pinned', { ascending: false })
            .order('created_at', { ascending: false });
          if (!error) setNotes(data || []);
        } catch(e) { console.error(e); }
        setLoading(false);
      };

      const fetchContacts = async () => {
        const { data } = await supabase.from('contacts').select('id, first_name, last_name').order('first_name');
        if (data) setContacts(data);
      };

      const addNote = async () => {
        if (!newNote.content.trim()) return;
        const payload = { content: newNote.content, is_pinned: newNote.is_pinned };
        if (newNote.contact_id) payload.contact_id = newNote.contact_id;
        const { error } = await supabase.from('notes').insert([payload]);
        if (!error) { setNewNote({ content: '', contact_id: '', is_pinned: false }); setShowAdd(false); fetchNotes(); }
      };

      const deleteNote = async (id) => {
        if (!confirm('Delete this note?')) return;
        await supabase.from('notes').delete().eq('id', id);
        fetchNotes();
      };

      const togglePin = async (id, current) => {
        await supabase.from('notes').update({ is_pinned: !current }).eq('id', id);
        fetchNotes();
      };

      const saveEdit = async (id) => {
        if (!editContent.trim()) return;
        await supabase.from('notes').update({ content: editContent }).eq('id', id);
        setEditingId(null);
        fetchNotes();
      };

      const filtered = notes.filter(n => {
        if (searchQuery && !n.content.toLowerCase().includes(searchQuery.toLowerCase())) return false;
        if (filterType === 'pinned' && !n.is_pinned) return false;
        if (filterType === 'linked' && !n.contact_id && !n.transaction_id && !n.lead_id) return false;
        if (filterType === 'general' && (n.contact_id || n.transaction_id || n.lead_id)) return false;
        return true;
      });

      const pinnedCount = notes.filter(n => n.is_pinned).length;
      const linkedCount = notes.filter(n => n.contact_id || n.transaction_id || n.lead_id).length;

      if (loading) return <div className="p-3 sm:p-6"><p className="text-secondary">Loading notes...</p></div>;

      return (
        <div className="p-3 sm:p-6 space-y-4">
          <div className="flex flex-col sm:flex-row sm:items-center justify-between gap-3">
            <div>
              <h2 className="text-lg font-semibold" style={{color:'#7F1330'}}>Notes</h2>
              <p className="text-secondary text-xs mt-0.5">{notes.length} total &middot; {pinnedCount} pinned &middot; {linkedCount} linked to contacts</p>
            </div>
            <button onClick={() => setShowAdd(!showAdd)} className="btn-primary text-xs flex items-center gap-1">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
              Add Note
            </button>
          </div>

          {showAdd && (
            <div className="glass-card p-4 space-y-3" style={{borderLeft:'3px solid #B72552'}}>
              <textarea value={newNote.content} onChange={e => setNewNote({...newNote, content: e.target.value})} placeholder="Write your note..." rows="3" className="w-full text-xs p-2 rounded-lg border" style={{borderColor:'#F0D5CC', background:'#FFF5F0'}} />
              <div className="flex flex-wrap items-center gap-3">
                <select value={newNote.contact_id} onChange={e => setNewNote({...newNote, contact_id: e.target.value})} className="text-xs p-1.5 rounded-lg border flex-1 min-w-0" style={{borderColor:'#F0D5CC', background:'#FFF5F0'}}>
                  <option value="">No contact linked</option>
                  {contacts.map(c => <option key={c.id} value={c.id}>{c.first_name} {c.last_name}</option>)}
                </select>
                <label className="flex items-center gap-1.5 text-xs cursor-pointer">
                  <input type="checkbox" checked={newNote.is_pinned} onChange={e => setNewNote({...newNote, is_pinned: e.target.checked})} />
                  Pin
                </label>
                <div className="flex gap-2 ml-auto">
                  <button onClick={() => setShowAdd(false)} className="text-xs px-3 py-1.5 rounded-lg" style={{color:'#7A5A5A'}}>Cancel</button>
                  <button onClick={addNote} className="btn-primary text-xs">Save</button>
                </div>
              </div>
            </div>
          )}

          <div className="flex flex-col sm:flex-row gap-2">
            <input value={searchQuery} onChange={e => setSearchQuery(e.target.value)} placeholder="Search notes..." className="text-xs p-2 rounded-lg border flex-1" style={{borderColor:'#F0D5CC', background:'#FFF5F0'}} />
            <div className="flex gap-1.5">
              {[['all','All'],['pinned','Pinned'],['linked','Linked'],['general','General']].map(([val,label]) => (
                <button key={val} onClick={() => setFilterType(val)} className="text-xs px-3 py-1.5 rounded-full transition-all" style={filterType === val ? {background:'#7F1330', color:'#fff'} : {background:'#FFEEE3', color:'#7A5A5A'}}>{label}</button>
              ))}
            </div>
          </div>

          {filtered.length === 0 ? (
            <div className="text-center py-12">
              <div className="w-12 h-12 rounded-full mx-auto mb-3 flex items-center justify-center" style={{background:'#FFEEE3'}}>
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#B72552" strokeWidth="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline></svg>
              </div>
              <p className="text-secondary text-sm">No notes found</p>
              <p className="text-secondary text-xs mt-1">Use the Assistant to create notes by voice, or add one manually above.</p>
            </div>
          ) : (
            <div className="space-y-2">
              {filtered.map(note => (
                <div key={note.id} className="glass-card p-3 sm:p-4 hover:shadow-md transition-all" style={note.is_pinned ? {borderLeft:'3px solid #B72552'} : {}}>
                  <div className="flex items-start gap-3">
                    <button onClick={() => togglePin(note.id, note.is_pinned)} className="mt-0.5 flex-shrink-0" title={note.is_pinned ? 'Unpin' : 'Pin'}>
                      <svg width="16" height="16" viewBox="0 0 24 24" fill={note.is_pinned ? '#B72552' : 'none'} stroke={note.is_pinned ? '#B72552' : '#ccc'} strokeWidth="2">
                        <path d="M12 2l2.09 6.26L21 9.27l-5 4.87L17.18 22 12 18.27 6.82 22 8 14.14l-5-4.87 6.91-1.01z"></path>
                      </svg>
                    </button>
                    <div className="flex-1 min-w-0">
                      {editingId === note.id ? (
                        <div className="space-y-2">
                          <textarea value={editContent} onChange={e => setEditContent(e.target.value)} rows="3" className="w-full text-xs p-2 rounded-lg border" style={{borderColor:'#F0D5CC', background:'#FFF5F0'}} />
                          <div className="flex gap-2">
                            <button onClick={() => saveEdit(note.id)} className="btn-primary text-xs">Save</button>
                            <button onClick={() => setEditingId(null)} className="text-xs px-3 py-1.5" style={{color:'#7A5A5A'}}>Cancel</button>
                          </div>
                        </div>
                      ) : (
                        <p className="text-sm whitespace-pre-wrap" style={{color:'#2D2D2D'}}>{note.content}</p>
                      )}
                      <div className="flex flex-wrap items-center gap-2 mt-2">
                        {note.contacts && (
                          <span className="text-xs px-2 py-0.5 rounded-full" style={{background:'#FFEEE3', color:'#7F1330'}}>
                            {note.contacts.first_name} {note.contacts.last_name}
                          </span>
                        )}
                        <span className="text-xs" style={{color:'#aaa'}}>{new Date(note.created_at).toLocaleDateString('en-US', { month:'short', day:'numeric', year:'numeric', hour:'numeric', minute:'2-digit' })}</span>
                      </div>
                    </div>
                    <div className="flex gap-1 flex-shrink-0">
                      <button onClick={() => { setEditingId(note.id); setEditContent(note.content); }} className="p-1 rounded hover:bg-gray-100" title="Edit">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#7A5A5A" strokeWidth="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>
                      </button>
                      <button onClick={() => deleteNote(note.id)} className="p-1 rounded hover:bg-gray-100" title="Delete">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#7A5A5A" strokeWidth="2"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
                      </button>
                    </div>
                  </div>
                </div>
              ))}
            </div>
          )}
        </div>
      );
    }
