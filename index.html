                        <thead><tr className="border-b border-[#F0D5CC]"><th className="text-left py-2 px-2 font-medium">Field</th><th className="text-left py-2 px-2 font-medium">Column</th><th className="text-left py-2 px-2 font-medium">Sample</th></tr></thead>
                        <tbody>
                          {Object.entries(COMP_FIELD_MAP).map(([dbField]) => (
                            <tr key={dbField} className="border-b border-[#F0D5CC]/50">
                              <td className="py-1.5 px-2 font-medium">{dbField.replace(/_/g, ' ')}</td>
                              <td className="py-1.5 px-2"><select className="input-glass text-xs py-1 px-2" value={importMapping[dbField] || ''} onChange={e => setImportMapping({...importMapping, [dbField]: e.target.value})}><option value="">— skip —</option>{importPreview.headers.map(h => <option key={h} value={h}>{h}</option>)}</select></td>
                              <td className="py-1.5 px-2 text-secondary">{importMapping[dbField] ? (importPreview.rows[0]?.[importMapping[dbField]] || '').toString().substring(0, 40) : ''}</td>
                            </tr>
                          ))}
                        </tbody>
                      </table>
                    </div>
                    <div className="flex gap-2">
                      <button onClick={runImport} disabled={importing} className="btn-primary">{importing ? 'Importing...' : 'Import Comps'}</button>
                      <button onClick={() => { setShowImport(false); setImportPreview(null); }} className="btn-secondary">Cancel</button>
                    </div>
                  </div>
                )}
              </div>
            </div>
          )}

          {/* Comps table */}
          {loading ? <p className="text-secondary">Loading...</p> : comps.length === 0 ? (
            <div className="glass p-12 text-center">
              <p className="text-secondary mb-2">{hasFilters ? 'No comps match your filters' : 'No comps loaded yet'}</p>
              <p className="text-secondary text-sm">{hasFilters ? 'Try adjusting your filters.' : 'Upload MLS sold data to build your comp database.'}</p>
            </div>
          ) : (
            <div>
              <table className="w-full text-xs">
                <thead>
                  <tr className="border-b border-[#F0D5CC] text-left">
                    {[
                      { col: 'address', label: 'Address' },
                      { col: 'city', label: 'City' },
                      { col: 'zip', label: 'Zip' },
                      { col: 'sale_price', label: 'Sale Price' },
                      { col: 'sale_date', label: 'Sale Date' },
                      { col: 'list_price', label: 'List Price' },
                      { col: 'beds', label: 'Beds' },
                      { col: 'baths', label: 'Baths' },
                      { col: 'sqft', label: 'SqFt' },
                      { col: 'price_per_sqft', label: '$/SqFt' },
                      { col: 'days_on_market', label: 'DOM' },
                      { col: 'year_built', label: 'Built' },
                    ].map(h => (
                      <th key={h.col} className="py-2 px-2 font-medium cursor-pointer select-none hover:text-[#7F1330] transition" onClick={() => handleSort(h.col)}>
                        {h.label}<SortIcon col={h.col} />
                      </th>
                    ))}
                  </tr>
                </thead>
                <tbody>
                  {comps.map(c => (
                    <tr key={c.id} className="border-b border-[#F0D5CC]/30 hover:bg-[#FFF5F0] transition cursor-pointer" onClick={() => setSelectedComp(c)}>
                      <td className="py-2 px-2 font-medium">{c.address}</td>
                      <td className="py-2 px-2">{c.city}</td>
                      <td className="py-2 px-2">{c.zip || '—'}</td>
                      <td className="py-2 px-2">{fmt(c.sale_price)}</td>
                      <td className="py-2 px-2">{c.sale_date ? new Date(c.sale_date).toLocaleDateString() : '—'}</td>
                      <td className="py-2 px-2">{fmt(c.list_price)}</td>
                      <td className="py-2 px-2">{c.beds || '—'}</td>
                      <td className="py-2 px-2">{c.baths || '—'}</td>
                      <td className="py-2 px-2">{c.sqft?.toLocaleString() || '—'}</td>
                      <td className="py-2 px-2">{c.price_per_sqft ? '$' + Number(c.price_per_sqft).toFixed(0) : '—'}</td>
                      <td className="py-2 px-2">{c.days_on_market ?? '—'}</td>
                      <td className="py-2 px-2">{c.year_built || '—'}</td>
                    </tr>
                  ))}
                </tbody>
              </table>

              {/* Pagination */}
              {totalPages > 1 && (
                <div className="flex items-center justify-between mt-4">
                  <span className="text-xs text-secondary">Page {page + 1} of {totalPages} &middot; {totalFiltered.toLocaleString()} results</span>
                  <div className="flex gap-2">
                    <button onClick={() => setPage(Math.max(0, page - 1))} disabled={page === 0} className="btn-secondary text-xs">&larr; Prev</button>
                    <button onClick={() => setPage(Math.min(totalPages - 1, page + 1))} disabled={page >= totalPages - 1} className="btn-secondary text-xs">Next &rarr;</button>
                  </div>
                </div>
              )}
            </div>
          )}

          {/* Property Detail Slide Panel */}
          <div className={`slide-panel ${selectedComp ? 'active' : ''}`} style={{width:'500px'}}>
            {selectedComp && (() => {
              const c = selectedComp;
              const r = c.raw_import || {};
              const fmtD = (v) => v ? new Date(v).toLocaleDateString() : '—';
              const sections = [
                { title: 'Sale Details', fields: [
                  ['Sale Price', fmt(c.sale_price)],
                  ['List Price', fmt(c.list_price)],
                  ['Original List', r['Original List Price'] ? fmt(parseFloat(r['Original List Price'])) : '—'],
                  ['Close Date', fmtD(c.sale_date)],
                  ['List Date', fmtD(r['Listing Date'])],
                  ['DOM', c.days_on_market ?? '—'],
                  ['Cumulative DOM', r['Cumulative DOM'] || '—'],
                  ['Buyer Financing', r['Buyer Financing'] || '—'],
                  ['Concessions', r['Concessions Amount'] || r['Concessions'] || '—'],
                ]},
                { title: 'Property Details', fields: [
                  ['Type', r['Property Sub Type'] || c.property_type || '—'],
                  ['Beds', c.beds || '—'],
                  ['Full Baths', r['Bathrooms Full'] || '—'],
                  ['Half Baths', r['Bathrooms Half'] || '—'],
                  ['3/4 Baths', r['Bathrooms Three Quarter'] || '—'],
                  ['Total Baths', c.baths || '—'],
                  ['Living Area', c.sqft ? c.sqft.toLocaleString() + ' sqft' : '—'],
                  ['Above Grade', r['Above Grade Finished Area'] ? Number(r['Above Grade Finished Area']).toLocaleString() + ' sqft' : '—'],
                  ['Below Grade Finished', r['Below Grade Finished Area'] ? Number(r['Below Grade Finished Area']).toLocaleString() + ' sqft' : '—'],
                  ['Rooms Total', r['Rooms Total'] || '—'],
                  ['Year Built', c.year_built || '—'],
                  ['$/SqFt', c.price_per_sqft ? '$' + Number(c.price_per_sqft).toFixed(0) : '—'],
                ]},
                { title: 'Lot & Exterior', fields: [
                  ['Lot SqFt', c.lot_size_sqft ? c.lot_size_sqft.toLocaleString() : '—'],
                  ['Lot Acres', r['Lot Size Acres'] || '—'],
                  ['Garage', r['Garage YN'] === 'Y' ? (r['Garage Spaces'] || 'Yes') + ' spaces' : 'No'],
                  ['Basement', r['Basement YN'] === 'Y' ? 'Yes' : 'No'],
                  ['Fireplace', r['Fireplace YN'] === 'Y' ? 'Yes' : 'No'],
                  ['New Construction', r['New Construction YN'] === 'Y' ? 'Yes' : 'No'],
                  ['Waterfront', r['Waterfront YN'] === 'Y' ? 'Yes' : 'No'],
                  ['Attached', r['Property Attached YN'] === 'Y' ? 'Yes' : 'No'],
                ]},
                { title: 'Location & Tax', fields: [
                  ['City', c.city],
                  ['State', c.state],
                  ['Zip', c.zip || '—'],
                  ['County', r['County'] || '—'],
                  ['Subdivision', r['Subdivision Name'] || '—'],
                  ['School District', r['School District'] || '—'],
                  ['Elementary', r['Elementary School'] || '—'],
                  ['High School', r['High School'] || '—'],
                  ['Parcel', r['Parcel Number'] || '—'],
                  ['Tax Annual', r['Tax Annual Amount'] ? '$' + Number(r['Tax Annual Amount']).toLocaleString() : '—'],
                  ['Tax Assessed', r['Tax Assessed Value'] ? '$' + Number(r['Tax Assessed Value']).toLocaleString() : '—'],
                  ['Township', r['Township'] || '—'],
                ]},
                { title: 'Listing Info', fields: [
                  ['MLS #', r['Listing Number'] || '—'],
                  ['Listing Agent', r['Listing Member'] || '—'],
                  ['Listing Office', r['Listing Office'] || '—'],
                  ['Selling Agent', r['Selling Member'] || '—'],
                  ['Selling Office', r['Selling Office'] || '—'],
                  ['Occupant Type', r['Occupant Type'] || '—'],
                  ['Association', r['Association YN'] === 'Y' ? (r['Association Name'] || 'Yes') : 'No'],
                  ['HOA Fee', r['Association Fee'] ? '$' + r['Association Fee'] + ' ' + (r['Association Fee Frequency'] || '') : '—'],
                ]},
              ];

              return (
                <div className="p-6 overflow-y-auto" style={{height:'100vh'}}>
                  <div className="flex items-start justify-between mb-4">
                    <div>
                      <h3 className="font-semibold text-base">{c.address}</h3>
                      <p className="text-secondary text-sm">{c.city}, {c.state} {c.zip}</p>
                    </div>
                    <button onClick={() => setSelectedComp(null)}><IconClose /></button>
                  </div>

                  {/* Hero stats */}
                  <div className="grid grid-cols-3 gap-3 mb-5">
                    <div className="glass p-3 text-center">
                      <p className="text-xs text-secondary">Sale Price</p>
                      <p className="font-semibold text-base" style={{color:'#7F1330'}}>{fmt(c.sale_price)}</p>
                    </div>
                    <div className="glass p-3 text-center">
                      <p className="text-xs text-secondary">$/SqFt</p>
                      <p className="font-semibold text-base">{c.price_per_sqft ? '$' + Number(c.price_per_sqft).toFixed(0) : '—'}</p>
                    </div>
                    <div className="glass p-3 text-center">
                      <p className="text-xs text-secondary">DOM</p>
                      <p className="font-semibold text-base">{c.days_on_market ?? '—'}</p>
                    </div>
                  </div>

                  <div className="flex flex-wrap gap-2 mb-4 text-xs">
                    {c.beds && <span className="badge" style={{background:'#FFF5F0', color:'#7F1330'}}>{c.beds} Beds</span>}
                    {c.baths && <span className="badge" style={{background:'#FFF5F0', color:'#7F1330'}}>{c.baths} Baths</span>}
                    {c.sqft && <span className="badge" style={{background:'#FFF5F0', color:'#7F1330'}}>{c.sqft.toLocaleString()} SqFt</span>}
                    {c.year_built && <span className="badge" style={{background:'#FFF5F0', color:'#7F1330'}}>Built {c.year_built}</span>}
                    {c.lot_size_sqft && <span className="badge" style={{background:'#EEF2FF', color:'#4f46e5'}}>{c.lot_size_sqft.toLocaleString()} lot sqft</span>}
                  </div>

                  {/* Remarks */}
                  {r['Public Remarks'] && (
                    <div className="glass p-3 mb-4">
                      <p className="text-xs font-medium mb-1">Public Remarks</p>
                      <p className="text-xs text-secondary" style={{lineHeight:'1.5'}}>{r['Public Remarks']}</p>
                    </div>
                  )}

                  {/* Sections */}
                  {sections.map(s => {
                    const filled = s.fields.filter(f => f[1] && f[1] !== '—' && f[1] !== 'No');
                    if (filled.length === 0) return null;
                    return (
                      <div key={s.title} className="mb-4">
                        <h4 className="text-xs font-semibold uppercase tracking-wider mb-2" style={{color:'#7F1330'}}>{s.title}</h4>
                        <div className="grid grid-cols-2 gap-x-4 gap-y-1.5">
                          {s.fields.map(([label, val]) => val && val !== '—' ? (
                            <div key={label} className="flex justify-between text-xs py-0.5 border-b border-[#F0D5CC]/30">
                              <span className="text-secondary">{label}</span>
                              <span className="font-medium">{val}</span>
                            </div>
                          ) : null)}
                        </div>
                      </div>
                    );
                  })}
                </div>
              );
            })()}
          </div>
        </div>
      );
    }

    // AI SMART NOTES BAR
    function AssistantBar() {
      const [noteText, setNoteText] = useState('');
      const [isListening, setIsListening] = useState(false);
      const [status, setStatus] = useState('');
      const [processing, setProcessing] = useState(false);

      const startListening = () => {
        if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
          setStatus('Voice not supported in this browser');
          return;
        }
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        const recognition = new SpeechRecognition();
        recognition.continuous = false;
        recognition.interimResults = true;
        recognition.lang = 'en-US';

        recognition.onstart = () => setIsListening(true);
        recognition.onresult = (event) => {
          let transcript = '';
          for (let i = 0; i < event.results.length; i++) {
            transcript += event.results[i][0].transcript;
          }
          setNoteText(transcript);
        };
        recognition.onerror = (e) => { setIsListening(false); setStatus('Mic error: ' + e.error); };
        recognition.onend = () => setIsListening(false);
        recognition.start();
      };

      const handleSubmit = async () => {
        if (!noteText.trim()) return;
        setProcessing(true);
        setStatus('Thinking...');

        try {
          const response = await fetch(SUPABASE_URL + '/functions/v1/smart-notes', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              'Authorization': 'Bearer ' + SUPABASE_ANON_KEY
            },
            body: JSON.stringify({ text: noteText.trim() })
          });

          const result = await response.json();

          if (!response.ok) throw new Error(result.error || 'Request failed');

          const allSuccess = result.results?.every(r => r.success);
          setStatus(result.summary || 'Done.');
          setNoteText('');

          // Dispatch a custom event so other components can refresh their data
          window.dispatchEvent(new CustomEvent('crm-data-changed'));

          setTimeout(() => setStatus(''), 5000);
        } catch (err) {
          setStatus('Error: ' + err.message);
          setTimeout(() => setStatus(''), 5000);
        }
        setProcessing(false);
      };

      return (
        <div className="bg-white border-b border-[#F0D5CC] px-3 sm:px-5 py-2.5">
          <div className="flex items-center gap-2">
            <button
              onClick={startListening}
              className="flex-shrink-0 w-9 h-9 rounded-full flex items-center justify-center transition-all"
              style={{
                background: isListening ? '#B72552' : 'linear-gradient(135deg, #7F1330, #B72552)',
                boxShadow: isListening ? '0 0 0 4px rgba(183,37,82,0.2)' : 'none'
              }}
              title="Tap to speak"
            >
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2">
                <path d="M12 1a3 3 0 00-3 3v8a3 3 0 006 0V4a3 3 0 00-3-3z"/>
                <path d="M19 10v2a7 7 0 01-14 0v-2"/>
                <line x1="12" y1="19" x2="12" y2="23"/>
                <line x1="8" y1="23" x2="16" y2="23"/>
              </svg>
            </button>
            <input
              type="text"
              value={noteText}
              onChange={(e) => setNoteText(e.target.value)}
              onKeyDown={(e) => { if (e.key === 'Enter') handleSubmit(); }}
              placeholder={isListening ? 'Listening...' : 'Assistant: "New lead Sarah Park, buyer in Crown Point" or "Move Johnson to contacted"'}
              className="flex-1 bg-[#FFF5F0] border border-[#F0D5CC] rounded-full px-4 py-2 text-sm focus:outline-none focus:border-[#B72552] transition-all"
              style={{ minWidth: 0 }}
            />
            <button
              onClick={handleSubmit}
              disabled={!noteText.trim() || processing}
              className="flex-shrink-0 w-9 h-9 rounded-full flex items-center justify-center transition-all"
              style={{
                background: noteText.trim() ? '#7F1330' : '#F0D5CC',
                cursor: noteText.trim() ? 'pointer' : 'default'
              }}
            >
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="2">
                <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
              </svg>
            </button>
          </div>
          {status && <p className="text-xs mt-1 pl-11" style={{ color: status.startsWith('Error') ? '#B72552' : '#003744' }}>{status}</p>}
        </div>
      );
    }

    // MAIN APP
    function App({ session, onLogout }) {
      const [currentModule, setCurrentModule] = useState('command');
      const [sidebarCollapsed, setSidebarCollapsed] = useState(false);
      const [mobileMenuOpen, setMobileMenuOpen] = useState(false);
      const [gmailConnected, setGmailConnected] = useState(false);
      const [gmailEmail, setGmailEmail] = useState('');

      // Check Gmail connection on mount + handle OAuth callback
      useEffect(() => {
        checkGmailConnection();
        handleOAuthCallback();
      }, []);

      const checkGmailConnection = async () => {
        try {
          const res = await fetch(SUPABASE_URL + '/functions/v1/gmail', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'apikey': SUPABASE_ANON_KEY },
            body: JSON.stringify({ action: 'check_connection', user_id: session.user.id })
          });
          const data = await res.json();
          setGmailConnected(data.connected);
          if (data.email) setGmailEmail(data.email);
        } catch (err) { console.error('Gmail check error:', err); }
      };

      const handleOAuthCallback = async () => {
        const params = new URLSearchParams(window.location.search);
        const code = params.get('code');
        const state = params.get('state');
        if (!code) return;
        // Clean URL
        window.history.replaceState({}, '', window.location.pathname);
        try {
          const res = await fetch(SUPABASE_URL + '/functions/v1/gmail', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'apikey': SUPABASE_ANON_KEY },
            body: JSON.stringify({ action: 'exchange_code', code, user_id: state || session.user.id })
          });
          const data = await res.json();
          if (data.success) {
            setGmailConnected(true);
            setGmailEmail(data.email || '');
            alert('Gmail connected successfully! (' + (data.email || '') + ')');
          } else {
            alert('Gmail connection failed: ' + (data.error || JSON.stringify(data)));
          }
        } catch (err) { console.error('OAuth callback error:', err); alert('Failed to connect Gmail: ' + err.message); }
      };

      const connectGmail = async () => {
        try {
          const res = await fetch(SUPABASE_URL + '/functions/v1/gmail', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'apikey': SUPABASE_ANON_KEY },
            body: JSON.stringify({ action: 'get_auth_url', user_id: session.user.id })
          });
          const data = await res.json();
          if (data.url) window.location.href = data.url;
        } catch (err) { console.error('Gmail connect error:', err); }
      };

      const disconnectGmail = async () => {
        if (!confirm('Disconnect Gmail?')) return;
        await fetch(SUPABASE_URL + '/functions/v1/gmail', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'apikey': SUPABASE_ANON_KEY },
          body: JSON.stringify({ action: 'disconnect', user_id: session.user.id })
        });
        setGmailConnected(false);
        setGmailEmail('');
      };

      const sendDraftEmail = async (draft) => {
        if (!draft.contacts?.email) { alert('No email address on file for this contact.'); return; }
        if (!confirm('Send this email to ' + draft.contacts.email + '?')) return;
        try {
          const res = await fetch(SUPABASE_URL + '/functions/v1/gmail', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'apikey': SUPABASE_ANON_KEY },
            body: JSON.stringify({ action: 'send_email', user_id: session.user.id, to: draft.contacts.email, subject: draft.subject || 'From AmyCRM', email_body: draft.body })
          });
          const data = await res.json();
          if (data.success) {
            await supabase.from('drafts').update({ status: 'sent' }).eq('id', draft.id);
            // Log communication
            await supabase.from('communications').insert([{ contact_id: draft.contact_id, channel: 'email', direction: 'outbound', subject: draft.subject, body: draft.body, sent_at: new Date().toISOString() }]);
            window.dispatchEvent(new CustomEvent('crm-data-changed'));
            alert('Email sent!');
          } else { alert('Failed to send: ' + (data.error || 'Unknown error')); }
        } catch (err) { alert('Send error: ' + err.message); }
      };

      // Expose gmail state to child components via window
      window.__amyCRM = { gmailConnected, gmailEmail, connectGmail, disconnectGmail, sendDraftEmail, userId: session.user.id };

      const menuItems = [
        { id:'command', label:'Command Center', icon:IconDashboard },
        { id:'pipeline', label:'Pipeline', icon:IconPipeline },
        { id:'transactions', label:'Transactions', icon:IconTransaction },
        { id:'clients', label:'Contacts', icon:IconContacts },
        { id:'comms', label:'Comms Hub', icon:IconComms },
        { id:'tasks', label:'Tasks', icon:IconTask },
        { id:'showings', label:'Showings', icon:IconShowings },
        { id:'calendar', label:'Calendar', icon:IconCalendar },
        { id:'offers', label:'Offers', icon:IconOffers },
        { id:'financials', label:'Financials', icon:IconFinancials },
        { id:'notes', label:'Notes', icon:IconNotes },
        { id:'reports', label:'Reports', icon:IconReports },
        { id:'prospecting', label:'Prospecting', icon:IconProspecting },
        { id:'comps', label:'Comps', icon:IconComps },
      ];

      const handleNavClick = (id) => {
        setCurrentModule(id);
        setMobileMenuOpen(false);
      };

      const renderModule = () => {
        switch(currentModule) {
          case 'command': return <CommandCenter />;
          case 'pipeline': return <Pipeline />;
          case 'transactions': return <Transactions />;
          case 'clients': return <Clients />;
          case 'comms': return <CommsHub />;
          case 'tasks': return <Tasks />;
          case 'showings': return <Showings />;
          case 'calendar': return <Calendar />;
          case 'offers': return <Offers />;
          case 'financials': return <Financials />;
          case 'notes': return <Notes />;
          case 'reports': return <Reports />;
          case 'prospecting': return <Prospecting />;
          case 'comps': return <CompsModule />;
          default: return <CommandCenter />;
        }
      };

      return (
        <div className="flex h-screen bg-[#FFEEE3]">
          {/* Mobile overlay */}
          <div className={`sidebar-overlay ${mobileMenuOpen ? 'visible' : ''}`} onClick={() => setMobileMenuOpen(false)}></div>

          {/* Sidebar */}
          <div className={`sidebar ${sidebarCollapsed ? 'collapsed' : ''} ${mobileMenuOpen ? 'mobile-open' : ''}`}>
            <div className="flex items-center justify-between p-4 border-b border-[#F0D5CC]">
              <h1 className="font-semibold text-base"><span style={{color:"#7F1330"}}>Amy</span><span style={{color:"#FFC6BF"}}>CRM</span></h1>
              <button onClick={() => { setSidebarCollapsed(!sidebarCollapsed); setMobileMenuOpen(false); }} className="text-secondary hover:text-primary transition hidden md:block">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
              </button>
              <button onClick={() => setMobileMenuOpen(false)} className="text-secondary hover:text-primary transition md:hidden">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
              </button>
            </div>
            <nav className="flex-1 p-4 space-y-1 overflow-y-auto">
              {menuItems.map(item => {
                const Icon = item.icon;
                return (
                  <div key={item.id} onClick={() => handleNavClick(item.id)} className={`sidebar-item ${currentModule === item.id ? 'active' : ''}`}>
                    <Icon />
                    <span className="sidebar-label">{item.label}</span>
                  </div>
                );
              })}
            </nav>
            <div className="p-4 border-t border-[#F0D5CC]">
              <button onClick={onLogout} className="btn-secondary w-full text-xs">Sign Out</button>
            </div>
          </div>

          {/* Main content */}
          <div className="flex-1 flex flex-col overflow-hidden min-w-0">
            {/* Mobile top bar */}
            <div className="md:hidden flex items-center justify-between px-4 py-2.5 bg-white border-b border-[#F0D5CC]">
              <button onClick={() => setMobileMenuOpen(true)} className="text-secondary">
                <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
              </button>
              <h1 className="font-semibold text-sm"><span style={{color:"#7F1330"}}>Amy</span><span style={{color:"#FFC6BF"}}>CRM</span></h1>
              <span className="text-xs text-secondary capitalize">{currentModule === 'command' ? 'Home' : currentModule}</span>
            </div>

            {/* AI Assistant Bar */}
            <AssistantBar />

            {/* Module content */}
            <div className="flex-1 flex flex-col overflow-hidden">
              {renderModule()}
            </div>
          </div>
        </div>
      );
    }

    // RENDER ROOT
    ReactDOM.createRoot(document.getElementById('root')).render(<AuthGate />);
  </script>
</body>
