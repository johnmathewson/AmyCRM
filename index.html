<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AmyCRM | Amy Mathewson Real Estate</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');
    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #FFEEE3;
      color: #2D2D2D;
      overflow: hidden;
      font-weight: 300;
      font-size: 13px;
      letter-spacing: 0.01em;
    }
    .glass { background: #FFFFFF; border: 1px solid #F0D5CC; border-radius: 14px; box-shadow: 0 1px 3px rgba(127,19,48,0.04); }
    .glass-hover { background: #FFFFFF; border: 1px solid #F0D5CC; border-radius: 14px; box-shadow: 0 1px 3px rgba(127,19,48,0.04); transition: all 300ms; }
    .glass-hover:hover { border-color: #FFC6BF; box-shadow: 0 4px 16px rgba(127,19,48,0.08); }
    .gradient-primary { background: linear-gradient(135deg, #7F1330 0%, #B72552 100%); }
    .text-secondary { color: #7A5A5A; }
    .input-glass { background: #FFF5F0; border: 1px solid #F0D5CC; border-radius: 10px; color: #2D2D2D; padding: 8px 14px; font-size: 13px; font-weight: 300; font-family: 'Inter', sans-serif; transition: all 200ms; }
    .input-glass:focus { outline: none; border-color: #B72552; background: #FFFFFF; box-shadow: 0 0 0 3px rgba(183,37,82,0.1); }
    .btn-primary { background: #7F1330; color: white; border: none; padding: 8px 18px; border-radius: 10px; cursor: pointer; font-size: 12px; transition: all 200ms; font-weight: 500; font-family: 'Inter', sans-serif; letter-spacing: 0.03em; }
    .btn-primary:hover { background: #5E0D23; box-shadow: 0 4px 12px rgba(127,19,48,0.2); }
    .btn-secondary { background: #FFF5F0; color: #7A5A5A; border: 1px solid #F0D5CC; padding: 8px 18px; border-radius: 10px; cursor: pointer; font-size: 12px; transition: all 200ms; font-family: 'Inter', sans-serif; font-weight: 400; }
    .btn-secondary:hover { background: #FFEEE3; color: #2D2D2D; border-color: #FFC6BF; }
    .checkbox-glass { appearance: none; width: 18px; height: 18px; border: 1.5px solid #FFC6BF; border-radius: 5px; background: #FFFFFF; cursor: pointer; transition: all 200ms; }
    .checkbox-glass:checked { background: #7F1330; border-color: #7F1330; }
    .badge { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 500; letter-spacing: 0.02em; }
    .badge-hot { background: #FFE5E8; color: #B72552; }
    .badge-warm { background: #FFEEE3; color: #FE8982; }
    .badge-cold { background: #E8F0F2; color: #003744; }
    .badge-buyer { background: #FFF0EC; color: #7F1330; }
    .badge-seller { background: #FFEEE3; color: #7A5A5A; }
    .temp-indicator { width: 6px; height: 6px; border-radius: 50%; display: inline-block; margin-right: 6px; }
    .temp-hot { background: #FE8982; }
    .temp-warm { background: #FFC6BF; }
    .temp-cold { background: #9BB5B8; }
    /* Pipeline smart list — kept minimal, mostly uses Tailwind */
    .score-badge { background: #E0F0F2; color: #003744; padding: 2px 8px; border-radius: 6px; font-size: 10px; font-weight: 600; }
    .ai-sparkle { display: inline-block; font-size: 14px; margin-right: 6px; animation: sparkle 2s infinite; }
    @keyframes sparkle { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    .slide-panel { position: fixed; top: 0; right: 0; width: 420px; height: 100vh; background: #FFFFFF; border-left: 1px solid #F0D5CC; z-index: 1000; transform: translateX(100%); transition: transform 300ms cubic-bezier(0.4, 0, 0.2, 1); overflow-y: auto; box-shadow: -4px 0 24px rgba(127,19,48,0.06); }
    .slide-panel.active { transform: translateX(0); }
    .health-bar { width: 100%; height: 5px; background: #FFEEE3; border-radius: 3px; overflow: hidden; }
    .health-fill { height: 100%; transition: width 300ms; border-radius: 3px; }
    .health-fill.high { background: linear-gradient(90deg, #7F1330, #B72552); }
    .health-fill.medium { background: linear-gradient(90deg, #FE8982, #FFC6BF); }
    .health-fill.low { background: linear-gradient(90deg, #B72552, #FE8982); }
    .chart-bar { background: linear-gradient(180deg, #7F1330, #B72552); border-radius: 6px 6px 0 0; transition: all 200ms; cursor: pointer; }
    .chart-bar:hover { opacity: 0.85; }
    .sidebar { width: 220px; background: #FFFFFF; border-right: 1px solid #F0D5CC; display: flex; flex-direction: column; transition: all 300ms; z-index: 50; }
    .sidebar.collapsed { width: 60px; }
    .sidebar-item { padding: 10px 16px; cursor: pointer; display: flex; align-items: center; gap: 12px; color: #7A5A5A; transition: all 200ms; border-left: 2.5px solid transparent; font-size: 13px; font-weight: 400; }
    .sidebar-item:hover { background: #FFF5F0; color: #2D2D2D; }
    .sidebar-item.active { background: #FFF0EC; border-left-color: #7F1330; color: #7F1330; font-weight: 500; }
    .sidebar-label { white-space: nowrap; opacity: 1; transition: opacity 300ms; }
    .sidebar.collapsed .sidebar-label { display: none; }
    @media (max-width: 768px) {
      .sidebar { position: fixed; top: 0; left: 0; height: 100vh; width: 240px; box-shadow: 4px 0 24px rgba(0,0,0,0.1); transform: translateX(-100%); }
      .sidebar.mobile-open { transform: translateX(0); }
      .sidebar.collapsed { width: 240px; transform: translateX(-100%); }
      .sidebar.collapsed.mobile-open { transform: translateX(0); }
      .sidebar-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.2); z-index: 40; }
      .sidebar-overlay.visible { display: block; }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    // SUPABASE SETUP
    const SUPABASE_URL = 'https://pvxcnlkgqkhskbzisotl.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InB2eGNubGtncWtoc2tiemlzb3RsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ5MDQyNTMsImV4cCI6MjA5MDQ4MDI1M30.RgG6wwOHA3C8G_fecMnPzqeTTguoeFG-xz3-mZhegfE';
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // GOOGLE CALENDAR SYNC HELPERS
    const syncShowingToCalendar = async (showingId) => {
      const userId = window.__amyCRM?.userId;
      if (!userId || !window.__amyCRM?.gmailConnected) return { success: false, error: 'Gmail not connected' };
      try {
        const res = await fetch(SUPABASE_URL + '/functions/v1/gmail', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'apikey': SUPABASE_ANON_KEY },
          body: JSON.stringify({ action: 'sync_showing_to_calendar', user_id: userId, showing_id: showingId })
        });
        return await res.json();
      } catch (err) { return { success: false, error: err.message }; }
    };

    const syncTaskToCalendar = async (taskId) => {
      const userId = window.__amyCRM?.userId;
      if (!userId || !window.__amyCRM?.gmailConnected) return { success: false, error: 'Gmail not connected' };
      try {
        const res = await fetch(SUPABASE_URL + '/functions/v1/gmail', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'apikey': SUPABASE_ANON_KEY },
          body: JSON.stringify({ action: 'sync_task_to_calendar', user_id: userId, task_id: taskId })
        });
        return await res.json();
      } catch (err) { return { success: false, error: err.message }; }
    };

    const fetchGoogleCalendarEvents = async (timeMin, timeMax) => {
      const userId = window.__amyCRM?.userId;
      if (!userId || !window.__amyCRM?.gmailConnected) return [];
      try {
        const res = await fetch(SUPABASE_URL + '/functions/v1/gmail', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'apikey': SUPABASE_ANON_KEY },
          body: JSON.stringify({ action: 'list_calendar_events', user_id: userId, time_min: timeMin, time_max: timeMax, max_results: 100 })
        });
        const data = await res.json();
        return data.events || [];
      } catch (err) { console.error('Calendar fetch error:', err); return []; }
    };

    const createGoogleCalendarEvent = async (event) => {
      const userId = window.__amyCRM?.userId;
      if (!userId || !window.__amyCRM?.gmailConnected) return { success: false, error: 'Gmail not connected' };
      try {
        const res = await fetch(SUPABASE_URL + '/functions/v1/gmail', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'apikey': SUPABASE_ANON_KEY },
          body: JSON.stringify({ action: 'create_calendar_event', user_id: userId, event })
        });
        return await res.json();
      } catch (err) { return { success: false, error: err.message }; }
    };

    // AUTH GATE
    function AuthGate({ children }) {
      const [session, setSession] = useState(null);
      const [loading, setLoading] = useState(true);

      useEffect(() => {
        supabase.auth.getSession().then(({ data: { session } }) => {
          setSession(session);
          setLoading(false);
        });
        const { data: { subscription } } = supabase.auth.onAuthStateChange((_event, session) => {
          setSession(session);
        });
        return () => subscription?.unsubscribe?.();
      }, []);

      if (loading) {
        return (
          <div className="flex h-screen items-center justify-center bg-[#FFEEE3]">
            <div className="text-center">
              <p className="text-secondary">Loading...</p>
            </div>
          </div>
        );
      }

      if (!session) return <LoginScreen />;
      return <AppWrapper session={session} />;
    }

    // LOGIN SCREEN
    function LoginScreen() {
      const [email, setEmail] = useState('');
      const [password, setPassword] = useState('');
      const [isSignUp, setIsSignUp] = useState(false);
      const [error, setError] = useState('');
      const [loading, setLoading] = useState(false);

      const handleAuth = async (e) => {
        e.preventDefault();
        setError('');
        setLoading(true);

        try {
          if (isSignUp) {
            const { error } = await supabase.auth.signUp({
              email,
              password,
              options: { data: { full_name: email.split('@')[0] } }
            });
            if (error) throw error;
            setEmail('');
            setPassword('');
            alert('Check your email for confirmation');
          } else {
            const { error } = await supabase.auth.signInWithPassword({
              email,
              password
            });
            if (error) throw error;
          }
        } catch (err) {
          setError(err.message);
        } finally {
          setLoading(false);
        }
      };

      return (
        <div className="flex h-screen items-center justify-center bg-[#FFEEE3]">
          <div className="glass p-8 max-w-md w-full mx-4 rounded-2xl">
            <div className="text-center mb-8">
              <h1 className="text-2xl font-semibold mb-2"><span style={{color:"#7F1330"}}>Amy</span><span style={{color:"#FFC6BF"}}>CRM</span></h1>
              <p className="text-secondary">Residential Real Estate CRM</p>
            </div>
            <form onSubmit={handleAuth} className="space-y-4">
              <div>
                <label className="text-sm text-secondary mb-2 block">Email</label>
                <input
                  type="email"
                  value={email}
                  onChange={(e) => setEmail(e.target.value)}
                  className="input-glass w-full"
                  placeholder="your@email.com"
                  required
                />
              </div>
              <div>
                <label className="text-sm text-secondary mb-2 block">Password</label>
                <input
                  type="password"
                  value={password}
                  onChange={(e) => setPassword(e.target.value)}
                  className="input-glass w-full"
                  placeholder="••••••••"
                  required
                />
              </div>
              {error && <div className="bg-[#FFE5E8] text-[#B72552] p-3 rounded-lg text-sm">{error}</div>}
              <button type="submit" disabled={loading} className="btn-primary w-full">
                {loading ? 'Loading...' : isSignUp ? 'Sign Up' : 'Sign In'}
              </button>
            </form>
            <div className="mt-4 text-center">
              <p className="text-secondary text-sm">
                {isSignUp ? 'Already have an account? ' : "Don't have an account? "}
                <button onClick={() => {
                  setIsSignUp(!isSignUp);
                  setError('');
                }} className="text-[#7F1330] font-semibold hover:underline">
                  {isSignUp ? 'Sign In' : 'Sign Up'}
                </button>
              </p>
            </div>
          </div>
        </div>
      );
    }

    // APP WRAPPER
    function AppWrapper({ session }) {
      const handleLogout = async () => {
        await supabase.auth.signOut();
      };

      return <App session={session} onLogout={handleLogout} />;
    }

    // SVG ICONS
    const IconDashboard = () => (<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg>);
    const IconPipeline = () => (<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="3" y="3" width="7" height="5"></rect><rect x="14" y="3" width="7" height="5"></rect><rect x="14" y="10" width="7" height="5"></rect><rect x="3" y="16" width="18" height="5"></rect></svg>);
    const IconTransaction = () => (<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="2" y="3" width="20" height="3"></rect><line x1="2" y1="8" x2="22" y2="8"></line><rect x="2" y="10" width="20" height="8"></rect><rect x="2" y="20" width="20" height="2"></rect></svg>);
    const IconContacts = () => (<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>);
    const IconComms = () => (<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>);
    const IconTask = () => (<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="9 11 12 14 22 4"></polyline><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"></path></svg>);
    const IconShowings = () => (<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>);
    const IconOffers = () => (<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="9" cy="21" r="1"></circle><circle cx="20" cy="21" r="1"></circle><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path></svg>);
    const IconFinancials = () => (<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><line x1="12" y1="2" x2="12" y2="22"></line><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path></svg>);
    const IconReports = () => (<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="3" y="3" width="18" height="18" rx="2"></rect><line x1="9" y1="9" x2="9" y2="15"></line><line x1="15" y1="9" x2="15" y2="15"></line></svg>);
    const IconAI = () => (<svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8zm3.5-9c.83 0 1.5-.67 1.5-1.5S16.33 8 15.5 8 14 8.67 14 9.5s.67 1.5 1.5 1.5zm-7 0c.83 0 1.5-.67 1.5-1.5S9.33 8 8.5 8 7 8.67 7 9.5 7.67 11 8.5 11zm3.5 6.5c2.33 0 4.31-1.46 5.11-3.5H6.89c.8 2.04 2.78 3.5 5.11 3.5z"/></svg>);
    const IconNotes = () => (<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>);
    const IconCalendar = () => (<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>);
    const IconClose = () => (<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>);
    const IconProspecting = () => (<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="11" cy="11" r="8"></circle><line x1="21" y1="21" x2="16.65" y2="16.65"></line><line x1="8" y1="11" x2="14" y2="11"></line><line x1="11" y1="8" x2="11" y2="14"></line></svg>);
    const IconComps = () => (<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M3 3v18h18"></path><polyline points="18 9 12 15 9 12 3 18"></polyline></svg>);

    // AI DRAFT PANEL
    function AIDraftPanel({ isOpen, onClose, draft, onApprove }) {
      const [tone, setTone] = useState('professional');
      const [channel, setChannel] = useState(draft?.channel || 'email');

      return (
        <>
          {isOpen && <div className="fixed inset-0 bg-black/20 z-[999]" onClick={onClose}></div>}
          <div className={`slide-panel ${isOpen ? 'active' : ''}`}>
            <div className="p-6 flex flex-col h-full">
              <div className="flex items-center justify-between mb-6">
                <h2 className="text-base font-semibold">AI Draft</h2>
                <button onClick={onClose} className="text-secondary hover:text-primary"><IconClose /></button>
              </div>
              <div className="flex-1 overflow-y-auto space-y-4">
                <div>
                  <label className="block text-sm text-secondary mb-2">To</label>
                  <input type="text" value={draft?.to || ''} readOnly className="input-glass w-full" />
                </div>
                <div>
                  <label className="block text-sm text-secondary mb-2">Channel</label>
                  <div className="flex gap-2">
                    {['email', 'sms', 'call'].map(ch => (<button key={ch} onClick={() => setChannel(ch)} className={`flex-1 py-2 px-3 rounded-lg text-sm font-medium transition ${channel === ch ? 'bg-[#7F1330] text-white' : 'bg-[#FFF5F0] text-secondary hover:bg-[#FFEEE3]'}`}>{ch.toUpperCase()}</button>))}
                  </div>
                </div>
                {channel === 'email' && <div><label className="block text-sm text-secondary mb-2">Subject</label><input type="text" value={draft?.subject || ''} readOnly className="input-glass w-full" /></div>}
                <div>
                  <label className="block text-sm text-secondary mb-2">Message</label>
                  <textarea value={draft?.body || ''} readOnly className="input-glass w-full h-32 resize-none p-3" />
                </div>
                <div>
                  <label className="block text-sm text-secondary mb-2">Tone</label>
                  <div className="flex gap-2">{['professional', 'warm', 'urgent'].map(t => (<button key={t} onClick={() => setTone(t)} className={`py-2 px-3 rounded-lg text-sm font-medium transition ${tone === t ? 'bg-[#7F1330] text-white' : 'bg-[#FFF5F0] text-secondary hover:bg-[#FFEEE3]'}`}>{t.charAt(0).toUpperCase() + t.slice(1)}</button>))}</div>
                </div>
                <div className="bg-[#FFEEE3] border border-[#FE8982]/30 rounded-lg p-3 mt-4"><p className="text-sm text-[#7A5A5A]">AI-drafted. Review before sending.</p></div>
              </div>
              <div className="flex gap-3 mt-6 pt-6 border-t border-[#F0D5CC]">
                <button onClick={onClose} className="btn-secondary flex-1">Cancel</button>
                <button onClick={() => { onApprove(); onClose(); }} className="btn-primary flex-1">Approve & Queue</button>
              </div>
            </div>
          </div>
        </>
      );
    }

    // COMMAND CENTER
    function CommandCenter() {
      const [briefing, setBriefing] = useState(null);
      const [loading, setLoading] = useState(true);
      const [drafts, setDrafts] = useState([]);
      const [expandedDraft, setExpandedDraft] = useState(null);
      const [editDraftBody, setEditDraftBody] = useState('');
      const [upcomingTouches, setUpcomingTouches] = useState([]);
      const [staleSphere, setStaleSphere] = useState([]);
      const [overdueTouches, setOverdueTouches] = useState([]);

      useEffect(() => {
        fetchBriefing();
        fetchDrafts();
        fetchNurtureData();
        const handleRefresh = () => { fetchBriefing(); fetchDrafts(); fetchNurtureData(); };
        window.addEventListener('crm-data-changed', handleRefresh);
        return () => window.removeEventListener('crm-data-changed', handleRefresh);
      }, []);

      const fetchBriefing = async () => {
        try {
          const res = await fetch(SUPABASE_URL + '/functions/v1/smart-notes', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'apikey': SUPABASE_ANON_KEY },
            body: JSON.stringify({ mode: 'briefing' })
          });
          const data = await res.json();
          setBriefing(data);
        } catch (err) { console.error('Briefing error:', err); }
        setLoading(false);
      };

      const fetchDrafts = async () => {
        const { data } = await supabase.from('drafts').select('*, contacts(first_name, last_name, email)').eq('status', 'pending').order('created_at', { ascending: false });
        if (data) setDrafts(data);
      };

      const fetchNurtureData = async () => {
        try {
          const today = new Date().toISOString().split('T')[0];
          const in30 = new Date(Date.now() + 30*86400000).toISOString().split('T')[0];
          // Upcoming touches (next 30 days)
          const { data: touches } = await supabase
            .from('nurture_touches')
            .select('*, contacts(first_name, last_name, email, phone)')
            .eq('status', 'pending')
            .gte('scheduled_date', today)
            .lte('scheduled_date', in30)
            .order('scheduled_date', { ascending: true })
            .limit(10);
          if (touches) setUpcomingTouches(touches);

          // Overdue touches
          const { data: overdue } = await supabase
            .from('nurture_touches')
            .select('*, contacts(first_name, last_name)')
            .eq('status', 'overdue')
            .order('scheduled_date', { ascending: true })
            .limit(10);
          if (overdue) setOverdueTouches(overdue);

          // Stale sphere: contacts with no contact in 90+ days
          const staleDate = new Date(Date.now() - 90*86400000).toISOString();
          const { data: stale } = await supabase
            .from('contacts')
            .select('id, first_name, last_name, contact_type, last_contact_date, preferred_channel')
            .in('contact_type', ['sphere', 'past_client', 'client', 'referral_partner'])
            .or(`last_contact_date.is.null,last_contact_date.lt.${staleDate}`)
            .order('last_contact_date', { ascending: true, nullsFirst: true })
            .limit(10);
          if (stale) setStaleSphere(stale);
        } catch (err) { console.error('Nurture fetch error:', err); }
      };

      const completeTouchAction = async (touchId, action) => {
        if (action === 'skip') {
          await supabase.from('nurture_touches').update({ status: 'skipped', updated_at: new Date().toISOString() }).eq('id', touchId);
        } else if (action === 'complete') {
          await supabase.from('nurture_touches').update({ status: 'completed', completed_at: new Date().toISOString(), updated_at: new Date().toISOString() }).eq('id', touchId);
        }
        fetchNurtureData();
      };

      const approveDraft = async (id) => {
        await supabase.from('drafts').update({ status: 'approved' }).eq('id', id);
        fetchDrafts();
        window.dispatchEvent(new CustomEvent('crm-data-changed'));
      };

      const discardDraft = async (id) => {
        await supabase.from('drafts').update({ status: 'discarded' }).eq('id', id);
        fetchDrafts();
      };

      const saveDraftEdit = async (id) => {
        await supabase.from('drafts').update({ body: editDraftBody }).eq('id', id);
        setExpandedDraft(null);
        fetchDrafts();
      };

      const getGreeting = () => {
        const h = new Date().getHours();
        if (h < 12) return 'Good morning';
        if (h < 17) return 'Good afternoon';
        return 'Good evening';
      };

      const formatDate = () => new Date().toLocaleDateString('en-US', { year:'numeric', month:'long', day:'numeric', weekday:'long' });

      if (loading) return <div className="p-3 sm:p-6"><p className="text-secondary text-sm">Loading your briefing...</p></div>;

      const b = briefing || {};
      const staleHot = b.staleHotLeads || [];
      const staleWarm = b.staleWarmLeads || [];
      const overdue = b.overdueTasks || [];
      const todayTasks = b.todayTasks || [];
      const todayShowings = b.todayShowings || [];
      const weekShowings = b.weekShowings || [];
      const closingSoon = b.closingSoon || [];
      const gci = b.gci || {};
      const pipeline = b.pipeline || {};

      const alertCount = staleHot.length + overdue.length + closingSoon.length + overdueTouches.length + staleSphere.length;

      return (
        <div className="flex-1 overflow-y-auto">
          <div className="p-3 sm:p-6 space-y-4 max-w-7xl">
            <div className="flex flex-col sm:flex-row sm:items-center justify-between gap-2">
              <div>
                <h1 className="text-lg font-semibold" style={{color:'#7F1330'}}>{getGreeting()}, Amy</h1>
                <p className="text-secondary text-xs">{formatDate()}</p>
              </div>
              <button onClick={() => { const input = document.querySelector('input[placeholder*="Assistant"]'); if (input) input.focus(); }} className="btn-primary text-xs flex items-center gap-1.5">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M12 1a3 3 0 00-3 3v8a3 3 0 006 0V4a3 3 0 00-3-3z"/><path d="M19 10v2a7 7 0 01-14 0v-2"/></svg>
                Talk to Assistant
              </button>
            </div>

            <div className="glass-card p-3 flex items-center justify-between">
              <div className="flex items-center gap-2">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke={window.__amyCRM?.gmailConnected ? '#2D6A2D' : '#7A5A5A'} strokeWidth="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path><polyline points="22,6 12,13 2,6"></polyline></svg>
                {window.__amyCRM?.gmailConnected ? (
                  <span className="text-xs"><span style={{color:'#2D6A2D'}}>Gmail connected</span> <span className="text-secondary">({window.__amyCRM.gmailEmail})</span></span>
                ) : (
                  <span className="text-xs text-secondary">Gmail not connected — connect to send emails directly from AmyCRM</span>
                )}
              </div>
              {window.__amyCRM?.gmailConnected ? (
                <button onClick={() => window.__amyCRM.disconnectGmail()} className="text-xs px-2 py-1 rounded-lg" style={{color:'#7A5A5A'}}>Disconnect</button>
              ) : (
                <button onClick={() => window.__amyCRM.connectGmail()} className="btn-primary text-xs">Connect Gmail</button>
              )}
            </div>

            {alertCount > 0 && (
              <div className="glass-card p-4" style={{borderLeft:'3px solid #B72552', background:'#FFF0EC'}}>
                <div className="flex items-center gap-2 mb-2">
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#B72552" strokeWidth="2"><path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"></path><line x1="12" y1="9" x2="12" y2="13"></line><line x1="12" y1="17" x2="12.01" y2="17"></line></svg>
                  <span className="font-semibold text-sm" style={{color:'#B72552'}}>Needs Your Attention ({alertCount})</span>
                </div>
                <div className="space-y-1.5">
                  {staleHot.map((l, i) => (
                    <div key={i} className="flex items-center gap-2 text-xs">
                      <span className="w-2 h-2 rounded-full flex-shrink-0" style={{background:'#B72552'}}></span>
                      <span><strong>{l.name}</strong> is a hot lead with no contact in {Math.round((Date.now() - new Date(l.lastActivity).getTime()) / 86400000)} days ({l.stage})</span>
                    </div>
                  ))}
                  {overdue.map((t, i) => (
                    <div key={`t${i}`} className="flex items-center gap-2 text-xs">
                      <span className="w-2 h-2 rounded-full flex-shrink-0" style={{background:'#FE8982'}}></span>
                      <span><strong>{t.title}</strong> was due {t.dueDate} ({t.priority} priority)</span>
                    </div>
                  ))}
                  {closingSoon.map((c, i) => (
                    <div key={`c${i}`} className="flex items-center gap-2 text-xs">
                      <span className="w-2 h-2 rounded-full flex-shrink-0" style={{background:'#003744'}}></span>
                      <span><strong>{c.client}</strong> closing on {c.closingDate} at {c.property} — status: {c.status}</span>
                    </div>
                  ))}
                  {overdueTouches.map((t, i) => (
                    <div key={`nt${i}`} className="flex items-center gap-2 text-xs">
                      <span className="w-2 h-2 rounded-full flex-shrink-0" style={{background:'#B72552'}}></span>
                      <span><strong>{t.contacts?.first_name} {t.contacts?.last_name}</strong> — overdue {t.touch_type.replace('_', ' ')}: {t.title} (was {t.scheduled_date})</span>
                    </div>
                  ))}
                  {staleSphere.slice(0, 3).map((s, i) => (
                    <div key={`ss${i}`} className="flex items-center gap-2 text-xs">
                      <span className="w-2 h-2 rounded-full flex-shrink-0" style={{background:'#FE8982'}}></span>
                      <span><strong>{s.first_name} {s.last_name}</strong> — {s.last_contact_date ? `${Math.round((Date.now() - new Date(s.last_contact_date).getTime()) / 86400000)} days since last contact` : 'never contacted'}</span>
                    </div>
                  ))}
                </div>
              </div>
            )}

            <div className="grid grid-cols-2 sm:grid-cols-4 gap-3">
              <div className="glass p-4">
                <p className="text-secondary text-xs mb-1">Active Leads</p>
                <p className="text-xl font-semibold">{pipeline.totalLeads || 0}</p>
                <p className="text-xs" style={{color:'#B72552'}}>{pipeline.hotLeads || 0} hot</p>
              </div>
              <div className="glass p-4">
                <p className="text-secondary text-xs mb-1">Active Deals</p>
                <p className="text-xl font-semibold">{pipeline.activeTransactions || 0}</p>
                <p className="text-xs" style={{color:'#003744'}}>in progress</p>
              </div>
              <div className="glass p-4">
                <p className="text-secondary text-xs mb-1">Closed GCI</p>
                <p className="text-xl font-semibold">${((gci.closed || 0) / 1000).toFixed(1)}k</p>
                <p className="text-xs" style={{color:'#2D6A2D'}}>year to date</p>
              </div>
              <div className="glass p-4">
                <p className="text-secondary text-xs mb-1">Projected GCI</p>
                <p className="text-xl font-semibold">${((gci.projected || 0) / 1000).toFixed(1)}k</p>
                <p className="text-xs" style={{color:'#003744'}}>+${((gci.pending || 0) / 1000).toFixed(1)}k pending</p>
              </div>
            </div>

            {drafts.length > 0 && (
              <div>
                <h3 className="font-semibold text-sm mb-2 flex items-center gap-2" style={{color:'#7F1330'}}>
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#7F1330" strokeWidth="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path><polyline points="22,6 12,13 2,6"></polyline></svg>
                  Drafts Awaiting Review ({drafts.length})
                </h3>
                <div className="space-y-2">
                  {drafts.map(d => (
                    <div key={d.id} className="glass-card p-3 sm:p-4" style={{borderLeft:'3px solid #7F1330'}}>
                      <div className="flex items-start justify-between gap-2">
                        <div className="flex-1 min-w-0">
                          <div className="flex items-center gap-2 mb-1">
                            <span className="text-xs px-2 py-0.5 rounded-full" style={{background: d.channel === 'email' ? '#FFEEE3' : '#E0F0F2', color: d.channel === 'email' ? '#7F1330' : '#003744'}}>{d.channel}</span>
                            <span className="text-xs font-medium">{d.contacts ? `${d.contacts.first_name} ${d.contacts.last_name}` : 'General'}</span>
                          </div>
                          {d.subject && <p className="text-sm font-medium">{d.subject}</p>}
                          {expandedDraft === d.id ? (
                            <div className="mt-2 space-y-2">
                              <textarea value={editDraftBody} onChange={e => setEditDraftBody(e.target.value)} rows="6" className="w-full text-xs p-2 rounded-lg border" style={{borderColor:'#F0D5CC', background:'#FFF5F0'}} />
                              <div className="flex gap-2">
                                <button onClick={() => saveDraftEdit(d.id)} className="btn-primary text-xs">Save Edit</button>
                                <button onClick={() => setExpandedDraft(null)} className="text-xs px-3 py-1.5" style={{color:'#7A5A5A'}}>Cancel</button>
                              </div>
                            </div>
                          ) : (
                            <p className="text-xs text-secondary mt-1 line-clamp-2">{d.body}</p>
                          )}
                          {d.context && <p className="text-xs mt-1 italic" style={{color:'#aaa'}}>{d.context}</p>}
                        </div>
                        <div className="flex gap-1.5 flex-shrink-0">
                          <button onClick={() => { setExpandedDraft(d.id); setEditDraftBody(d.body); }} className="p-1.5 rounded-lg hover:bg-gray-100" title="Edit">
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#7A5A5A" strokeWidth="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>
                          </button>
                          {d.channel === 'email' && window.__amyCRM?.gmailConnected && (
                            <button onClick={() => window.__amyCRM.sendDraftEmail(d)} className="p-1.5 rounded-lg hover:bg-blue-50" title="Send via Gmail" style={{color:'#003744'}}>
                              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                            </button>
                          )}
                          <button onClick={() => approveDraft(d.id)} className="p-1.5 rounded-lg hover:bg-green-50" title="Approve" style={{color:'#2D6A2D'}}>
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="20 6 9 17 4 12"></polyline></svg>
                          </button>
                          <button onClick={() => discardDraft(d.id)} className="p-1.5 rounded-lg hover:bg-red-50" title="Discard" style={{color:'#B72552'}}>
                            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
                          </button>
                        </div>
                      </div>
                    </div>
                  ))}
                </div>
              </div>
            )}

            {/* SPHERE NURTURING — Upcoming Touches */}
            {upcomingTouches.length > 0 && (
              <div>
                <h3 className="font-semibold text-sm mb-2 flex items-center gap-2" style={{color:'#003744'}}>
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#003744" strokeWidth="2"><circle cx="12" cy="12" r="10"></circle><path d="M8 14s1.5 2 4 2 4-2 4-2"></path><line x1="9" y1="9" x2="9.01" y2="9"></line><line x1="15" y1="9" x2="15.01" y2="9"></line></svg>
                  Sphere Nurturing — Next 30 Days ({upcomingTouches.length})
                </h3>
                <div className="space-y-2">
                  {upcomingTouches.map(t => {
                    const typeColors = {
                      birthday: {bg:'#FFF0EC', border:'#FE8982', icon:'🎂'},
                      closing_anniversary: {bg:'#E8F5E9', border:'#2D6A2D', icon:'🏠'},
                      quarterly_checkin: {bg:'#E0F0F2', border:'#003744', icon:'👋'},
                      holiday: {bg:'#FFEEE3', border:'#B72552', icon:'🎄'},
                      market_update: {bg:'#F3E5F5', border:'#7F1330', icon:'📊'},
                      referral_ask: {bg:'#FFF8E1', border:'#FF8F00', icon:'🤝'},
                      home_checkup: {bg:'#E0F0F2', border:'#003744', icon:'🔑'},
                      just_because: {bg:'#FFEEE3', border:'#FE8982', icon:'💌'},
                      custom: {bg:'#F5F5F5', border:'#666', icon:'📌'}
                    };
                    const tc = typeColors[t.touch_type] || typeColors.custom;
                    const daysUntil = Math.round((new Date(t.scheduled_date + 'T12:00:00') - new Date()) / 86400000);
                    return (
                      <div key={t.id} className="glass-card p-3" style={{borderLeft:`3px solid ${tc.border}`, background: tc.bg}}>
                        <div className="flex items-start justify-between gap-2">
                          <div className="flex-1 min-w-0">
                            <div className="flex items-center gap-2 mb-0.5">
                              <span>{tc.icon}</span>
                              <span className="text-xs font-medium">{t.touch_type.replace(/_/g, ' ').replace(/\b\w/g, l => l.toUpperCase())}</span>
                              <span className="text-xs px-1.5 py-0.5 rounded-full" style={{background: daysUntil <= 3 ? '#B72552' : '#003744', color:'white'}}>
                                {daysUntil === 0 ? 'Today' : daysUntil === 1 ? 'Tomorrow' : `${daysUntil} days`}
                              </span>
                              <span className="text-xs px-1.5 py-0.5 rounded-full" style={{background:'#FFEEE3', color:'#7F1330'}}>{t.channel}</span>
                            </div>
                            <p className="text-sm font-medium">{t.contacts?.first_name} {t.contacts?.last_name}</p>
                            <p className="text-xs text-secondary mt-0.5">{t.description}</p>
                          </div>
                          <div className="flex gap-1 flex-shrink-0">
                            <button onClick={() => {
                              const name = (t.contacts?.first_name || '') + ' ' + (t.contacts?.last_name || '');
                              const input = document.querySelector('input[placeholder*="Assistant"]');
                              if (input) { input.value = `Draft a ${t.channel === 'email' ? 'email' : 'message'} to ${name} for their ${t.touch_type.replace(/_/g, ' ')}`; input.focus(); input.dispatchEvent(new Event('input', {bubbles:true})); }
                            }} className="p-1.5 rounded-lg hover:bg-white" title="Ask Assistant to draft" style={{color:'#003744'}}>
                              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>
                            </button>
                            <button onClick={() => completeTouchAction(t.id, 'complete')} className="p-1.5 rounded-lg hover:bg-white" title="Mark complete" style={{color:'#2D6A2D'}}>
                              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="20 6 9 17 4 12"></polyline></svg>
                            </button>
                            <button onClick={() => completeTouchAction(t.id, 'skip')} className="p-1.5 rounded-lg hover:bg-white" title="Skip" style={{color:'#7A5A5A'}}>
                              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="5 12 12 5 19 12"></polyline><line x1="12" y1="19" x2="12" y2="5"></line></svg>
                            </button>
                          </div>
                        </div>
                      </div>
                    );
                  })}
                </div>
              </div>
            )}

            {/* STALE SPHERE — Needs Attention */}
            {staleSphere.length > 0 && (
              <div>
                <h3 className="font-semibold text-sm mb-2 flex items-center gap-2" style={{color:'#B72552'}}>
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#B72552" strokeWidth="2"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>
                  Sphere Going Cold ({staleSphere.length})
                </h3>
                <div className="glass-card p-3" style={{borderLeft:'3px solid #B72552'}}>
                  <div className="space-y-2">
                    {staleSphere.map((s, i) => {
                      const daysSince = s.last_contact_date ? Math.round((Date.now() - new Date(s.last_contact_date).getTime()) / 86400000) : null;
                      return (
                        <div key={i} className="flex items-center justify-between text-xs">
                          <div className="flex items-center gap-2">
                            <span className="w-2 h-2 rounded-full flex-shrink-0" style={{background: daysSince === null ? '#B72552' : daysSince > 180 ? '#B72552' : '#FE8982'}}></span>
                            <span><strong>{s.first_name} {s.last_name}</strong> <span className="text-secondary">({s.contact_type.replace('_', ' ')})</span></span>
                          </div>
                          <div className="flex items-center gap-2">
                            <span className="text-secondary">{daysSince ? `${daysSince} days` : 'never contacted'}</span>
                            <button onClick={() => {
                              const input = document.querySelector('input[placeholder*="Assistant"]');
                              if (input) { input.value = `Draft a check-in email to ${s.first_name} ${s.last_name}`; input.focus(); input.dispatchEvent(new Event('input', {bubbles:true})); }
                            }} className="px-2 py-0.5 rounded text-xs" style={{background:'#FFEEE3', color:'#7F1330'}}>Draft</button>
                          </div>
                        </div>
                      );
                    })}
                  </div>
                  <p className="text-xs mt-3 italic" style={{color:'#7A5A5A'}}>Tell the Assistant: "Who haven't I talked to in 3 months?" or "Schedule a coffee with the Smiths"</p>
                </div>
              </div>
            )}

            <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
              <div>
                <h3 className="font-semibold text-sm mb-2" style={{color:'#7F1330'}}>Today's Schedule</h3>
                {todayShowings.length === 0 && todayTasks.length === 0 ? (
                  <div className="glass-card p-4 text-center"><p className="text-secondary text-xs">Nothing scheduled for today. Use the Assistant to add showings or tasks.</p></div>
                ) : (
                  <div className="space-y-2">
                    {todayShowings.map((s, i) => (
                      <div key={`s${i}`} className="glass-card p-3" style={{borderLeft:'3px solid #B72552'}}>
                        <div className="flex items-center gap-1.5 mb-0.5">
                          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#B72552" strokeWidth="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>
                          <span className="text-xs font-medium" style={{color:'#B72552'}}>Showing {s.time ? `at ${s.time}` : ''}</span>
                        </div>
                        <p className="text-sm font-medium">{s.property}</p>
                        <p className="text-xs text-secondary">{s.client}</p>
                      </div>
                    ))}
                    {todayTasks.map((t, i) => (
                      <div key={`t${i}`} className="glass-card p-3" style={{borderLeft:'3px solid #003744'}}>
                        <div className="flex items-center gap-1.5 mb-0.5">
                          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#003744" strokeWidth="2"><polyline points="9 11 12 14 22 4"></polyline><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"></path></svg>
                          <span className="text-xs font-medium" style={{color:'#003744'}}>Task &middot; {t.priority}</span>
                        </div>
                        <p className="text-sm font-medium">{t.title}</p>
                      </div>
                    ))}

              <div className="grid grid-cols-1 sm:grid-cols-2 gap-x-6 gap-y-1">
                {[
