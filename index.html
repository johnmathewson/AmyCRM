    // PIPELINE (SMART LIST)
    // PIPELINE — Dashboard view of contacts in active pipeline stages
    function Pipeline() {
      const [stages, setStages] = useState([]);
      const [contacts, setContacts] = useState([]);
      const [summary, setSummary] = useState({ grossVolume: 0, pipelineValue: 0, potentialComm: 0, totalActive: 0 });
      const [expandedStage, setExpandedStage] = useState(null);

      useEffect(() => {
        fetchPipeline();
        const handleRefresh = () => fetchPipeline();
        window.addEventListener('crm-data-changed', handleRefresh);
        return () => window.removeEventListener('crm-data-changed', handleRefresh);
      }, []);

      const fetchPipeline = async () => {
        const [stagesRes, contactsRes, transRes] = await Promise.all([
          supabase.from('pipeline_stages').select('*').order('display_order'),
          supabase.from('contacts').select('*, pipeline_stages(*)').not('pipeline_stage_id', 'is', null).eq('pipeline_archived', false).order('updated_at', { ascending: false }),
          supabase.from('transactions').select('*, contacts(first_name, last_name), properties(address_street, address_city)').not('status', 'in', '("closed","cancelled")'),
        ]);
        setStages(stagesRes.data || []);
        setContacts(contactsRes.data || []);
        // Compute summary from active transactions
        const trans = transRes.data || [];
        const grossVolume = trans.reduce((s, t) => s + (t.list_price || 0), 0);
        const pipelineValue = trans.reduce((s, t) => s + (t.contract_price || t.list_price || 0), 0);
        const potentialComm = trans.reduce((s, t) => s + ((t.contract_price || t.list_price || 0) * (t.commission_rate || 0.025)), 0);
        setSummary({ grossVolume, pipelineValue, potentialComm, totalActive: contactsRes.data?.length || 0 });
      };

      const moveStage = async (contactId, newStageId) => {
        await supabase.from('contacts').update({ pipeline_stage_id: newStageId }).eq('id', contactId);
        fetchPipeline();
      };

      const archiveContact = async (contactId) => {
        await supabase.from('contacts').update({ pipeline_archived: true }).eq('id', contactId);
        fetchPipeline();
      };

      const fmt = (v) => v ? '$' + Number(v).toLocaleString() : '$0';
      const fmtK = (v) => v >= 1000000 ? '$' + (v/1000000).toFixed(1) + 'M' : v >= 1000 ? '$' + (v/1000).toFixed(0) + 'K' : fmt(v);

      const stageContacts = (stageId) => contacts.filter(c => c.pipeline_stage_id === stageId);

      return (
        <div className="flex-1 flex flex-col p-3 sm:p-6 overflow-hidden min-h-0">
          <div className="flex items-center justify-between mb-5">
            <div>
              <h2 className="text-lg font-semibold" style={{color:'#7F1330'}}>Pipeline</h2>
              <p className="text-secondary text-xs mt-0.5">{summary.totalActive} active contacts in pipeline</p>
            </div>
          </div>

          {/* Summary cards */}
          <div className="grid grid-cols-3 gap-4 mb-5">
            <div className="glass p-4 text-center">
              <p className="text-xs text-secondary">Gross List Volume</p>
              <p className="text-xl font-semibold" style={{color:'#7F1330'}}>{fmtK(summary.grossVolume)}</p>
            </div>
            <div className="glass p-4 text-center">
              <p className="text-xs text-secondary">Pipeline Value</p>
              <p className="text-xl font-semibold">{fmtK(summary.pipelineValue)}</p>
            </div>
            <div className="glass p-4 text-center">
              <p className="text-xs text-secondary">Potential Net Commission (2.5%)</p>
              <p className="text-xl font-semibold" style={{color:'#22c55e'}}>{fmtK(summary.potentialComm)}</p>
            </div>
          </div>

          {/* Stage columns */}
          <div className="flex-1 overflow-y-auto">
            <div className="space-y-3">
              {stages.filter(s => s.name !== 'Closed Won' && s.name !== 'Closed Lost').map(stage => {
                const sc = stageContacts(stage.id);
                const isExpanded = expandedStage === stage.id || sc.length <= 3;
                return (
                  <div key={stage.id} className="glass">
                    <div className="flex items-center justify-between p-3 cursor-pointer" onClick={() => setExpandedStage(expandedStage === stage.id ? null : stage.id)} style={{borderLeft: '4px solid ' + stage.color}}>
                      <div className="flex items-center gap-3">
                        <h3 className="font-medium text-sm">{stage.name}</h3>
                        <span className="badge" style={{background: stage.color + '20', color: stage.color}}>{sc.length}</span>
                      </div>
                      <span className="text-xs text-secondary">{isExpanded ? '▾' : '▸'}</span>
                    </div>
                    {(isExpanded || sc.length <= 3) && sc.length > 0 && (
                      <div className="px-3 pb-3 space-y-2">
                        {(isExpanded ? sc : sc.slice(0, 3)).map(c => (
                          <div key={c.id} className="flex items-center justify-between p-2.5 rounded-lg hover:bg-[#FFF5F0] transition">
                            <div className="flex items-center gap-3">
                              <div className="w-8 h-8 rounded-full flex items-center justify-center text-white text-xs font-semibold" style={{background:'linear-gradient(135deg, #7F1330, #B72552)'}}>
                                {(c.first_name?.[0] || '')}{(c.last_name?.[0] || '')}
                              </div>
                              <div>
                                <p className="text-sm font-medium">{c.first_name} {c.last_name}</p>
                                <div className="flex items-center gap-2">
                                  {c.lead_type && <span className="text-xs text-secondary">{c.lead_type}</span>}
                                  {c.temperature && <span className="text-xs" style={{color: c.temperature === 'hot' ? '#ef4444' : c.temperature === 'warm' ? '#f59e0b' : '#6b7280'}}>{c.temperature}</span>}
                                </div>
                              </div>
                            </div>
                            <div className="flex items-center gap-1">
                              <select className="input-glass text-xs py-1 px-2" value={c.pipeline_stage_id} onChange={e => { e.stopPropagation(); moveStage(c.id, e.target.value); }} onClick={e => e.stopPropagation()}>
                                {stages.map(s => <option key={s.id} value={s.id}>{s.name}</option>)}
                              </select>
                              <button onClick={(e) => { e.stopPropagation(); archiveContact(c.id); }} className="text-xs text-secondary hover:text-[#B72552] px-1" title="Remove from pipeline">✕</button>
                            </div>
                          </div>
                        ))}
                      </div>
                    )}
                  </div>
                );
              })}
            </div>
          </div>
        </div>
      );
    }

    // TRANSACTIONS
    function Transactions() {
      const [transactions, setTransactions] = useState([]);
      const [selectedTransaction, setSelectedTransaction] = useState(null);
      const [tasks, setTasks] = useState([]);
      const [showAddForm, setShowAddForm] = useState(false);
      const [contacts, setContacts] = useState([]);
      const [contactSearch, setContactSearch] = useState('');
      const [showNewContact, setShowNewContact] = useState(false);
      const [formData, setFormData] = useState({
        contact_id: '', transaction_type: 'listing', status: 'pre_listing',
        address: '', city: '', state: 'IN', zip: '',
        list_price: '', contract_price: '', commission_rate: '2.5',
        contract_date: '', closing_date: '',
        title_company: '', lender_name: '', co_agent_name: '', co_agent_brokerage: '', co_agent_phone: '', co_agent_email: '', notes: ''
      });
      const [newContact, setNewContact] = useState({ first_name: '', last_name: '', email: '', phone: '' });
      const STATUSES = [
        { id: 'pre_listing', label: 'Pre-Listing', color: '#E8F0F2', text: '#003744' },
        { id: 'active', label: 'Active', color: '#EEF2FF', text: '#4f46e5' },
        { id: 'under_contract', label: 'Under Contract', color: '#FFEEE3', text: '#FE8982' },
        { id: 'pending', label: 'Pending', color: '#FFF0EC', text: '#7F1330' },
        { id: 'closed', label: 'Closed', color: '#E8F9EE', text: '#22c55e' },
        { id: 'cancelled', label: 'Cancelled', color: '#F5F5F5', text: '#999' },
      ];

      useEffect(() => {
        fetchTransactions();
        fetchContacts();
        const handleRefresh = () => { fetchTransactions(); };
        window.addEventListener('crm-data-changed', handleRefresh);
        return () => window.removeEventListener('crm-data-changed', handleRefresh);
      }, []);

      const fetchTransactions = async () => {
        const { data } = await supabase.from('transactions').select('*, contacts(*), properties(*)').order('created_at', { ascending: false });
        setTransactions(data || []);
      };

      const fetchContacts = async () => {
        const { data } = await supabase.from('contacts').select('id, first_name, last_name, email, phone').order('last_name');
        setContacts(data || []);
      };

      const fetchTransactionTasks = async (transactionId) => {
        const { data } = await supabase.from('transaction_tasks').select('*').eq('transaction_id', transactionId).order('display_order');
        setTasks(data || []);
      };

      const handleSelectTransaction = (transaction) => {
        setSelectedTransaction(transaction);
        fetchTransactionTasks(transaction.id);
      };

      const handleToggleTask = async (taskId, isCompleted) => {
        await supabase.from('transaction_tasks').update({ is_completed: !isCompleted, completed_at: !isCompleted ? new Date().toISOString() : null }).eq('id', taskId);
        fetchTransactionTasks(selectedTransaction.id);
      };

      const generateMilestones = async (transactionId, closingDate) => {
        if (!closingDate) return;
        const { data: templates } = await supabase.from('milestone_templates').select('*').order('sort_order');
        if (!templates?.length) return;
        const closing = new Date(closingDate);
        const milestones = templates.map(t => {
          const due = new Date(closing); due.setDate(due.getDate() - t.days_before_close);
          return { title: t.title, description: t.description, priority: t.priority, due_date: due.toISOString().split('T')[0], status: 'pending', transaction_id: transactionId };
        });
        await supabase.from('transaction_tasks').insert(milestones);
        window.dispatchEvent(new CustomEvent('crm-data-changed'));
      };

      const createNewContactForTransaction = async () => {
        if (!newContact.first_name || !newContact.last_name) { alert('First and last name required'); return; }
        const { data, error } = await supabase.from('contacts').insert([{ ...newContact, contact_type: 'client' }]).select().single();
        if (error) { alert('Error creating contact: ' + error.message); return; }
        setFormData({ ...formData, contact_id: data.id });
        setContacts([...contacts, data]);
        setShowNewContact(false);
        setNewContact({ first_name: '', last_name: '', email: '', phone: '' });
      };

      const handleAddTransaction = async (e) => {
        e.preventDefault();
        if (!formData.contact_id) { alert('Please select or create a client'); return; }
        if (!formData.address) { alert('Please enter a property address'); return; }
        // Create property record
        const { data: prop } = await supabase.from('properties').insert([{
          address_street: formData.address, address_city: formData.city, address_state: formData.state, address_zip: formData.zip,
          list_price: formData.list_price ? parseFloat(formData.list_price) : null, status: formData.status === 'closed' ? 'sold' : 'active'
        }]).select().single();
        if (!prop) { alert('Error creating property'); return; }
        // Create transaction
        const { data, error } = await supabase.from('transactions').insert([{
          contact_id: formData.contact_id, property_id: prop.id,
          transaction_type: formData.transaction_type, status: formData.status,
          list_price: formData.list_price ? parseFloat(formData.list_price) : null,
          contract_price: formData.contract_price ? parseFloat(formData.contract_price) : null,
          commission_rate: formData.commission_rate ? parseFloat(formData.commission_rate) / 100 : 0.025,
          contract_date: formData.contract_date || null, closing_date: formData.closing_date || null,
          title_company: formData.title_company || null, lender_name: formData.lender_name || null,
          co_agent_name: formData.co_agent_name || null, co_agent_brokerage: formData.co_agent_brokerage || null,
          co_agent_phone: formData.co_agent_phone || null, co_agent_email: formData.co_agent_email || null,
          notes: formData.notes || null,
        }]).select();
        if (error) { alert('Error: ' + error.message); return; }
        if (data?.[0] && formData.closing_date && ['under_contract','pending','closed'].includes(formData.status)) {
          await generateMilestones(data[0].id, formData.closing_date);
        }
        setShowAddForm(false);
        setFormData({ contact_id: '', transaction_type: 'listing', status: 'pre_listing', address: '', city: '', state: 'IN', zip: '', list_price: '', contract_price: '', commission_rate: '2.5', contract_date: '', closing_date: '', title_company: '', lender_name: '', co_agent_name: '', co_agent_brokerage: '', co_agent_phone: '', co_agent_email: '', notes: '' });
        fetchTransactions();
      };

      const updateTransactionStatus = async (transId, newStatus) => {
        await supabase.from('transactions').update({ status: newStatus }).eq('id', transId);
        const updated = { ...selectedTransaction, status: newStatus };
        setSelectedTransaction(updated);
        fetchTransactions();
        // Generate milestones if moving to under_contract and has closing date
        if (newStatus === 'under_contract' && selectedTransaction.closing_date) {
          await generateMilestones(transId, selectedTransaction.closing_date);
          fetchTransactionTasks(transId);
        }
      };

      const updateTransactionField = async (field, value) => {
        await supabase.from('transactions').update({ [field]: value || null }).eq('id', selectedTransaction.id);
        setSelectedTransaction({ ...selectedTransaction, [field]: value });
        fetchTransactions();
      };

      const getStatusStyle = (status) => {
        const s = STATUSES.find(st => st.id === status) || STATUSES[0];
        return { background: s.color, color: s.text };
      };

      const filteredContacts = contacts.filter(c => {
        if (!contactSearch) return true;
        const q = contactSearch.toLowerCase();
        return (c.first_name + ' ' + c.last_name).toLowerCase().includes(q) || (c.email || '').toLowerCase().includes(q);
      });

      const fmt = (v) => v ? '$' + Number(v).toLocaleString() : '—';
      const selectedContactName = contacts.find(c => c.id === formData.contact_id);

      return (
        <div className="flex-1 flex flex-col p-3 sm:p-6 overflow-hidden min-h-0">
          <div className="flex justify-between items-center mb-6">
            <h2 className="text-lg font-semibold">Transactions</h2>
            <button onClick={() => setShowAddForm(true)} className="btn-primary">+ Add Transaction</button>
          </div>

          {/* ADD TRANSACTION MODAL */}
          {showAddForm && (
            <div className="fixed inset-0 bg-black/20 z-[999] flex items-center justify-center" onClick={() => setShowAddForm(false)}>
              <div className="bg-white rounded-2xl p-6 max-w-2xl w-full mx-4 max-h-[90vh] overflow-y-auto border border-[#F0D5CC] shadow-lg" onClick={e => e.stopPropagation()}>
                <h3 className="text-lg font-semibold mb-5">New Transaction</h3>
                <form onSubmit={handleAddTransaction} className="space-y-4">

                  {/* Client selection */}
                  <div>
                    <label className="text-sm text-secondary mb-2 block">Client</label>
                    {!formData.contact_id ? (
                      <div>
                        <input className="input-glass w-full mb-2" placeholder="Search contacts by name..." value={contactSearch} onChange={e => setContactSearch(e.target.value)} />
                        <div className="max-h-32 overflow-y-auto border border-[#F0D5CC] rounded-lg">
                          {filteredContacts.slice(0, 8).map(c => (
                            <div key={c.id} onClick={() => { setFormData({...formData, contact_id: c.id}); setContactSearch(''); }} className="px-3 py-2 hover:bg-[#FFF5F0] cursor-pointer text-sm border-b border-[#F0D5CC]/30">
                              <span className="font-medium">{c.first_name} {c.last_name}</span>
                              {c.email && <span className="text-secondary ml-2">{c.email}</span>}
                            </div>
                          ))}
                        </div>
                        <button type="button" onClick={() => setShowNewContact(true)} className="text-xs mt-2" style={{color:'#7F1330'}}>+ Create New Client</button>
                        {showNewContact && (
                          <div className="glass p-3 mt-2 space-y-2">
                            <div className="grid grid-cols-2 gap-2">
                              <input className="input-glass" placeholder="First name" value={newContact.first_name} onChange={e => setNewContact({...newContact, first_name: e.target.value})} />
                              <input className="input-glass" placeholder="Last name" value={newContact.last_name} onChange={e => setNewContact({...newContact, last_name: e.target.value})} />
                            </div>
                            <div className="grid grid-cols-2 gap-2">
                              <input className="input-glass" placeholder="Email" value={newContact.email} onChange={e => setNewContact({...newContact, email: e.target.value})} />
                              <input className="input-glass" placeholder="Phone" value={newContact.phone} onChange={e => setNewContact({...newContact, phone: e.target.value})} />
                            </div>
                            <div className="flex gap-2">
                              <button type="button" onClick={createNewContactForTransaction} className="btn-primary text-xs">Create Client</button>
                              <button type="button" onClick={() => setShowNewContact(false)} className="btn-secondary text-xs">Cancel</button>
                            </div>
                          </div>
                        )}
                      </div>
                    ) : (
                      <div className="flex items-center gap-2">
                        <span className="input-glass flex-1 py-2">{selectedContactName ? selectedContactName.first_name + ' ' + selectedContactName.last_name : 'Selected'}</span>
                        <button type="button" onClick={() => setFormData({...formData, contact_id: ''})} className="btn-secondary text-xs">Change</button>
                      </div>
                    )}
                  </div>

                  {/* Transaction type */}
                  <div className="grid grid-cols-2 gap-3">
                    <div>
                      <label className="text-sm text-secondary mb-2 block">Type</label>
                      <select value={formData.transaction_type} onChange={e => setFormData({...formData, transaction_type: e.target.value})} className="input-glass w-full">
                        <option value="listing">Listing</option>
                        <option value="buyer">Buyer</option>
                        <option value="dual">Dual</option>
                        <option value="referral">Referral</option>
                        <option value="lease">Lease</option>
                      </select>
                    </div>
                    <div>
                      <label className="text-sm text-secondary mb-2 block">Status</label>
                      <select value={formData.status} onChange={e => setFormData({...formData, status: e.target.value})} className="input-glass w-full">
                        {STATUSES.map(s => <option key={s.id} value={s.id}>{s.label}</option>)}
                      </select>
                    </div>
                  </div>

                  {/* Property address */}
                  <div>
                    <label className="text-sm text-secondary mb-2 block">Property Address</label>
                    <input className="input-glass w-full" placeholder="123 Main St" value={formData.address} onChange={e => setFormData({...formData, address: e.target.value})} required />
                  </div>
                  <div className="grid grid-cols-3 gap-3">
                    <input className="input-glass" placeholder="City" value={formData.city} onChange={e => setFormData({...formData, city: e.target.value})} />
                    <input className="input-glass" placeholder="State" value={formData.state} onChange={e => setFormData({...formData, state: e.target.value})} />
                    <input className="input-glass" placeholder="Zip" value={formData.zip} onChange={e => setFormData({...formData, zip: e.target.value})} />
                  </div>

                  {/* Pricing */}
                  <div className="grid grid-cols-3 gap-3">
                    <div><label className="text-sm text-secondary mb-1 block">List Price</label><input type="number" className="input-glass w-full" placeholder="300000" value={formData.list_price} onChange={e => setFormData({...formData, list_price: e.target.value})} /></div>
                    <div><label className="text-sm text-secondary mb-1 block">Contract Price</label><input type="number" className="input-glass w-full" placeholder="295000" value={formData.contract_price} onChange={e => setFormData({...formData, contract_price: e.target.value})} /></div>
                    <div><label className="text-sm text-secondary mb-1 block">Commission %</label><input type="number" step="0.1" className="input-glass w-full" placeholder="2.5" value={formData.commission_rate} onChange={e => setFormData({...formData, commission_rate: e.target.value})} /></div>
                  </div>

                  {/* Dates */}
                  <div className="grid grid-cols-2 gap-3">
                    <div><label className="text-sm text-secondary mb-1 block">Contract Date</label><input type="date" className="input-glass w-full" value={formData.contract_date} onChange={e => setFormData({...formData, contract_date: e.target.value})} /></div>
                    <div><label className="text-sm text-secondary mb-1 block">Closing Date</label><input type="date" className="input-glass w-full" value={formData.closing_date} onChange={e => setFormData({...formData, closing_date: e.target.value})} /></div>
                  </div>

                  {/* Other parties */}
                  <div className="grid grid-cols-2 gap-3">
                    <div><label className="text-sm text-secondary mb-1 block">Title Company</label><input className="input-glass w-full" value={formData.title_company} onChange={e => setFormData({...formData, title_company: e.target.value})} /></div>
                    <div><label className="text-sm text-secondary mb-1 block">Lender</label><input className="input-glass w-full" value={formData.lender_name} onChange={e => setFormData({...formData, lender_name: e.target.value})} /></div>
                  </div>
                  <div className="grid grid-cols-2 gap-3">
                    <div><label className="text-sm text-secondary mb-1 block">Co-Agent Name</label><input className="input-glass w-full" value={formData.co_agent_name} onChange={e => setFormData({...formData, co_agent_name: e.target.value})} /></div>
                    <div><label className="text-sm text-secondary mb-1 block">Co-Agent Brokerage</label><input className="input-glass w-full" value={formData.co_agent_brokerage} onChange={e => setFormData({...formData, co_agent_brokerage: e.target.value})} /></div>
                  </div>

                  <div><label className="text-sm text-secondary mb-1 block">Notes</label><textarea className="input-glass w-full" rows="2" value={formData.notes} onChange={e => setFormData({...formData, notes: e.target.value})} /></div>

                  <div className="flex gap-3 pt-2">
                    <button type="button" onClick={() => setShowAddForm(false)} className="btn-secondary flex-1">Cancel</button>
                    <button type="submit" className="btn-primary flex-1">Create Transaction</button>
                  </div>
                </form>
              </div>
            </div>
          )}

          {/* TRANSACTION LIST */}
          <div className="flex-1 overflow-y-auto">
            {transactions.length === 0 ? (
              <div className="glass p-12 text-center"><p className="text-secondary">No transactions yet</p></div>
            ) : (
              <div className="grid grid-cols-1 gap-3">
                {transactions.map(trans => (
                  <div key={trans.id} onClick={() => handleSelectTransaction(trans)} className="glass-hover p-4 cursor-pointer">
                    <div className="flex justify-between items-start mb-2">
                      <div>
                        <p className="font-semibold text-sm">{trans.properties?.address_street || 'Address TBD'}{trans.properties?.address_city ? ', ' + trans.properties.address_city : ''}</p>
                        <p className="text-secondary text-xs">{trans.contacts?.first_name} {trans.contacts?.last_name} &middot; {trans.transaction_type}</p>
                      </div>
                      <span className="badge" style={getStatusStyle(trans.status)}>{STATUSES.find(s => s.id === trans.status)?.label || trans.status}</span>
                    </div>
                    <div className="flex justify-between text-xs">
                      <span className="text-secondary">List: {fmt(trans.list_price)} {trans.contract_price ? ' → Contract: ' + fmt(trans.contract_price) : ''}</span>
                      {trans.closing_date && <span className="text-secondary">Close: {new Date(trans.closing_date).toLocaleDateString()}</span>}
                    </div>
                  </div>
                ))}
              </div>
            )}
          </div>

          {/* TRANSACTION DETAIL PANEL */}
          {selectedTransaction && (
            <div className="fixed inset-0 bg-black/20 z-[999] flex items-center justify-center" onClick={() => setSelectedTransaction(null)}>
              <div className="bg-white rounded-2xl p-6 max-w-2xl w-full mx-4 max-h-[90vh] overflow-y-auto border border-[#F0D5CC] shadow-lg" onClick={e => e.stopPropagation()}>
                <div className="flex items-start justify-between mb-4">
                  <div>
                    <h3 className="text-lg font-semibold">{selectedTransaction.properties?.address_street || 'Address TBD'}</h3>
                    <p className="text-secondary text-sm">{selectedTransaction.contacts?.first_name} {selectedTransaction.contacts?.last_name} &middot; {selectedTransaction.transaction_type}</p>
                  </div>
                  <button onClick={() => setSelectedTransaction(null)}><IconClose /></button>
                </div>

                {/* Status pipeline */}
                <div className="flex gap-1 mb-5 flex-wrap">
                  {STATUSES.filter(s => s.id !== 'cancelled').map(s => (
                    <button key={s.id} onClick={() => updateTransactionStatus(selectedTransaction.id, s.id)}
                      className="px-3 py-1.5 rounded-lg text-xs font-medium transition-all"
                      style={selectedTransaction.status === s.id ? { background: s.color, color: s.text, border: '2px solid ' + s.text } : { background: '#F5F5F5', color: '#999', border: '2px solid transparent' }}>
                      {s.label}
                    </button>
                  ))}
                </div>

                {/* Pricing */}
                <div className="grid grid-cols-3 gap-3 mb-4">
                  <div className="glass p-3 text-center">
                    <p className="text-xs text-secondary">List Price</p>
                    <p className="font-semibold">{fmt(selectedTransaction.list_price)}</p>
                  </div>
                  <div className="glass p-3 text-center">
                    <p className="text-xs text-secondary">Contract Price</p>
                    <input type="number" className="input-glass w-full text-center font-semibold text-sm mt-1" value={selectedTransaction.contract_price || ''} onChange={e => updateTransactionField('contract_price', e.target.value)} placeholder="Enter price" />
                  </div>
                  <div className="glass p-3 text-center">
                    <p className="text-xs text-secondary">Commission</p>
                    <p className="font-semibold">{selectedTransaction.commission_rate ? (selectedTransaction.commission_rate * 100).toFixed(1) + '%' : '—'}</p>
                    {selectedTransaction.contract_price && selectedTransaction.commission_rate && <p className="text-xs text-secondary">{fmt(selectedTransaction.contract_price * selectedTransaction.commission_rate)}</p>}
                  </div>
                </div>

                {/* Dates */}
                <div className="grid grid-cols-2 gap-3 mb-4">
                  <div>
                    <label className="text-xs text-secondary mb-1 block">Contract Date</label>
                    <input type="date" className="input-glass w-full text-sm" value={selectedTransaction.contract_date || ''} onChange={e => updateTransactionField('contract_date', e.target.value)} />
                  </div>
                  <div>
                    <label className="text-xs text-secondary mb-1 block">Closing Date</label>
                    <input type="date" className="input-glass w-full text-sm" value={selectedTransaction.closing_date || ''} onChange={e => updateTransactionField('closing_date', e.target.value)} />
                  </div>
                </div>

                {/* Other parties */}
                <div className="grid grid-cols-2 gap-3 mb-4">
                  <div>
                    <label className="text-xs text-secondary mb-1 block">Title Company</label>
                    <input className="input-glass w-full text-sm" value={selectedTransaction.title_company || ''} onChange={e => updateTransactionField('title_company', e.target.value)} />
                  </div>
                  <div>
                    <label className="text-xs text-secondary mb-1 block">Lender</label>
                    <input className="input-glass w-full text-sm" value={selectedTransaction.lender_name || ''} onChange={e => updateTransactionField('lender_name', e.target.value)} />
                  </div>
                  <div>
                    <label className="text-xs text-secondary mb-1 block">Co-Agent</label>
                    <input className="input-glass w-full text-sm" value={selectedTransaction.co_agent_name || ''} onChange={e => updateTransactionField('co_agent_name', e.target.value)} />
                  </div>
                  <div>
                    <label className="text-xs text-secondary mb-1 block">Co-Agent Brokerage</label>
                    <input className="input-glass w-full text-sm" value={selectedTransaction.co_agent_brokerage || ''} onChange={e => updateTransactionField('co_agent_brokerage', e.target.value)} />
                  </div>
                </div>

                {/* Notes */}
                <div className="mb-4">
                  <label className="text-xs text-secondary mb-1 block">Notes</label>
                  <textarea className="input-glass w-full text-sm" rows="2" value={selectedTransaction.notes || ''} onBlur={e => updateTransactionField('notes', e.target.value)} onChange={e => setSelectedTransaction({...selectedTransaction, notes: e.target.value})} />
                </div>

                {/* Checklist */}
                <h4 className="font-semibold text-sm mb-3">Transaction Checklist</h4>
                <div className="space-y-1.5 mb-4 max-h-48 overflow-y-auto">
                  {tasks.length > 0 ? tasks.map(task => (
                    <label key={task.id} className="flex items-center gap-2 cursor-pointer hover:bg-[#FFEEE3] p-2 rounded transition">
                      <input type="checkbox" checked={task.is_completed} onChange={() => handleToggleTask(task.id, task.is_completed)} className="checkbox-glass" />
                      <span className={task.is_completed ? 'line-through text-secondary text-sm' : 'text-sm'}>{task.title}</span>
                      {task.due_date && <span className="text-xs text-secondary ml-auto">{new Date(task.due_date).toLocaleDateString()}</span>}
                    </label>
                  )) : (
                    <div className="text-center py-3">
                      <p className="text-secondary text-sm mb-2">No checklist items</p>
                      {selectedTransaction.closing_date && <button onClick={() => { generateMilestones(selectedTransaction.id, selectedTransaction.closing_date).then(() => fetchTransactionTasks(selectedTransaction.id)); }} className="btn-secondary text-xs">Generate Milestones</button>}
                    </div>
                  )}
                </div>

                {selectedTransaction.status !== 'cancelled' && (
                  <button onClick={() => updateTransactionStatus(selectedTransaction.id, 'cancelled')} className="text-xs text-secondary hover:text-[#B72552] transition mt-2">Cancel Transaction</button>
                )}
              </div>
            </div>
          )}
        </div>
      );
    }



    // CLIENTS — Contact hub (source of truth for everything)
    function Clients() {
      const [contacts, setContacts] = useState([]);
      const [stages, setStages] = useState([]);
      const [searchTerm, setSearchTerm] = useState('');
      const [filterType, setFilterType] = useState('all');
      const [showAddForm, setShowAddForm] = useState(false);
      const [editingContact, setEditingContact] = useState(null);
      const [selectedContact, setSelectedContact] = useState(null);
      const [contactHistory, setContactHistory] = useState({ notes: [], comms: [], showings: [], transactions: [] });
      const [historyTab, setHistoryTab] = useState('notes');
      const [formData, setFormData] = useState({
        first_name: '', last_name: '', email: '', phone: '',
        address_street: '', address_city: '', address_state: '', address_zip: '',
        contact_type: 'client', company_name: '', add_to_pipeline: false, pipeline_stage_id: '', lead_type: 'buyer'
      });

      useEffect(() => {
        fetchContacts();
        fetchStages();
        const handleRefresh = () => { fetchContacts(); if (selectedContact) fetchContactHistory(selectedContact.id); };
        window.addEventListener('crm-data-changed', handleRefresh);
        return () => window.removeEventListener('crm-data-changed', handleRefresh);
      }, []);

      const fetchContacts = async () => {
        const { data } = await supabase.from('contacts').select('*, pipeline_stages(id, name, color, display_order)').order('first_name');
        setContacts(data || []);
      };

      const fetchStages = async () => {
        const { data } = await supabase.from('pipeline_stages').select('*').order('display_order');
        setStages(data || []);
      };

      const fetchContactHistory = async (contactId) => {
        const [notesRes, commsRes, showingsRes, transRes] = await Promise.all([
          supabase.from('notes').select('*').eq('contact_id', contactId).order('created_at', { ascending: false }),
          supabase.from('communications').select('*').eq('contact_id', contactId).order('sent_at', { ascending: false }),
          supabase.from('showings').select('*').eq('contact_id', contactId).order('showing_date', { ascending: false }),
          supabase.from('transactions').select('*, properties(address_street, address_city)').eq('contact_id', contactId).order('created_at', { ascending: false }),
        ]);
        setContactHistory({
          notes: notesRes.data || [], comms: commsRes.data || [],
          showings: showingsRes.data || [], transactions: transRes.data || [],
        });
      };

      const openContactDetail = (contact) => {
        setSelectedContact(contact);
        setHistoryTab('notes');
        fetchContactHistory(contact.id);
      };

      const handleAddContact = async (e) => {
        e.preventDefault();
        const { add_to_pipeline, pipeline_stage_id, lead_type, ...contactFields } = formData;
        const insertData = { ...contactFields };
        if (add_to_pipeline && pipeline_stage_id) {
          insertData.pipeline_stage_id = pipeline_stage_id;
          insertData.lead_type = lead_type;
          insertData.temperature = 'warm';
          insertData.lead_score = 50;
          insertData.pipeline_entered_at = new Date().toISOString();
          insertData.contact_type = 'lead';
        }
        const { error } = await supabase.from('contacts').insert([insertData]);
        if (error) { alert('Error: ' + error.message); return; }
        setShowAddForm(false);
        setFormData({ first_name: '', last_name: '', email: '', phone: '', address_street: '', address_city: '', address_state: '', address_zip: '', contact_type: 'client', company_name: '', add_to_pipeline: false, pipeline_stage_id: '', lead_type: 'buyer' });
        fetchContacts();
      };

      const handleUpdateContact = async () => {
        if (!editingContact) return;
        const { id, created_at, updated_at, pipeline_stages, ...u } = editingContact;
        const { error } = await supabase.from('contacts').update({
          first_name: u.first_name, last_name: u.last_name, email: u.email, phone: u.phone,
          address_street: u.address_street, address_city: u.address_city, address_state: u.address_state, address_zip: u.address_zip,
          contact_type: u.contact_type, source: u.source, notes: u.notes,
          company_name: u.company_name || null, preferred_channel: u.preferred_channel || null,
          sphere_tier: u.sphere_tier || null, birthday: u.birthday || null, anniversary: u.anniversary || null,
        }).eq('id', id);
        if (error) { alert('Error: ' + error.message); return; }
        setEditingContact(null);
        fetchContacts();
        if (selectedContact?.id === id) {
          const { data } = await supabase.from('contacts').select('*, pipeline_stages(id, name, color, display_order)').eq('id', id).single();
          if (data) setSelectedContact(data);
        }
      };

      const handleDeleteContact = async (id) => {
        if (!window.confirm('Delete this contact and all linked records?')) return;
        await supabase.from('contacts').delete().eq('id', id);
        if (selectedContact?.id === id) setSelectedContact(null);
        fetchContacts();
      };

      const addToPipeline = async (contactId, stageId, leadType) => {
        await supabase.from('contacts').update({
          pipeline_stage_id: stageId, lead_type: leadType || 'buyer', temperature: 'warm',
          lead_score: 50, pipeline_entered_at: new Date().toISOString(), pipeline_archived: false,
        }).eq('id', contactId);
        fetchContacts();
        if (selectedContact?.id === contactId) {
          const { data } = await supabase.from('contacts').select('*, pipeline_stages(id, name, color, display_order)').eq('id', contactId).single();
          if (data) setSelectedContact(data);
        }
      };

      const changeStage = async (contactId, newStageId) => {
        await supabase.from('contacts').update({ pipeline_stage_id: newStageId }).eq('id', contactId);
        fetchContacts();
        if (selectedContact?.id === contactId) {
          const { data } = await supabase.from('contacts').select('*, pipeline_stages(id, name, color, display_order)').eq('id', contactId).single();
          if (data) setSelectedContact(data);
        }
      };

      const removeFromPipeline = async (contactId) => {
        await supabase.from('contacts').update({ pipeline_stage_id: null, pipeline_archived: true }).eq('id', contactId);
        fetchContacts();
        if (selectedContact?.id === contactId) {
          const { data } = await supabase.from('contacts').select('*, pipeline_stages(id, name, color, display_order)').eq('id', contactId).single();
          if (data) setSelectedContact(data);
        }
      };

      const getCategory = (type) => {
        if (['client', 'lead', 'past_client', 'sphere', 'referral_partner'].includes(type)) return 'client';
        if (type === 'vendor') return 'vendor';
        if (type === 'contractor') return 'contractor';
        return 'client';
      };

      const filtered = contacts.filter(c => {
        const nameMatch = `${c.first_name} ${c.last_name} ${c.email || ''} ${c.phone || ''} ${c.company_name || ''}`.toLowerCase().includes(searchTerm.toLowerCase());
        const typeMatch = filterType === 'all' || (filterType === 'pipeline' ? c.pipeline_stage_id && !c.pipeline_archived : getCategory(c.contact_type) === filterType);
        return nameMatch && typeMatch;
      });

      const typeCounts = { all: contacts.length, client: 0, vendor: 0, contractor: 0, pipeline: 0 };
      contacts.forEach(c => { typeCounts[getCategory(c.contact_type)]++; if (c.pipeline_stage_id && !c.pipeline_archived) typeCounts.pipeline++; });

      const formatAddress = (c) => [c.address_street, c.address_city, c.address_state, c.address_zip].filter(Boolean).join(', ');
      const typeColor = (t) => ({ client: '#B72552', vendor: '#003744', contractor: '#7F1330', lead: '#FFC6BF', past_client: '#B72552', sphere: '#B72552' })[t] || '#7A5A5A';

      // ---- CONTACT DETAIL VIEW ----
      if (selectedContact) {
        const c = selectedContact;
        const addr = formatAddress(c);
        const h = contactHistory;
        const inPipeline = c.pipeline_stage_id && !c.pipeline_archived;
        const tabCounts = { notes: h.notes.length, comms: h.comms.length, showings: h.showings.length, transactions: h.transactions.length };

        return (
          <div className="flex-1 flex flex-col p-3 sm:p-6 overflow-hidden min-h-0">
            <button onClick={() => setSelectedContact(null)} className="flex items-center gap-1 text-xs mb-4 hover:underline" style={{color:'#7F1330'}}>
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="15 18 9 12 15 6"></polyline></svg>
              Back to Contacts
            </button>

            <div className="glass p-4 sm:p-6 mb-4">
              <div className="flex flex-col sm:flex-row sm:items-start justify-between gap-3">
                <div className="flex items-center gap-4">
                  <div className="w-14 h-14 rounded-full flex items-center justify-center text-white font-semibold text-lg flex-shrink-0" style={{background: 'linear-gradient(135deg, #7F1330, #B72552)'}}>
                    {(c.first_name?.[0] || '')}{(c.last_name?.[0] || '')}
                  </div>
                  <div>
                    <h2 className="text-lg font-semibold">{c.first_name} {c.last_name}</h2>
                    {c.company_name && <p className="text-sm text-secondary">{c.company_name}</p>}
                    <div className="flex items-center gap-2 mt-1">
                      <span className="text-xs px-2 py-0.5 rounded-full text-white" style={{background: typeColor(c.contact_type)}}>{c.contact_type}</span>
                      {c.temperature && <span className="text-xs px-2 py-0.5 rounded-full" style={{background: c.temperature === 'hot' ? '#FFE5E8' : c.temperature === 'warm' ? '#FFEEE3' : '#E8F0F2', color: c.temperature === 'hot' ? '#B72552' : c.temperature === 'warm' ? '#FE8982' : '#003744'}}>{c.temperature}</span>}
                      {c.lead_type && <span className="text-xs text-secondary">{c.lead_type}</span>}
                    </div>
                  </div>
                </div>
                <div className="flex gap-2">
                  <button onClick={() => setEditingContact(c)} className="btn-secondary text-xs">Edit</button>
                  <button onClick={() => handleDeleteContact(c.id)} className="btn-secondary text-xs text-[#B72552]">Delete</button>
                </div>
              </div>

              <div className="grid grid-cols-1 sm:grid-cols-3 gap-4 mt-5">
                <div><p className="text-xs font-medium mb-0.5 text-secondary">Email</p><p className="text-sm">{c.email || <span className="text-secondary italic">Not set</span>}</p></div>
                <div><p className="text-xs font-medium mb-0.5 text-secondary">Phone</p><p className="text-sm">{c.phone || <span className="text-secondary italic">Not set</span>}</p></div>
                <div><p className="text-xs font-medium mb-0.5 text-secondary">Address</p><p className="text-sm">{addr || <span className="text-secondary italic">Not set</span>}</p></div>
              </div>

              {/* Pipeline section */}
              <div className="mt-4 pt-4 border-t" style={{borderColor:'#F0D5CC'}}>
                <p className="text-xs font-medium mb-2 text-secondary">Pipeline Status</p>
                {inPipeline ? (
                  <div>
                    <div className="flex flex-wrap gap-1 mb-2">
                      {stages.filter(s => s.name !== 'Closed Won' && s.name !== 'Closed Lost').map(s => (
                        <button key={s.id} onClick={() => changeStage(c.id, s.id)}
                          className="px-2.5 py-1 rounded-lg text-xs font-medium transition-all"
                          style={c.pipeline_stage_id === s.id ? { background: s.color, color: '#fff', border: '2px solid ' + s.color } : { background: '#F5F5F5', color: '#999', border: '2px solid transparent' }}>
                          {s.name}
                        </button>
                      ))}
                    </div>
                    <button onClick={() => removeFromPipeline(c.id)} className="text-xs text-secondary hover:text-[#B72552]">Remove from pipeline</button>
                  </div>
                ) : (
                  <div className="flex items-center gap-2">
                    <select id="addStageSelect" className="input-glass text-xs py-1 px-2" defaultValue="">
                      <option value="" disabled>Select stage...</option>
                      {stages.map(s => <option key={s.id} value={s.id}>{s.name}</option>)}
                    </select>
                    <select id="addLeadType" className="input-glass text-xs py-1 px-2" defaultValue="buyer">
                      <option value="buyer">Buyer</option>
                      <option value="seller">Seller</option>
                      <option value="both">Both</option>
                      <option value="investor">Investor</option>
                    </select>
                    <button onClick={() => {
                      const stageId = document.getElementById('addStageSelect').value;
                      const leadType = document.getElementById('addLeadType').value;
                      if (stageId) addToPipeline(c.id, stageId, leadType);
                    }} className="btn-primary text-xs">Add to Pipeline</button>
                  </div>
                )}
              </div>
            </div>

            {/* History tabs */}
            <div className="flex gap-1 mb-3 overflow-x-auto">
              {[['notes','Notes'],['comms','Comms'],['showings','Showings'],['transactions','Transactions']].map(([key, label]) => (
                <button key={key} onClick={() => setHistoryTab(key)} className="text-xs px-3 py-1.5 rounded-full whitespace-nowrap transition-all" style={historyTab === key ? {background:'#7F1330', color:'#fff'} : {background:'#FFEEE3', color:'#7A5A5A'}}>
                  {label} ({tabCounts[key]})
                </button>
              ))}
            </div>

            <div className="flex-1 overflow-y-auto space-y-2">
              {historyTab === 'notes' && (h.notes.length === 0 ? <p className="text-secondary text-xs py-8 text-center">No notes yet.</p> : h.notes.map(n => (
                <div key={n.id} className="glass p-3"><p className="text-sm whitespace-pre-wrap">{n.content}</p><p className="text-xs mt-1.5 text-secondary">{new Date(n.created_at).toLocaleDateString('en-US', { month:'short', day:'numeric', year:'numeric', hour:'numeric', minute:'2-digit' })}</p></div>
              )))}
              {historyTab === 'comms' && (h.comms.length === 0 ? <p className="text-secondary text-xs py-8 text-center">No communications logged.</p> : h.comms.map(cm => (
                <div key={cm.id} className="glass p-3">
                  <div className="flex items-center gap-2 mb-1"><span className="badge badge-warm" style={{fontSize:10}}>{cm.channel}</span><span className="text-xs text-secondary">{cm.direction}</span></div>
                  {cm.subject && <p className="text-sm font-medium">{cm.subject}</p>}
                  <p className="text-sm text-secondary">{cm.body}</p>
                  <p className="text-xs mt-1.5 text-secondary">{cm.sent_at ? new Date(cm.sent_at).toLocaleDateString() : ''}</p>
                </div>
              )))}
              {historyTab === 'showings' && (h.showings.length === 0 ? <p className="text-secondary text-xs py-8 text-center">No showings recorded.</p> : h.showings.map(s => (
                <div key={s.id} className="glass p-3">
                  <p className="text-sm font-medium">{s.property_address}</p>
                  <p className="text-xs text-secondary">{s.showing_date}{s.showing_time ? ` at ${s.showing_time}` : ''}</p>
                  <span className="badge" style={{fontSize:10, background: s.status === 'completed' ? '#E8F9EE' : '#FFEEE3', color: s.status === 'completed' ? '#22c55e' : '#7F1330'}}>{s.status}</span>
                </div>
              )))}
              {historyTab === 'transactions' && (h.transactions.length === 0 ? <p className="text-secondary text-xs py-8 text-center">No transactions.</p> : h.transactions.map(t => (
                <div key={t.id} className="glass p-3">
                  <div className="flex justify-between items-start">
                    <div>
                      <p className="text-sm font-medium">{t.properties?.address_street || 'Property TBD'}{t.properties?.address_city ? ', ' + t.properties.address_city : ''}</p>
                      <p className="text-xs text-secondary">{t.transaction_type} &middot; ${(t.contract_price || t.list_price || 0).toLocaleString()}</p>
                    </div>
                    <span className="badge" style={{fontSize:10, background: t.status === 'closed' ? '#E8F9EE' : '#FFEEE3', color: t.status === 'closed' ? '#22c55e' : '#7F1330'}}>{t.status}</span>
                  </div>
                </div>
              )))}
            </div>

            {/* Edit modal */}
            {editingContact && (
              <div className="fixed inset-0 bg-black/20 z-[999] flex items-center justify-center" onClick={() => setEditingContact(null)}>
                <div className="bg-white rounded-2xl p-6 max-w-lg w-full mx-4 max-h-[85vh] overflow-y-auto border border-[#F0D5CC] shadow-lg" onClick={e => e.stopPropagation()}>
                  <h3 className="text-lg font-semibold mb-6">Edit Contact</h3>
                  <form onSubmit={(e) => { e.preventDefault(); handleUpdateContact(); }} className="space-y-4">

                      <div><label className="text-xs text-secondary mb-1 block">State</label><input value={editingContact.address_state || ''} onChange={e => setEditingContact({...editingContact, address_state: e.target.value})} className="input-glass w-full" /></div>
                      <div><label className="text-xs text-secondary mb-1 block">ZIP</label><input value={editingContact.address_zip || ''} onChange={e => setEditingContact({...editingContact, address_zip: e.target.value})} className="input-glass w-full" /></div>

                      <div><label className="text-xs text-secondary mb-1 block">Preferred Channel</label>
                        <select value={editingContact.preferred_channel || 'email'} onChange={e => setEditingContact({...editingContact, preferred_channel: e.target.value})} className="input-glass w-full">
                          {['email','sms','call','in_person'].map(t => <option key={t} value={t}>{t.replace(/_/g,' ')}</option>)}

                    <div className="grid grid-cols-2 gap-3">
                      <div><label className="text-xs text-secondary mb-1 block">Birthday</label><input type="date" value={editingContact.birthday || ''} onChange={e => setEditingContact({...editingContact, birthday: e.target.value})} className="input-glass w-full" /></div>
                      <div><label className="text-xs text-secondary mb-1 block">Anniversary</label><input type="date" value={editingContact.anniversary || ''} onChange={e => setEditingContact({...editingContact, anniversary: e.target.value})} className="input-glass w-full" /></div>
                    </div>
                    <div className="flex gap-3 pt-2">
                      <button type="button" onClick={() => setEditingContact(null)} className="btn-secondary flex-1">Cancel</button>
                      <button type="submit" className="btn-primary flex-1">Save</button>
                    </div>
                  </form>
                </div>
              </div>
            )}
          </div>
        );
      }

      // ---- CONTACTS LIST VIEW ----
      return (
        <div className="flex-1 flex flex-col p-3 sm:p-6 overflow-hidden min-h-0">
          <div className="flex flex-col sm:flex-row sm:items-center justify-between gap-3 mb-4">
            <div>
              <h2 className="text-lg font-semibold" style={{color:'#7F1330'}}>Contacts</h2>
              <p className="text-secondary text-xs mt-0.5">{contacts.length} contacts</p>
            </div>
            <button onClick={() => setShowAddForm(true)} className="btn-primary text-xs">+ Add Contact</button>
          </div>

          <div className="flex flex-col sm:flex-row gap-2 mb-4">
            <input type="text" placeholder="Search name, email, phone..." value={searchTerm} onChange={e => setSearchTerm(e.target.value)} className="input-glass flex-1" />
            <div className="flex gap-1 flex-wrap">
              {[['all','All'],['pipeline','Pipeline'],['client','Clients'],['vendor','Vendors']].map(([val,label]) => (
                <button key={val} onClick={() => setFilterType(val)} className="text-xs px-3 py-1.5 rounded-full transition-all" style={filterType === val ? {background:'#7F1330', color:'#fff'} : {background:'#FFEEE3', color:'#7A5A5A'}}>{label} ({typeCounts[val] || 0})</button>

          {/* Add contact form */}
          {showAddForm && (
            <div className="fixed inset-0 bg-black/20 z-[999] flex items-center justify-center" onClick={() => setShowAddForm(false)}>
              <div className="bg-white rounded-2xl p-6 max-w-lg w-full mx-4 max-h-[85vh] overflow-y-auto border border-[#F0D5CC] shadow-lg" onClick={e => e.stopPropagation()}>

                <form onSubmit={handleAddContact} className="space-y-4">
