    // TRANSACTIONS
    function Transactions() {
      const [transactions, setTransactions] = useState([]);
      const [selectedTransaction, setSelectedTransaction] = useState(null);
      const [tasks, setTasks] = useState([]);
      const [showAddForm, setShowAddForm] = useState(false);
      const [formData, setFormData] = useState({
        contact_id: '', property_id: '', transaction_type: 'buyer',
        status: 'active', contract_price: '', list_price: '',
        commission_rate: 0.025, contract_date: '', closing_date: ''
      });

      useEffect(() => {
        fetchTransactions();
        const handleRefresh = () => fetchTransactions();
        window.addEventListener('crm-data-changed', handleRefresh);
        return () => window.removeEventListener('crm-data-changed', handleRefresh);
      }, []);

      const fetchTransactions = async () => {
        try {
          const { data, error } = await supabase.from('transactions').select('*, contacts(*), properties(*)');
          if (error) throw error;
          if (data) setTransactions(data);
        } catch (err) {
          console.error('Error fetching transactions:', err);
        }
      };

      const fetchTransactionTasks = async (transactionId) => {
        try {
          const { data, error } = await supabase
            .from('transaction_tasks')
            .select('*')
            .eq('transaction_id', transactionId)
            .order('display_order');
          if (error) throw error;
          if (data) setTasks(data);
        } catch (err) {
          console.error('Error fetching tasks:', err);
        }
      };

      const handleSelectTransaction = (transaction) => {
        setSelectedTransaction(transaction);
        fetchTransactionTasks(transaction.id);
      };

      const handleToggleTask = async (taskId, isCompleted) => {
        try {
          const { error } = await supabase
            .from('transaction_tasks')
            .update({ is_completed: !isCompleted, completed_at: !isCompleted ? new Date().toISOString() : null })
            .eq('id', taskId);
          if (error) throw error;
          fetchTransactionTasks(selectedTransaction.id);
        } catch (err) {
          console.error('Error updating task:', err);
        }
      };

      const generateMilestones = async (transactionId, closingDate) => {
        if (!closingDate) return;
        try {
          const { data: templates } = await supabase.from('milestone_templates').select('*').order('sort_order');
          if (!templates || templates.length === 0) return;
          const closing = new Date(closingDate);
          const milestones = templates.map(t => {
            const due = new Date(closing);
            due.setDate(due.getDate() - t.days_before_close);
            return { title: t.title, description: `${t.description} [Transaction: ${transactionId}]`, priority: t.priority, due_date: due.toISOString().split('T')[0], status: 'pending' };
          });
          await supabase.from('tasks').insert(milestones);
          window.dispatchEvent(new CustomEvent('crm-data-changed'));
        } catch (err) { console.error('Error generating milestones:', err); }
      };

      const handleAddTransaction = async (e) => {
        e.preventDefault();
        try {
          const { data, error } = await supabase.from('transactions').insert([{
            contact_id: formData.contact_id,
            property_id: formData.property_id,
            transaction_type: formData.transaction_type,
            status: formData.status,
            contract_price: formData.contract_price ? parseInt(formData.contract_price) : null,
            list_price: formData.list_price ? parseInt(formData.list_price) : null,
            commission_rate: parseFloat(formData.commission_rate),
            contract_date: formData.contract_date || null,
            closing_date: formData.closing_date || null
          }]).select();
          if (error) throw error;
          // Auto-generate milestones if under contract with closing date
          if (data && data[0] && (formData.status === 'under_contract' || formData.status === 'pending') && formData.closing_date) {
            await generateMilestones(data[0].id, formData.closing_date);
          }
          setShowAddForm(false);
          setFormData({
            contact_id: '', property_id: '', transaction_type: 'buyer',
            status: 'active', contract_price: '', list_price: '',
            commission_rate: 0.025, contract_date: '', closing_date: ''
          });
          fetchTransactions();
        } catch (err) {
          console.error('Error adding transaction:', err);
          alert('Error adding transaction');
        }
      };

      const getHealthColor = (status) => {
        if (status === 'closed') return 'high';
        if (status === 'under_contract' || status === 'pending') return 'medium';
        return 'low';
      };

      return (
        <div className="flex-1 flex flex-col p-3 sm:p-6 overflow-hidden min-h-0">
          <div className="flex justify-between items-center mb-6">
            <h2 className="text-lg font-semibold">Transactions</h2>
            <button onClick={() => setShowAddForm(true)} className="btn-primary">+ Add Transaction</button>
          </div>

          {showAddForm && (
            <div className="fixed inset-0 bg-black/20 z-[999] flex items-center justify-center">
              <div className="bg-white rounded-2xl p-8 max-w-lg w-full mx-4 max-h-[85vh] overflow-y-auto border border-[#F0D5CC] shadow-lg">
                <h3 className="text-lg font-semibold mb-6">Add Transaction</h3>
                <form onSubmit={handleAddTransaction} className="space-y-4">
                  <div>
                    <label className="text-sm text-secondary mb-2 block">Transaction Type</label>
                    <select
                      value={formData.transaction_type}
                      onChange={(e) => setFormData({...formData, transaction_type: e.target.value})}
                      className="input-glass w-full"
                    >
                      <option value="buyer">Buyer</option>
                      <option value="listing">Listing</option>
                      <option value="dual">Dual</option>
                    </select>
                  </div>
                  <div>
                    <label className="text-sm text-secondary mb-2 block">Status</label>
                    <select
                      value={formData.status}
                      onChange={(e) => setFormData({...formData, status: e.target.value})}
                      className="input-glass w-full"
                    >
                      <option value="pre_listing">Pre-listing</option>
                      <option value="active">Active</option>
                      <option value="under_contract">Under Contract</option>
                      <option value="pending">Pending</option>
                      <option value="closed">Closed</option>
                    </select>
                  </div>
                  <div className="grid grid-cols-2 gap-3">
                    <div>
                      <label className="text-sm text-secondary mb-2 block">List Price</label>
                      <input
                        type="number"
                        value={formData.list_price}
                        onChange={(e) => setFormData({...formData, list_price: e.target.value})}
                        className="input-glass w-full"
                        placeholder="e.g. 300000"
                      />
                    </div>
                    <div>
                      <label className="text-sm text-secondary mb-2 block">Contract Price</label>
                      <input
                        type="number"
                        value={formData.contract_price}
                        onChange={(e) => setFormData({...formData, contract_price: e.target.value})}
                        className="input-glass w-full"
                        placeholder="e.g. 295000"
                      />
                    </div>
                  </div>
                  <div className="flex gap-3 pt-4">
                    <button type="button" onClick={() => setShowAddForm(false)} className="btn-secondary flex-1">Cancel</button>
                    <button type="submit" className="btn-primary flex-1">Add</button>
                  </div>
                </form>
              </div>
            </div>
          )}

          <div className="flex-1 overflow-y-auto">
            <div className="grid grid-cols-1 gap-4">
              {transactions.map(trans => (
                <div
                  key={trans.id}
                  onClick={() => handleSelectTransaction(trans)}
                  className="glass-hover p-4 cursor-pointer"
                >
                  <div className="flex justify-between items-start mb-2">
                    <div>
                      <p className="font-semibold text-sm">{trans.properties?.address_street || 'Address TBD'}</p>
                      <p className="text-secondary text-xs">{trans.contacts?.first_name} {trans.contacts?.last_name}</p>
                    </div>
                    <span className="badge" style={{
                      backgroundColor: trans.status === 'closed' ? '#E0F0F2' : trans.status === 'under_contract' ? '#FFEEE3' : '#FFF5F0',
                      color: trans.status === 'closed' ? '#003744' : trans.status === 'under_contract' ? '#FE8982' : '#7A5A5A'
                    }}>
                      {trans.status}
                    </span>
                  </div>
                  <div className="flex justify-between text-xs mb-2">
                    <span className="text-secondary">${trans.list_price?.toLocaleString() || '0'} → ${trans.contract_price?.toLocaleString() || 'TBD'}</span>
                  </div>
                  <div className="health-bar">
                    <div className={`health-fill ${getHealthColor(trans.status)}`} style={{width: '65%'}}></div>
                  </div>
                </div>
              ))}
            </div>
          </div>

          {selectedTransaction && (
            <div className="fixed inset-0 bg-black/20 z-[999] flex items-center justify-center">
              <div className="bg-white rounded-2xl p-8 max-w-lg w-full mx-4 max-h-[85vh] overflow-y-auto border border-[#F0D5CC] shadow-lg">
                <h3 className="text-lg font-semibold mb-4">{selectedTransaction.properties?.address_street}</h3>
                <div className="space-y-4 mb-6">
                  <div className="grid grid-cols-2 gap-4">
                    <div>
                      <p className="text-xs text-secondary">Client</p>
                      <p className="font-semibold text-sm">{selectedTransaction.contacts?.first_name} {selectedTransaction.contacts?.last_name}</p>
                    </div>
                    <div>
                      <p className="text-xs text-secondary">Status</p>
                      <p className="font-semibold text-sm">{selectedTransaction.status}</p>
                    </div>
                  </div>
                  <div className="grid grid-cols-2 gap-4">
                    <div>
                      <p className="text-xs text-secondary">List Price</p>
                      <p className="font-semibold text-sm">${selectedTransaction.list_price?.toLocaleString()}</p>
                    </div>
                    <div>
                      <p className="text-xs text-secondary">Contract Price</p>
                      <p className="font-semibold text-sm">${selectedTransaction.contract_price?.toLocaleString()}</p>
                    </div>
                  </div>
                </div>

                <h4 className="font-semibold text-sm mb-3">Checklist</h4>
                <div className="space-y-2 mb-6 max-h-48 overflow-y-auto">
                  {tasks.length > 0 ? tasks.map(task => (
                    <label key={task.id} className="flex items-center gap-2 cursor-pointer hover:bg-[#FFEEE3] p-2 rounded">
                      <input
                        type="checkbox"
                        checked={task.is_completed}
                        onChange={() => handleToggleTask(task.id, task.is_completed)}
                        className="checkbox-glass"
                      />
                      <span className={task.is_completed ? 'line-through text-secondary text-sm' : 'text-sm'}>{task.title}</span>
                    </label>
                  )) : <p className="text-secondary text-sm">No tasks</p>}
                </div>

                <button onClick={() => setSelectedTransaction(null)} className="btn-secondary w-full">Close</button>
              </div>
            </div>
          )}
        </div>
      );
    }

    // CLIENTS
    function Clients() {
      const [contacts, setContacts] = useState([]);
      const [searchTerm, setSearchTerm] = useState('');
      const [filterType, setFilterType] = useState('all');
      const [showAddForm, setShowAddForm] = useState(false);
      const [editingContact, setEditingContact] = useState(null);
      const [selectedContact, setSelectedContact] = useState(null);
      const [contactHistory, setContactHistory] = useState({ notes: [], comms: [], showings: [], transactions: [], leads: [] });
      const [historyTab, setHistoryTab] = useState('notes');
      const [formData, setFormData] = useState({
        first_name: '', last_name: '', email: '', phone: '',
        address_street: '', address_city: '', address_state: '', address_zip: '',
        contact_type: 'client'
      });

      useEffect(() => {
        fetchContacts();
        const handleRefresh = () => { fetchContacts(); if (selectedContact) fetchContactHistory(selectedContact.id); };
        window.addEventListener('crm-data-changed', handleRefresh);
        return () => window.removeEventListener('crm-data-changed', handleRefresh);
      }, []);

      const fetchContacts = async () => {
        try {
          const { data, error } = await supabase.from('contacts').select('*').order('first_name');
          if (error) throw error;
          if (data) setContacts(data);
        } catch (err) { console.error('Error fetching contacts:', err); }
      };

      const fetchContactHistory = async (contactId) => {
        try {
          const [notesRes, commsRes, showingsRes, transRes, leadsRes] = await Promise.all([
            supabase.from('notes').select('*').eq('contact_id', contactId).order('created_at', { ascending: false }),
            supabase.from('communications').select('*').eq('contact_id', contactId).order('sent_at', { ascending: false }),
            supabase.from('showings').select('*').eq('contact_id', contactId).order('showing_date', { ascending: false }),
            supabase.from('transactions').select('*, properties(address, city, state, zip)').eq('contact_id', contactId).order('created_at', { ascending: false }),
            supabase.from('leads').select('*, pipeline_stages(name)').eq('contact_id', contactId)
          ]);
          setContactHistory({
            notes: notesRes.data || [],
            comms: commsRes.data || [],
            showings: showingsRes.data || [],
            transactions: transRes.data || [],
            leads: leadsRes.data || []
          });
        } catch (err) { console.error('Error fetching history:', err); }
      };

      const openContactDetail = (contact) => {
        setSelectedContact(contact);
        setHistoryTab('notes');
        fetchContactHistory(contact.id);
      };

      const handleAddContact = async (e) => {
        e.preventDefault();
        try {
          const { error } = await supabase.from('contacts').insert([formData]);
          if (error) throw error;
          setShowAddForm(false);
          setFormData({ first_name: '', last_name: '', email: '', phone: '', address_street: '', address_city: '', address_state: '', address_zip: '', contact_type: 'client' });
          fetchContacts();
        } catch (err) { console.error(err); alert('Error adding contact'); }
      };

      const handleUpdateContact = async () => {
        if (!editingContact) return;
        try {
          const { id, created_at, updated_at, ...u } = editingContact;
          const { error } = await supabase.from('contacts').update({
            first_name: u.first_name, last_name: u.last_name, email: u.email, phone: u.phone,
            address_street: u.address_street, address_city: u.address_city, address_state: u.address_state, address_zip: u.address_zip,
            contact_type: u.contact_type, source: u.source, notes: u.notes,
          }).eq('id', id);
          if (error) throw error;
          setEditingContact(null);
          fetchContacts();
          if (selectedContact && selectedContact.id === id) setSelectedContact({...editingContact});
        } catch (err) { console.error(err); alert('Error updating contact'); }
      };

      const handleDeleteContact = async (id) => {
        if (!window.confirm('Delete this contact and all linked records?')) return;
        try {
          await supabase.from('contacts').delete().eq('id', id);
          if (selectedContact && selectedContact.id === id) setSelectedContact(null);
          fetchContacts();
        } catch (err) { console.error(err); alert('Error deleting contact'); }
      };

      const filtered = contacts.filter(c => {
        const nameMatch = `${c.first_name} ${c.last_name} ${c.email || ''} ${c.phone || ''}`.toLowerCase().includes(searchTerm.toLowerCase());
        const typeMatch = filterType === 'all' || c.contact_type === filterType;
        return nameMatch && typeMatch;
      });

      const typeCounts = { all: contacts.length, lead: 0, client: 0, vendor: 0, agent: 0, lender: 0, other: 0 };
      contacts.forEach(c => { if (typeCounts[c.contact_type] !== undefined) typeCounts[c.contact_type]++; else typeCounts.other++; });

      const formatAddress = (c) => {
        const parts = [c.address_street, c.address_city, c.address_state].filter(Boolean);
        if (c.address_zip) parts.push(c.address_zip);
        return parts.join(', ');
      };

      const typeColor = (t) => {
        const map = { lead: '#FFC6BF', client: '#B72552', vendor: '#003744', agent: '#FE8982', lender: '#7F1330', other: '#7A5A5A' };
        return map[t] || '#7A5A5A';
      };

      // CONTACT DETAIL VIEW
      if (selectedContact) {
        const c = selectedContact;
        const addr = formatAddress(c);
        const h = contactHistory;
        const tabCounts = { notes: h.notes.length, comms: h.comms.length, showings: h.showings.length, transactions: h.transactions.length };

        return (
          <div className="flex-1 flex flex-col p-3 sm:p-6 overflow-hidden min-h-0">
            <button onClick={() => setSelectedContact(null)} className="flex items-center gap-1 text-xs mb-4 hover:underline" style={{color:'#7F1330'}}>
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="15 18 9 12 15 6"></polyline></svg>
              Back to Clients
            </button>

            <div className="glass-card p-4 sm:p-6 mb-4">
              <div className="flex flex-col sm:flex-row sm:items-start justify-between gap-3">
                <div className="flex items-center gap-4">
                  <div className="w-14 h-14 rounded-full flex items-center justify-center text-white font-semibold text-lg flex-shrink-0" style={{background: 'linear-gradient(135deg, #7F1330, #B72552)'}}>
                    {(c.first_name?.[0] || '')}{(c.last_name?.[0] || '')}
                  </div>
                  <div>
                    <h2 className="text-lg font-semibold">{c.first_name} {c.last_name}</h2>
                    <span className="text-xs px-2 py-0.5 rounded-full text-white" style={{background: typeColor(c.contact_type)}}>{c.contact_type || 'other'}</span>
                  </div>
                </div>
                <div className="flex gap-2">
                  <button onClick={() => setEditingContact(c)} className="btn-secondary text-xs">Edit</button>
                  <button onClick={() => handleDeleteContact(c.id)} className="btn-secondary text-xs text-[#B72552]">Delete</button>
                </div>
              </div>
              <div className="grid grid-cols-1 sm:grid-cols-3 gap-4 mt-5">
                <div>
                  <p className="text-xs font-medium mb-0.5" style={{color:'#7A5A5A'}}>Email</p>
                  <p className="text-sm">{c.email || <span className="text-secondary italic">Not set</span>}</p>
                </div>
                <div>
                  <p className="text-xs font-medium mb-0.5" style={{color:'#7A5A5A'}}>Phone</p>
                  <p className="text-sm">{c.phone || <span className="text-secondary italic">Not set</span>}</p>
                </div>
                <div>
                  <p className="text-xs font-medium mb-0.5" style={{color:'#7A5A5A'}}>Address</p>
                  <p className="text-sm">{addr || <span className="text-secondary italic">Not set</span>}</p>
                </div>
              </div>
              {h.leads.length > 0 && (
                <div className="mt-4 pt-4 border-t" style={{borderColor:'#F0D5CC'}}>
                  <p className="text-xs font-medium mb-2" style={{color:'#7A5A5A'}}>Pipeline Status</p>
                  <div className="flex flex-wrap gap-2">
                    {h.leads.map(l => (
                      <span key={l.id} className="text-xs px-2.5 py-1 rounded-full" style={{background:'#FFEEE3', color:'#7F1330'}}>
                        {l.pipeline_stages?.name || 'Unknown Stage'} &middot; {l.temperature} &middot; {l.lead_type}
                      </span>
                    ))}
                  </div>
                </div>
              )}
            </div>

            <div className="flex gap-1 mb-3 overflow-x-auto">
              {[['notes','Notes'],['comms','Comms'],['showings','Showings'],['transactions','Transactions']].map(([key, label]) => (
                <button key={key} onClick={() => setHistoryTab(key)} className="text-xs px-3 py-1.5 rounded-full whitespace-nowrap transition-all" style={historyTab === key ? {background:'#7F1330', color:'#fff'} : {background:'#FFEEE3', color:'#7A5A5A'}}>
                  {label} ({tabCounts[key]})
                </button>
              ))}
            </div>

            <div className="flex-1 overflow-y-auto space-y-2">
              {historyTab === 'notes' && (h.notes.length === 0 ? <p className="text-secondary text-xs py-8 text-center">No notes yet. Use the Assistant to add notes for this contact.</p> : h.notes.map(n => (
                <div key={n.id} className="glass-card p-3">
                  <p className="text-sm whitespace-pre-wrap">{n.content}</p>
                  <p className="text-xs mt-1.5" style={{color:'#aaa'}}>{new Date(n.created_at).toLocaleDateString('en-US', { month:'short', day:'numeric', year:'numeric', hour:'numeric', minute:'2-digit' })}</p>
                </div>
              )))}

              {historyTab === 'comms' && (h.comms.length === 0 ? <p className="text-secondary text-xs py-8 text-center">No communications logged yet.</p> : h.comms.map(cm => (
                <div key={cm.id} className="glass-card p-3">
                  <div className="flex items-center gap-2 mb-1">
                    <span className="text-xs px-2 py-0.5 rounded-full" style={{background:'#FFEEE3', color:'#7F1330'}}>{cm.channel}</span>
                    <span className="text-xs" style={{color:'#aaa'}}>{cm.direction}</span>
                  </div>
                  {cm.subject && <p className="text-sm font-medium">{cm.subject}</p>}
                  <p className="text-sm text-secondary">{cm.body}</p>
                  <p className="text-xs mt-1.5" style={{color:'#aaa'}}>{cm.sent_at ? new Date(cm.sent_at).toLocaleDateString('en-US', { month:'short', day:'numeric', year:'numeric', hour:'numeric', minute:'2-digit' }) : ''}</p>
                </div>
              )))}

              {historyTab === 'showings' && (h.showings.length === 0 ? <p className="text-secondary text-xs py-8 text-center">No showings recorded yet.</p> : h.showings.map(s => (
                <div key={s.id} className="glass-card p-3 cursor-pointer hover:shadow-md transition-all">
                  <div className="flex justify-between items-start">
                    <div>
                      <p className="text-sm font-medium">{s.property_address}</p>
                      <p className="text-xs text-secondary">{s.showing_date}{s.showing_time ? ` at ${s.showing_time}` : ''}</p>
                      {s.notes && <p className="text-xs text-secondary mt-1">{s.notes}</p>}
                      {s.feedback && <p className="text-xs mt-1" style={{color:'#7F1330'}}>Feedback: {s.feedback}</p>}
                    </div>
                    <span className="text-xs px-2 py-0.5 rounded-full" style={{background: s.status === 'completed' ? '#E0F0E0' : s.status === 'cancelled' ? '#FFE0E0' : '#FFEEE3', color: s.status === 'completed' ? '#2D6A2D' : s.status === 'cancelled' ? '#B72552' : '#7F1330'}}>{s.status}</span>
                  </div>
                </div>
              )))}

              {historyTab === 'transactions' && (h.transactions.length === 0 ? <p className="text-secondary text-xs py-8 text-center">No transactions yet.</p> : h.transactions.map(t => (
                <div key={t.id} className="glass-card p-3 cursor-pointer hover:shadow-md transition-all">
                  <div className="flex justify-between items-start">
                    <div>
                      <p className="text-sm font-medium">{t.properties?.address ? `${t.properties.address}, ${t.properties.city || ''}` : 'Property TBD'}</p>
                      <p className="text-xs text-secondary">{t.transaction_type} &middot; {t.status}</p>
                      {t.closing_date && <p className="text-xs text-secondary">Closing: {new Date(t.closing_date).toLocaleDateString()}</p>}
                    </div>
                    <span className="text-xs px-2 py-0.5 rounded-full" style={{background: t.status === 'closed' ? '#E0F0E0' : '#FFEEE3', color: t.status === 'closed' ? '#2D6A2D' : '#7F1330'}}>{t.status}</span>
                  </div>
                </div>
              )))}
            </div>

            {editingContact && (
              <div className="fixed inset-0 bg-black/20 z-[999] flex items-center justify-center">
                <div className="bg-white rounded-2xl p-6 sm:p-8 max-w-lg w-full mx-4 max-h-[85vh] overflow-y-auto border border-[#F0D5CC] shadow-lg">
                  <h3 className="text-lg font-semibold mb-6">Edit Contact</h3>
                  <form onSubmit={(e) => { e.preventDefault(); handleUpdateContact(); }} className="space-y-4">
                    <div className="grid grid-cols-2 gap-3">
                      <div><label className="text-xs font-medium block mb-1" style={{color:'#7A5A5A'}}>First Name</label><input type="text" value={editingContact.first_name || ''} onChange={(e) => setEditingContact({...editingContact, first_name: e.target.value})} className="input-glass w-full" /></div>
                      <div><label className="text-xs font-medium block mb-1" style={{color:'#7A5A5A'}}>Last Name</label><input type="text" value={editingContact.last_name || ''} onChange={(e) => setEditingContact({...editingContact, last_name: e.target.value})} className="input-glass w-full" /></div>
                    </div>
                    <div><label className="text-xs font-medium block mb-1" style={{color:'#7A5A5A'}}>Email</label><input type="email" value={editingContact.email || ''} onChange={(e) => setEditingContact({...editingContact, email: e.target.value})} className="input-glass w-full" /></div>
                    <div><label className="text-xs font-medium block mb-1" style={{color:'#7A5A5A'}}>Phone</label><input type="tel" value={editingContact.phone || ''} onChange={(e) => setEditingContact({...editingContact, phone: e.target.value})} className="input-glass w-full" /></div>
                    <div><label className="text-xs font-medium block mb-1" style={{color:'#7A5A5A'}}>Street Address</label><input type="text" value={editingContact.address_street || ''} onChange={(e) => setEditingContact({...editingContact, address_street: e.target.value})} className="input-glass w-full" /></div>
                    <div className="grid grid-cols-3 gap-3">
                      <div><label className="text-xs font-medium block mb-1" style={{color:'#7A5A5A'}}>City</label><input type="text" value={editingContact.address_city || ''} onChange={(e) => setEditingContact({...editingContact, address_city: e.target.value})} className="input-glass w-full" /></div>
                      <div><label className="text-xs font-medium block mb-1" style={{color:'#7A5A5A'}}>State</label><input type="text" value={editingContact.address_state || ''} onChange={(e) => setEditingContact({...editingContact, address_state: e.target.value})} className="input-glass w-full" /></div>
                      <div><label className="text-xs font-medium block mb-1" style={{color:'#7A5A5A'}}>ZIP</label><input type="text" value={editingContact.address_zip || ''} onChange={(e) => setEditingContact({...editingContact, address_zip: e.target.value})} className="input-glass w-full" /></div>
                    </div>
                    <div><label className="text-xs font-medium block mb-1" style={{color:'#7A5A5A'}}>Type</label>
                      <select value={editingContact.contact_type || 'client'} onChange={(e) => setEditingContact({...editingContact, contact_type: e.target.value})} className="input-glass w-full">
                        {['lead','client','vendor','agent','lender','other'].map(t => <option key={t} value={t}>{t.charAt(0).toUpperCase()+t.slice(1)}</option>)}
                      </select>
                    </div>
                    <div className="flex gap-3 pt-4">
                      <button type="button" onClick={() => setEditingContact(null)} className="btn-secondary flex-1">Cancel</button>
                      <button type="submit" className="btn-primary flex-1">Save</button>
                    </div>
                  </form>
                </div>
              </div>
            )}
          </div>
        );
      }

      // CLIENTS LIST VIEW
      return (
        <div className="flex-1 flex flex-col p-3 sm:p-6 overflow-hidden min-h-0">
          <div className="flex flex-col sm:flex-row sm:items-center justify-between gap-3 mb-4">
            <div>
              <h2 className="text-lg font-semibold" style={{color:'#7F1330'}}>Clients</h2>
              <p className="text-secondary text-xs mt-0.5">{contacts.length} contacts</p>
            </div>
            <button onClick={() => setShowAddForm(true)} className="btn-primary text-xs">+ Add Contact</button>
          </div>

          <div className="flex flex-col sm:flex-row gap-2 mb-4">
            <input type="text" placeholder="Search name, email, phone..." value={searchTerm} onChange={(e) => setSearchTerm(e.target.value)} className="input-glass flex-1" />
            <div className="flex gap-1 flex-wrap">
              {[['all','All'],['lead','Leads'],['client','Clients'],['vendor','Vendors']].map(([val,label]) => (
                <button key={val} onClick={() => setFilterType(val)} className="text-xs px-3 py-1.5 rounded-full transition-all" style={filterType === val ? {background:'#7F1330', color:'#fff'} : {background:'#FFEEE3', color:'#7A5A5A'}}>{label} ({typeCounts[val] || 0})</button>
              ))}
            </div>
          </div>

          {showAddForm && (
            <div className="fixed inset-0 bg-black/20 z-[999] flex items-center justify-center">
              <div className="bg-white rounded-2xl p-6 sm:p-8 max-w-lg w-full mx-4 max-h-[85vh] overflow-y-auto border border-[#F0D5CC] shadow-lg">
                <h3 className="text-lg font-semibold mb-6">Add Contact</h3>
                <form onSubmit={handleAddContact} className="space-y-4">
                  <div className="grid grid-cols-2 gap-3">
                    <div><label className="text-xs font-medium block mb-1" style={{color:'#7A5A5A'}}>First Name</label><input type="text" value={formData.first_name} onChange={(e) => setFormData({...formData, first_name: e.target.value})} className="input-glass w-full" required /></div>
                    <div><label className="text-xs font-medium block mb-1" style={{color:'#7A5A5A'}}>Last Name</label><input type="text" value={formData.last_name} onChange={(e) => setFormData({...formData, last_name: e.target.value})} className="input-glass w-full" required /></div>
                  </div>
                  <div><label className="text-xs font-medium block mb-1" style={{color:'#7A5A5A'}}>Email</label><input type="email" value={formData.email} onChange={(e) => setFormData({...formData, email: e.target.value})} className="input-glass w-full" /></div>
                  <div><label className="text-xs font-medium block mb-1" style={{color:'#7A5A5A'}}>Phone</label><input type="tel" value={formData.phone} onChange={(e) => setFormData({...formData, phone: e.target.value})} className="input-glass w-full" /></div>
                  <div><label className="text-xs font-medium block mb-1" style={{color:'#7A5A5A'}}>Street Address</label><input type="text" value={formData.address_street} onChange={(e) => setFormData({...formData, address_street: e.target.value})} className="input-glass w-full" /></div>
                  <div className="grid grid-cols-3 gap-3">
                    <div><label className="text-xs font-medium block mb-1" style={{color:'#7A5A5A'}}>City</label><input type="text" value={formData.address_city} onChange={(e) => setFormData({...formData, address_city: e.target.value})} className="input-glass w-full" /></div>
                    <div><label className="text-xs font-medium block mb-1" style={{color:'#7A5A5A'}}>State</label><input type="text" value={formData.address_state} onChange={(e) => setFormData({...formData, address_state: e.target.value})} className="input-glass w-full" /></div>
                    <div><label className="text-xs font-medium block mb-1" style={{color:'#7A5A5A'}}>ZIP</label><input type="text" value={formData.address_zip} onChange={(e) => setFormData({...formData, address_zip: e.target.value})} className="input-glass w-full" /></div>
                  </div>
                  <div><label className="text-xs font-medium block mb-1" style={{color:'#7A5A5A'}}>Type</label>
                    <select value={formData.contact_type} onChange={(e) => setFormData({...formData, contact_type: e.target.value})} className="input-glass w-full">
                      {['lead','client','vendor','agent','lender','other'].map(t => <option key={t} value={t}>{t.charAt(0).toUpperCase()+t.slice(1)}</option>)}
                    </select>
                  </div>
                  <div className="flex gap-3 pt-4">
                    <button type="button" onClick={() => setShowAddForm(false)} className="btn-secondary flex-1">Cancel</button>
                    <button type="submit" className="btn-primary flex-1">Add</button>
                  </div>
                </form>
              </div>
            </div>
          )}

          <div className="flex-1 overflow-y-auto">
            <div className="grid grid-cols-1 gap-3">
              {filtered.map(contact => {
                const addr = formatAddress(contact);
                return (
                  <div key={contact.id} className="glass-hover p-4 cursor-pointer transition-all hover:shadow-md" onClick={() => openContactDetail(contact)}>
                    <div className="flex items-start gap-3">
                      <div className="w-10 h-10 rounded-full flex items-center justify-center text-white font-semibold text-sm flex-shrink-0" style={{background: 'linear-gradient(135deg, #7F1330, #B72552)'}}>
                        {(contact.first_name?.[0] || '')}{(contact.last_name?.[0] || '')}
                      </div>
                      <div className="flex-1 min-w-0">
                        <div className="flex items-center gap-2 mb-1">
                          <p className="font-semibold text-sm">{contact.first_name} {contact.last_name}</p>
                          <span className="text-xs px-1.5 py-0.5 rounded-full text-white" style={{background: typeColor(contact.contact_type), fontSize:'10px'}}>{contact.contact_type || 'other'}</span>
                        </div>
                        <div className="grid grid-cols-1 sm:grid-cols-2 gap-x-4 gap-y-0.5">
                          <div className="flex items-center gap-1.5">
                            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#7A5A5A" strokeWidth="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path><polyline points="22,6 12,13 2,6"></polyline></svg>
                            <p className="text-xs text-secondary truncate">{contact.email || 'No email'}</p>
                          </div>
                          <div className="flex items-center gap-1.5">
                            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#7A5A5A" strokeWidth="2"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"></path></svg>
                            <p className="text-xs text-secondary">{contact.phone || 'No phone'}</p>
                          </div>
                          {addr && (
                            <div className="flex items-center gap-1.5 sm:col-span-2">
                              <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#7A5A5A" strokeWidth="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path><circle cx="12" cy="10" r="3"></circle></svg>
                              <p className="text-xs text-secondary truncate">{addr}</p>
                            </div>
                          )}
                        </div>
                      </div>
                      <div className="flex gap-1.5 flex-shrink-0" onClick={(e) => e.stopPropagation()}>
                        <button onClick={() => setEditingContact(contact)} className="p-1.5 rounded-lg hover:bg-gray-100" title="Edit">
                          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#7A5A5A" strokeWidth="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>
                        </button>
                        <button onClick={() => handleDeleteContact(contact.id)} className="p-1.5 rounded-lg hover:bg-gray-100" title="Delete">
                          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#B72552" strokeWidth="2"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
                        </button>
                      </div>
                    </div>
                  </div>
                );
              })}
            </div>
          </div>

          {editingContact && (
            <div className="fixed inset-0 bg-black/20 z-[999] flex items-center justify-center">
              <div className="bg-white rounded-2xl p-6 sm:p-8 max-w-lg w-full mx-4 max-h-[85vh] overflow-y-auto border border-[#F0D5CC] shadow-lg">
                <h3 className="text-lg font-semibold mb-6">Edit Contact</h3>
                <form onSubmit={(e) => { e.preventDefault(); handleUpdateContact(); }} className="space-y-4">
                  <div className="grid grid-cols-2 gap-3">
                    <div><label className="text-xs font-medium block mb-1" style={{color:'#7A5A5A'}}>First Name</label><input type="text" value={editingContact.first_name || ''} onChange={(e) => setEditingContact({...editingContact, first_name: e.target.value})} className="input-glass w-full" /></div>
                    <div><label className="text-xs font-medium block mb-1" style={{color:'#7A5A5A'}}>Last Name</label><input type="text" value={editingContact.last_name || ''} onChange={(e) => setEditingContact({...editingContact, last_name: e.target.value})} className="input-glass w-full" /></div>
                  </div>
                  <div><label className="text-xs font-medium block mb-1" style={{color:'#7A5A5A'}}>Email</label><input type="email" value={editingContact.email || ''} onChange={(e) => setEditingContact({...editingContact, email: e.target.value})} className="input-glass w-full" /></div>
                  <div><label className="text-xs font-medium block mb-1" style={{color:'#7A5A5A'}}>Phone</label><input type="tel" value={editingContact.phone || ''} onChange={(e) => setEditingContact({...editingContact, phone: e.target.value})} className="input-glass w-full" /></div>
                  <div><label className="text-xs font-medium block mb-1" style={{color:'#7A5A5A'}}>Street Address</label><input type="text" value={editingContact.address_street || ''} onChange={(e) => setEditingContact({...editingContact, address_street: e.target.value})} className="input-glass w-full" /></div>
                  <div className="grid grid-cols-3 gap-3">
                    <div><label className="text-xs font-medium block mb-1" style={{color:'#7A5A5A'}}>City</label><input type="text" value={editingContact.address_city || ''} onChange={(e) => setEditingContact({...editingContact, address_city: e.target.value})} className="input-glass w-full" /></div>
                    <div><label className="text-xs font-medium block mb-1" style={{color:'#7A5A5A'}}>State</label><input type="text" value={editingContact.address_state || ''} onChange={(e) => setEditingContact({...editingContact, address_state: e.target.value})} className="input-glass w-full" /></div>
                    <div><label className="text-xs font-medium block mb-1" style={{color:'#7A5A5A'}}>ZIP</label><input type="text" value={editingContact.address_zip || ''} onChange={(e) => setEditingContact({...editingContact, address_zip: e.target.value})} className="input-glass w-full" /></div>
                  </div>
                  <div><label className="text-xs font-medium block mb-1" style={{color:'#7A5A5A'}}>Type</label>
                    <select value={editingContact.contact_type || 'client'} onChange={(e) => setEditingContact({...editingContact, contact_type: e.target.value})} className="input-glass w-full">
                      {['lead','client','vendor','agent','lender','other'].map(t => <option key={t} value={t}>{t.charAt(0).toUpperCase()+t.slice(1)}</option>)}
                    </select>
                  </div>
                  <div className="flex gap-3 pt-4">
                    <button type="button" onClick={() => setEditingContact(null)} className="btn-secondary flex-1">Cancel</button>
                    <button type="submit" className="btn-primary flex-1">Save</button>
                  </div>
                </form>
              </div>
            </div>
          )}
        </div>
      );
    }

    // COMMS HUB
    function CommsHub() {
      const [activeTab, setActiveTab] = useState('inbox');
      const [communications, setCommunications] = useState([]);
      const [contacts, setContacts] = useState([]);
      const [drafts, setDrafts] = useState([]);
      const [inboxEmails, setInboxEmails] = useState([]);
      const [inboxLoading, setInboxLoading] = useState(false);
      const [inboxLoadingMore, setInboxLoadingMore] = useState(false);
      const [inboxNextPage, setInboxNextPage] = useState(null);
      const inboxScrollRef = React.useRef(null);
      const [selectedEmail, setSelectedEmail] = useState(null);
      const [emailBody, setEmailBody] = useState('');
      const [loadingBody, setLoadingBody] = useState(false);
      const [showCompose, setShowCompose] = useState(false);
      const [showLogForm, setShowLogForm] = useState(false);
      const [editingDraft, setEditingDraft] = useState(null);
      const [composeData, setComposeData] = useState({ to: '', subject: '', body: '', contact_id: '' });
      const [logData, setLogData] = useState({ contact_id: '', channel: 'call', direction: 'outbound', subject: '', body: '' });

      const gmailOk = window.__amyCRM?.gmailConnected;

      useEffect(() => {
        fetchAll();
        const h = () => fetchAll();
        window.addEventListener('crm-data-changed', h);
        return () => window.removeEventListener('crm-data-changed', h);
      }, []);

      useEffect(() => {
        if (activeTab === 'inbox' && gmailOk) fetchInbox();
      }, [activeTab, gmailOk]);

      const fetchAll = async () => {
        const [commsRes, contactsRes, draftsRes] = await Promise.all([
          supabase.from('communications').select('*, contacts(*)').order('sent_at', {ascending: false}).limit(50),
          supabase.from('contacts').select('id, first_name, last_name, email'),
          supabase.from('drafts').select('*, contacts(*)').in('status', ['pending','approved']).order('created_at', {ascending: false})
        ]);
        if (commsRes.data) setCommunications(commsRes.data);
        if (contactsRes.data) setContacts(contactsRes.data);
        if (draftsRes.data) setDrafts(draftsRes.data);
      };

      const fetchInbox = async (loadMore = false) => {
        if (!window.__amyCRM?.userId) return;
        if (loadMore) { setInboxLoadingMore(true); } else { setInboxLoading(true); }
        try {
          const res = await fetch(SUPABASE_URL + '/functions/v1/gmail', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'apikey': SUPABASE_ANON_KEY },
            body: JSON.stringify({ action: 'list_emails', user_id: window.__amyCRM.userId, max_results: 20, page_token: loadMore ? inboxNextPage : undefined })
          });
          const data = await res.json();
          if (data.emails) {
            if (loadMore) { setInboxEmails(prev => [...prev, ...data.emails]); } else { setInboxEmails(data.emails); }
            setInboxNextPage(data.nextPageToken || null);
          }
        } catch (err) { console.error('Inbox fetch error:', err); }
        if (loadMore) { setInboxLoadingMore(false); } else { setInboxLoading(false); }
      };

      // Infinite scroll handler
      const handleInboxScroll = (e) => {
        const el = e.target;
        if (el.scrollHeight - el.scrollTop - el.clientHeight < 100 && inboxNextPage && !inboxLoadingMore) {
          fetchInbox(true);
        }
      };

      const openEmail = async (email) => {
        setSelectedEmail(email);
        setEmailBody('');
        setLoadingBody(true);
        try {
          const res = await fetch(SUPABASE_URL + '/functions/v1/gmail', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'apikey': SUPABASE_ANON_KEY },
            body: JSON.stringify({ action: 'get_email', user_id: window.__amyCRM.userId, message_id: email.id })
          });
          const data = await res.json();
          setEmailBody(data.body || data.snippet || '(No content)');
        } catch (err) { setEmailBody('Error loading email.'); }
        setLoadingBody(false);
      };

      const handleCompose = async (e) => {
        e.preventDefault();
        if (!gmailOk) { alert('Connect Gmail first.'); return; }
        try {
          const res = await fetch(SUPABASE_URL + '/functions/v1/gmail', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'apikey': SUPABASE_ANON_KEY },
            body: JSON.stringify({ action: 'send_email', user_id: window.__amyCRM.userId, to: composeData.to, subject: composeData.subject, email_body: composeData.body })
          });
          const data = await res.json();
          if (data.success) {
            // Log it
            if (composeData.contact_id) {
              await supabase.from('communications').insert([{ contact_id: composeData.contact_id, channel: 'email', direction: 'outbound', subject: composeData.subject, body: composeData.body, sent_at: new Date().toISOString() }]);
            }
            setShowCompose(false);
            setComposeData({ to: '', subject: '', body: '', contact_id: '' });
            fetchAll();
            alert('Email sent!');
          } else { alert('Send failed: ' + (data.error || 'Unknown')); }
        } catch (err) { alert('Error: ' + err.message); }
      };

      const handleSendDraft = async (draft) => {
        if (window.__amyCRM?.sendDraftEmail) window.__amyCRM.sendDraftEmail(draft);
        setTimeout(fetchAll, 1500);
      };

      const handleDiscardDraft = async (id) => {
        await supabase.from('drafts').update({ status: 'discarded' }).eq('id', id);
        fetchAll();
      };

      const handleApproveDraft = async (id) => {
        await supabase.from('drafts').update({ status: 'approved' }).eq('id', id);
        fetchAll();
      };

      const handleSaveDraftEdit = async () => {
        if (!editingDraft) return;
        await supabase.from('drafts').update({ subject: editingDraft.subject, body: editingDraft.body }).eq('id', editingDraft.id);
        setEditingDraft(null);
        fetchAll();
      };

      const handleLogComm = async (e) => {
        e.preventDefault();
        await supabase.from('communications').insert([{ ...logData, sent_at: new Date().toISOString() }]);
        setShowLogForm(false);
        setLogData({ contact_id: '', channel: 'call', direction: 'outbound', subject: '', body: '' });
        fetchAll();
      };

      const contactSelect = (val, setter, data) => (
        <select value={val} onChange={(e) => { setter(prev => ({...prev, contact_id: e.target.value})); const c = contacts.find(x => x.id === e.target.value); if (c?.email && data === 'compose') setter(prev => ({...prev, to: c.email})); }} className="input-glass w-full">
          <option value="">Select contact...</option>
          {contacts.map(c => <option key={c.id} value={c.id}>{c.first_name} {c.last_name}</option>)}
        </select>
      );

      const channelBadge = (ch) => {
        const bg = { email:'#FFF0EC', sms:'#FFEEE3', call:'#E0F0F2', in_person:'#FFF5F0' };
        const fg = { email:'#7F1330', sms:'#7A5A5A', call:'#003744', in_person:'#FE8982' };
        return <span className="badge" style={{backgroundColor: bg[ch], color: fg[ch]}}>{ch}</span>;
      };

      const parseFrom = (from) => {
        if (!from) return { name: 'Unknown', email: '' };
        const match = from.match(/^(.+?)\s*<(.+?)>$/);
        return match ? { name: match[1].replace(/"/g,''), email: match[2] } : { name: from, email: from };
      };

      const formatDate = (d) => {
        if (!d) return '';
        const date = new Date(d);
        const today = new Date();
        if (date.toDateString() === today.toDateString()) return date.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'});
        return date.toLocaleDateString([], {month:'short', day:'numeric'});
      };

      const tabCounts = { inbox: inboxEmails.length, drafts: drafts.length, log: communications.length };

      return (
        <div className="flex-1 flex flex-col p-3 sm:p-6 overflow-hidden min-h-0">
          {/* Header */}
          <div className="flex justify-between items-center mb-4">
            <h2 className="text-lg font-semibold">Communications</h2>
            <div className="flex gap-2">
              <button onClick={() => setShowLogForm(true)} className="btn-secondary text-xs">+ Log</button>
              <button onClick={() => { setShowCompose(true); setComposeData({ to:'', subject:'', body:'', contact_id:'' }); }} className="btn-primary text-xs" style={{opacity: gmailOk ? 1 : 0.5}}>
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className="inline mr-1"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
                Compose
              </button>
            </div>
          </div>

          {/* Gmail status bar */}
          <div className="flex items-center gap-2 mb-4 px-3 py-2 rounded-xl" style={{backgroundColor: gmailOk ? '#F0FFF0' : '#FFF5F0'}}>
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke={gmailOk ? '#2D6A2D' : '#7A5A5A'} strokeWidth="2"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
            {gmailOk ? (
              <span className="text-xs"><span style={{color:'#2D6A2D'}}>Gmail connected</span> <span className="text-secondary">({window.__amyCRM?.gmailEmail})</span></span>
            ) : (
              <span className="text-xs text-secondary">Gmail not connected — <button onClick={() => window.__amyCRM?.connectGmail()} className="underline" style={{color:'#7F1330'}}>Connect now</button></span>
            )}
          </div>

          {/* Tabs */}
          <div className="flex gap-1 mb-4 border-b border-[#F0D5CC]">
            {[
              { id:'inbox', label:'Inbox', count: tabCounts.inbox },
              { id:'drafts', label:'Drafts', count: tabCounts.drafts },
              { id:'log', label:'Activity Log', count: tabCounts.log }
            ].map(t => (
              <button key={t.id} onClick={() => setActiveTab(t.id)} className="px-4 py-2 text-xs font-medium transition-all" style={{ borderBottom: activeTab===t.id ? '2px solid #7F1330' : '2px solid transparent', color: activeTab===t.id ? '#7F1330' : '#7A5A5A' }}>
                {t.label} {t.count > 0 && <span className="ml-1 px-1.5 py-0.5 rounded-full text-xs" style={{backgroundColor: activeTab===t.id ? '#FFF0EC' : '#F5F5F5'}}>{t.count}</span>}
              </button>
            ))}
          </div>

          {/* Tab Content */}
          <div className="flex-1 overflow-y-auto">

            {/* INBOX TAB */}
            {activeTab === 'inbox' && (
              <div>
                {!gmailOk ? (
                  <div className="text-center py-12">
                    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#F0D5CC" strokeWidth="1.5" className="mx-auto mb-4"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
                    <p className="text-secondary text-sm mb-3">Connect Gmail to see your inbox here</p>
                    <button onClick={() => window.__amyCRM?.connectGmail()} className="btn-primary text-sm">Connect Gmail</button>
                  </div>
                ) : inboxLoading ? (
                  <div className="text-center py-12"><p className="text-secondary text-sm">Loading inbox...</p></div>
                ) : selectedEmail ? (
                  <div>
                    <button onClick={() => { setSelectedEmail(null); setEmailBody(''); }} className="text-xs text-secondary mb-3 hover:underline flex items-center gap-1">
                      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg> Back to inbox
                    </button>
                    <div className="glass p-5">
                      <h3 className="font-semibold text-sm mb-1">{selectedEmail.subject || '(No subject)'}</h3>
                      <div className="flex justify-between items-center mb-4">
                        <p className="text-xs text-secondary">From: <span className="font-medium" style={{color:'#2D2D2D'}}>{parseFrom(selectedEmail.from).name}</span> &lt;{parseFrom(selectedEmail.from).email}&gt;</p>
                        <p className="text-xs text-secondary">{selectedEmail.date}</p>
                      </div>
                      {selectedEmail.isUnread && <span className="badge mb-3 inline-block" style={{backgroundColor:'#7F1330', color:'white'}}>Unread</span>}
                      <div className="border-t border-[#F0D5CC] pt-4 mt-2">
                        {loadingBody ? <p className="text-xs text-secondary">Loading...</p> : (
                          <div className="text-sm whitespace-pre-wrap" style={{maxHeight:'400px', overflowY:'auto', lineHeight:'1.6'}}>{emailBody}</div>
                        )}
                      </div>
                      <div className="mt-4 pt-3 border-t border-[#F0D5CC] flex gap-2">
                        <button onClick={() => { setShowCompose(true); setComposeData({ to: parseFrom(selectedEmail.from).email, subject: 'Re: ' + (selectedEmail.subject||''), body: '', contact_id: '' }); }} className="btn-primary text-xs">Reply</button>
                      </div>
                    </div>
                  </div>
                ) : (
                  <div className="space-y-1" onScroll={handleInboxScroll} ref={inboxScrollRef} style={{maxHeight:'calc(100vh - 320px)', overflowY:'auto'}}>
                    <div className="flex justify-between items-center mb-2">
                      <span className="text-xs text-secondary">{inboxEmails.length} emails loaded</span>
                      <button onClick={() => fetchInbox(false)} className="text-xs text-secondary hover:underline">Refresh</button>
                    </div>
                    {inboxEmails.map(email => {
                      const sender = parseFrom(email.from);
                      return (
                        <div key={email.id} onClick={() => openEmail(email)} className="flex items-start gap-3 p-3 rounded-xl cursor-pointer hover:bg-[#FFF5F0] transition-all" style={{backgroundColor: email.isUnread ? '#FFEEE3' : 'transparent'}}>
                          <div className="w-8 h-8 rounded-full flex-shrink-0 flex items-center justify-center text-xs font-semibold text-white" style={{backgroundColor:'#7F1330'}}>
                            {sender.name.charAt(0).toUpperCase()}
                          </div>
                          <div className="flex-1 min-w-0">
                            <div className="flex justify-between items-center mb-0.5">
                              <p className="text-xs font-semibold truncate" style={{fontWeight: email.isUnread ? 600 : 400}}>{sender.name}</p>
                              <span className="text-xs text-secondary flex-shrink-0 ml-2">{formatDate(email.date)}</span>
                            </div>
                            <p className="text-xs truncate" style={{fontWeight: email.isUnread ? 600 : 400, color:'#2D2D2D'}}>{email.subject || '(No subject)'}</p>
                            <p className="text-xs text-secondary truncate mt-0.5">{email.snippet}</p>
                          </div>
                        </div>
                      );
                    })}
                    {inboxLoadingMore && <div className="text-center py-4"><p className="text-xs text-secondary">Loading more emails...</p></div>}
                    {!inboxNextPage && inboxEmails.length > 0 && <div className="text-center py-4"><p className="text-xs text-secondary">You've reached the end</p></div>}
                    {inboxEmails.length === 0 && <p className="text-center text-secondary text-sm py-8">No emails found.</p>}
                  </div>
                )}
              </div>
            )}

            {/* DRAFTS TAB */}
            {activeTab === 'drafts' && (
              <div className="space-y-3">

    // TASKS
    function Tasks() {
      const [tasks, setTasks] = useState([]);
      const [contacts, setContacts] = useState([]);
      const [showAddForm, setShowAddForm] = useState(false);
      const [formData, setFormData] = useState({
        contact_id: '', title: '', description: '',
        task_type: 'follow_up', priority: 'medium', due_date: ''
      });

      useEffect(() => {
        fetchTasksAndContacts();
        const handleRefresh = () => fetchTasksAndContacts();
        window.addEventListener('crm-data-changed', handleRefresh);
        return () => window.removeEventListener('crm-data-changed', handleRefresh);
      }, []);

      const fetchTasksAndContacts = async () => {
        try {
          const [tasksRes, contactsRes] = await Promise.all([
            supabase.from('tasks').select('*, contacts(*)').order('due_date'),
            supabase.from('contacts').select('id, first_name, last_name')
          ]);
          if (tasksRes.data) setTasks(tasksRes.data);
          if (contactsRes.data) setContacts(contactsRes.data);
        } catch (err) {
          console.error('Error fetching tasks:', err);
        }
      };

      const handleAddTask = async (e) => {
        e.preventDefault();
        try {
          const { error } = await supabase.from('tasks').insert([{
            contact_id: formData.contact_id,
            title: formData.title,
            description: formData.description,
            task_type: formData.task_type,
            priority: formData.priority,
            due_date: formData.due_date,
            status: 'pending'
          }]);
          if (error) throw error;
          setShowAddForm(false);
          setFormData({
            contact_id: '', title: '', description: '',
            task_type: 'follow_up', priority: 'medium', due_date: ''
          });
          fetchTasksAndContacts();
        } catch (err) {
          console.error('Error adding task:', err);
          alert('Error adding task');
        }
      };

      const handleToggleTask = async (taskId, status) => {
        try {
          const newStatus = status === 'completed' ? 'pending' : 'completed';
          const { error } = await supabase
            .from('tasks')
            .update({
              status: newStatus,
              completed_at: newStatus === 'completed' ? new Date().toISOString() : null
            })
            .eq('id', taskId);
          if (error) throw error;
          fetchTasksAndContacts();
        } catch (err) {
          console.error('Error updating task:', err);
        }
      };

      const handleDeleteTask = async (taskId) => {
        if (!window.confirm('Delete this task?')) return;
        try {
          await supabase.from('tasks').delete().eq('id', taskId);
          fetchTasksAndContacts();
        } catch (err) {
          console.error('Error deleting task:', err);
        }
      };

      const priorityColors = {
        urgent: '#B72552',
        high: '#FE8982',
        medium: '#7F1330',
        low: '#FFC6BF'
      };

      const groupedByPriority = {
        urgent: tasks.filter(t => t.priority === 'urgent'),
        high: tasks.filter(t => t.priority === 'high'),
        medium: tasks.filter(t => t.priority === 'medium'),
        low: tasks.filter(t => t.priority === 'low')
      };

      return (
        <div className="flex-1 flex flex-col p-3 sm:p-6 overflow-hidden min-h-0">
          <div className="flex justify-between items-center mb-6">
            <h2 className="text-lg font-semibold">Tasks</h2>
            <button onClick={() => setShowAddForm(true)} className="btn-primary">+ Add Task</button>
          </div>

          {showAddForm && (
            <div className="fixed inset-0 bg-black/20 z-[999] flex items-center justify-center">
              <div className="bg-white rounded-2xl p-8 max-w-lg w-full mx-4 max-h-[85vh] overflow-y-auto border border-[#F0D5CC] shadow-lg">
                <h3 className="text-lg font-semibold mb-6">Add Task</h3>
                <form onSubmit={handleAddTask} className="space-y-4">
                  <input
                    type="text"
                    placeholder="Title"
                    value={formData.title}
                    onChange={(e) => setFormData({...formData, title: e.target.value})}
                    className="input-glass w-full"
                    required
                  />
                  <div>
                    <label className="text-sm text-secondary mb-2 block">Contact</label>
                    <select
                      value={formData.contact_id}
                      onChange={(e) => setFormData({...formData, contact_id: e.target.value})}
                      className="input-glass w-full"
                    >
                      <option value="">Optional</option>
                      {contacts.map(c => (<option key={c.id} value={c.id}>{c.first_name} {c.last_name}</option>))}
                    </select>
                  </div>
                  <div className="grid grid-cols-2 gap-3">
                    <div>
                      <label className="text-sm text-secondary mb-2 block">Priority</label>
                      <select
                        value={formData.priority}
                        onChange={(e) => setFormData({...formData, priority: e.target.value})}
                        className="input-glass w-full"
                      >
                        <option value="urgent">Urgent</option>
                        <option value="high">High</option>
                        <option value="medium">Medium</option>
                        <option value="low">Low</option>
                      </select>
                    </div>
                    <div>
                      <label className="text-sm text-secondary mb-2 block">Due Date</label>
                      <input
                        type="date"
                        value={formData.due_date}
                        onChange={(e) => setFormData({...formData, due_date: e.target.value})}
                        className="input-glass w-full"
                      />
                    </div>
                  </div>
                  <div className="flex gap-3 pt-4">
                    <button type="button" onClick={() => setShowAddForm(false)} className="btn-secondary flex-1">Cancel</button>
                    <button type="submit" className="btn-primary flex-1">Add</button>
                  </div>
                </form>
              </div>
            </div>
          )}

          <div className="flex-1 overflow-y-auto">
            <div className="space-y-6">
              {Object.entries(groupedByPriority).map(([priority, taskList]) => (
                taskList.length > 0 && (
                  <div key={priority}>
                    <h3 className="font-semibold text-sm mb-3" style={{color: priorityColors[priority]}}>
                      {priority.toUpperCase()} ({taskList.length})
                    </h3>
                    <div className="space-y-2">
                      {taskList.map(task => (
                        <div key={task.id} className="glass p-3 flex items-center gap-3">
                          <input
                            type="checkbox"
                            checked={task.status === 'completed'}
                            onChange={() => handleToggleTask(task.id, task.status)}
                            className="checkbox-glass"
                          />
                          <div className="flex-1 min-w-0">
                            <p className={task.status === 'completed' ? 'line-through text-secondary text-sm' : 'text-sm font-medium'}>
                              {task.title}
                            </p>
                            <p className="text-xs text-secondary">
                              {task.contacts?.first_name || 'No contact'} - Due: {task.due_date}
                            </p>
                          </div>
                          <button
                            onClick={() => handleDeleteTask(task.id)}
                            className="text-secondary hover:text-[#B72552] text-xs"
                          >
                            Delete
                          </button>
                        </div>
                      ))}
                    </div>
                  </div>
                )
              ))}
            </div>
          </div>
        </div>
      );
    }

    // SHOWINGS (HARDCODED FOR NOW)
    function Showings() {
      const [showings, setShowings] = useState([]);
      const [loading, setLoading] = useState(true);
      const [showAddForm, setShowAddForm] = useState(false);
      const [contacts, setContacts] = useState([]);
      const [formData, setFormData] = useState({ contact_id: '', property_address: '', showing_date: '', showing_time: '', notes: '' });

      useEffect(() => {
        fetchShowings();
        fetchContacts();
        const handleRefresh = () => fetchShowings();
        window.addEventListener('crm-data-changed', handleRefresh);
        return () => window.removeEventListener('crm-data-changed', handleRefresh);
      }, []);

      const fetchShowings = async () => {
        const { data } = await supabase.from('showings').select('*, contacts(first_name, last_name)').order('showing_date', { ascending: false });
        if (data) setShowings(data);
        setLoading(false);
      };

      const fetchContacts = async () => {
        const { data } = await supabase.from('contacts').select('id, first_name, last_name').order('first_name');
        if (data) setContacts(data);
      };

      const addShowing = async (e) => {
        e.preventDefault();
        const { error } = await supabase.from('showings').insert([{ ...formData, status: 'scheduled' }]);
        if (!error) { setShowAddForm(false); setFormData({ contact_id: '', property_address: '', showing_date: '', showing_time: '', notes: '' }); fetchShowings(); }
      };

      const updateStatus = async (id, status) => {
        await supabase.from('showings').update({ status }).eq('id', id);
        fetchShowings();
      };

      const deleteShowing = async (id) => {
        if (!confirm('Delete this showing?')) return;
        await supabase.from('showings').delete().eq('id', id);
        fetchShowings();
      };

      const statusColor = (s) => {
        const map = { scheduled: { bg: '#FFEEE3', text: '#7F1330' }, completed: { bg: '#E0F0E0', text: '#2D6A2D' }, cancelled: { bg: '#FFE0E0', text: '#B72552' }, no_show: { bg: '#F0E0E0', text: '#7A5A5A' } };
        return map[s] || map.scheduled;
      };

      if (loading) return <div className="p-3 sm:p-6"><p className="text-secondary">Loading showings...</p></div>;

      return (
        <div className="flex-1 flex flex-col p-3 sm:p-6 overflow-hidden min-h-0">
          <div className="flex flex-col sm:flex-row sm:items-center justify-between gap-3 mb-4">
            <div>
              <h2 className="text-lg font-semibold" style={{color:'#7F1330'}}>Showings</h2>
              <p className="text-secondary text-xs mt-0.5">{showings.length} total &middot; {showings.filter(s => s.status === 'scheduled').length} upcoming</p>
            </div>
            <button onClick={() => setShowAddForm(true)} className="btn-primary text-xs">+ Add Showing</button>
          </div>

          {showAddForm && (
            <div className="fixed inset-0 bg-black/20 z-[999] flex items-center justify-center">
              <div className="bg-white rounded-2xl p-6 sm:p-8 max-w-lg w-full mx-4 border border-[#F0D5CC] shadow-lg">
                <h3 className="text-lg font-semibold mb-6">Add Showing</h3>
                <form onSubmit={addShowing} className="space-y-4">
                  <div><label className="text-xs font-medium block mb-1" style={{color:'#7A5A5A'}}>Client</label>
                    <select value={formData.contact_id} onChange={e => setFormData({...formData, contact_id: e.target.value})} className="input-glass w-full" required>
                      <option value="">Select client...</option>
                      {contacts.map(c => <option key={c.id} value={c.id}>{c.first_name} {c.last_name}</option>)}
                    </select>
                  </div>
                  <div><label className="text-xs font-medium block mb-1" style={{color:'#7A5A5A'}}>Property Address</label><input type="text" value={formData.property_address} onChange={e => setFormData({...formData, property_address: e.target.value})} className="input-glass w-full" required /></div>
                  <div className="grid grid-cols-2 gap-3">
                    <div><label className="text-xs font-medium block mb-1" style={{color:'#7A5A5A'}}>Date</label><input type="date" value={formData.showing_date} onChange={e => setFormData({...formData, showing_date: e.target.value})} className="input-glass w-full" required /></div>
                    <div><label className="text-xs font-medium block mb-1" style={{color:'#7A5A5A'}}>Time</label><input type="time" value={formData.showing_time} onChange={e => setFormData({...formData, showing_time: e.target.value})} className="input-glass w-full" /></div>
                  </div>
                  <div><label className="text-xs font-medium block mb-1" style={{color:'#7A5A5A'}}>Notes</label><textarea value={formData.notes} onChange={e => setFormData({...formData, notes: e.target.value})} rows="2" className="input-glass w-full" /></div>
                  <div className="flex gap-3 pt-2">
                    <button type="button" onClick={() => setShowAddForm(false)} className="btn-secondary flex-1">Cancel</button>
                    <button type="submit" className="btn-primary flex-1">Add</button>
                  </div>
                </form>
              </div>
            </div>
          )}

          <div className="flex-1 overflow-y-auto space-y-2">
            {showings.length === 0 ? (
              <div className="text-center py-12">
                <p className="text-secondary text-sm">No showings yet.</p>
                <p className="text-secondary text-xs mt-1">Add one manually or use the Assistant: "Schedule a showing for Sarah at 123 Main St on Friday at 2pm"</p>
              </div>
            ) : showings.map(s => {
              const sc = statusColor(s.status);
              return (
                <div key={s.id} className="glass-card p-3 sm:p-4">
                  <div className="flex items-start justify-between gap-2">
                    <div className="flex-1 min-w-0">
                      <p className="font-semibold text-sm">{s.property_address}</p>
                      <p className="text-xs text-secondary">{s.contacts ? `${s.contacts.first_name} ${s.contacts.last_name}` : 'Unknown'} &middot; {s.showing_date}{s.showing_time ? ` at ${s.showing_time}` : ''}</p>
                      {s.notes && <p className="text-xs text-secondary mt-1">{s.notes}</p>}
                    </div>
                    <div className="flex items-center gap-2 flex-shrink-0">
                      <select value={s.status} onChange={e => updateStatus(s.id, e.target.value)} className="text-xs rounded-full px-2 py-1 border-0 cursor-pointer" style={{background: sc.bg, color: sc.text}}>
                        {['scheduled','completed','cancelled','no_show'].map(st => <option key={st} value={st}>{st.replace('_',' ')}</option>)}
                      </select>
                      <button onClick={() => deleteShowing(s.id)} className="p-1 rounded hover:bg-gray-100">
                        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#B72552" strokeWidth="2"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>
                      </button>
                    </div>
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      );
    }

            .select('commission_amount')
            .eq('status', 'closed');
          if (error) throw error;
          if (data) {
            const total = data.reduce((sum, t) => sum + (t.commission_amount || 0), 0);
            setRevenue(total);
          }
        } catch (err) {
          console.error('Error fetching revenue:', err);
        }
      };

      const profit = revenue - expenses;

      return (
        <div className="flex-1 flex flex-col p-3 sm:p-6 overflow-y-auto min-h-0">

            </div>
            <div className="glass p-6">
              <p className="text-secondary text-xs mb-1">YTD Expenses</p>
              <p className="text-2xl font-semibold">${(expenses / 1000).toFixed(1)}k</p>
            </div>
            <div className="glass p-6">
              <p className="text-secondary text-xs mb-1">Net Profit</p>
              <p className="text-2xl font-semibold" style={{color: profit > 0 ? '#003744' : '#B72552'}}>
                ${(profit / 1000).toFixed(1)}k
              </p>
            </div>
          </div>
          <div className="glass p-6">
            <h3 className="font-semibold text-sm mb-4">Breakdown</h3>
            <div className="space-y-3">
              <div className="flex justify-between">
                <span className="text-sm">Commission Income</span>
                <span className="font-semibold">${revenue.toLocaleString()}</span>

              <div className="flex justify-between">
