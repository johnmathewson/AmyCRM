    // BPO PDF GENERATOR
    // ============================================================
    function renderBPOHtml(bpo) {
      const p = bpo.prospect;
      const v = bpo.valuation;
      const fmt = (n) => n ? '$' + Number(n).toLocaleString() : '—';
      const fmtK = (n) => n >= 1000 ? '$' + (n/1000).toFixed(n % 1000 === 0 ? 0 : 1) + 'K' : fmt(n);

      const trendHtml = bpo.trend.length > 1 ? bpo.trend.map((t, i) => {
        const maxP = Math.max(...bpo.trend.map(x => x.high || x.avgPrice));
        const minP = Math.min(...bpo.trend.map(x => x.low || x.avgPrice));
        const range = maxP - minP || 1;
        const barH = Math.max(8, ((t.avgPrice - minP) / range) * 80);
        const mo = new Date(t.month + '-15').toLocaleDateString('en-US', { month: 'short', year: '2-digit' });
        return `<div style="flex:1;text-align:center;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;height:100px">
          <span style="font-size:8px;font-weight:600;color:#7F1330;margin-bottom:2px">${fmtK(t.avgPrice)}</span>
          <div style="width:24px;height:${barH}px;background:linear-gradient(180deg,#7F1330,#B72552);border-radius:4px 4px 0 0"></div>
          <span style="font-size:7px;color:#7A5A5A;margin-top:3px">${mo}</span>
        </div>`;
      }).join('') : '<div style="text-align:center;padding:20px;color:#7A5A5A;font-size:10px">Insufficient trend data</div>';

      const compsRows = bpo.comps.map(c => `
        <tr style="border-bottom:1px solid #F0D5CC">
          <td style="padding:5px 6px;font-weight:600;color:#7F1330;font-size:10px">${c.num}</td>
          <td style="padding:5px 6px;font-size:9px"><strong>${c.address}</strong><br><span style="color:#7A5A5A">${c.city}</span></td>
          <td style="padding:5px 6px;font-size:9px;font-weight:600">${fmt(c.sale_price)}</td>
          <td style="padding:5px 6px;font-size:9px">${c.sqft?.toLocaleString() || '—'}</td>
          <td style="padding:5px 6px;font-size:9px">${c.beds || '—'}</td>
          <td style="padding:5px 6px;font-size:9px">${c.baths || '—'}</td>
          <td style="padding:5px 6px;font-size:9px">${c.days_on_market ?? '—'}</td>
          <td style="padding:5px 6px;font-size:9px">${c.sale_date ? new Date(c.sale_date).toLocaleDateString('en-US',{month:'short',year:'2-digit'}) : '—'}</td>
        </tr>`).join('');

      const insights = (bpo.narrative?.insights || []).map((ins, i) => {
        const icons = ['&#x1F4C8;', '&#x1F3E0;', '&#x2705;'];
        return `<div style="display:flex;align-items:flex-start;gap:8px;margin-bottom:8px">
          <span style="font-size:14px">${icons[i] || '&#x2022;'}</span>
          <span style="font-size:9px;color:#2D2D2D;line-height:1.4">${ins}</span>
        </div>`;
      }).join('');

      return `
      <div id="bpo-render" style="width:816px;min-height:1056px;background:#fff;font-family:'Inter',Arial,sans-serif;color:#2D2D2D;position:relative;padding:0;margin:0 auto">
        <!-- HEADER -->
        <div style="background:linear-gradient(135deg,#7F1330 0%,#5E0D23 100%);padding:20px 32px;display:flex;justify-content:space-between;align-items:center">
          <div>
            <div style="font-size:22px;font-weight:700;color:#fff;letter-spacing:1px"><span style="color:#FFC6BF">Amy</span>CRM</div>
            <div style="font-size:10px;color:#FFC6BF;margin-top:2px;letter-spacing:0.5px">Amy Mathewson &nbsp;|&nbsp; eXp Realty</div>
          </div>
          <div style="background:rgba(255,255,255,0.15);border-radius:8px;padding:8px 16px;text-align:right">
            <div style="font-size:9px;color:#FFC6BF;letter-spacing:0.5px">Prepared for Client Review</div>
            <div style="font-size:8px;color:rgba(255,255,255,0.6);margin-top:2px">${new Date().toLocaleDateString('en-US', {month:'long', day:'numeric', year:'numeric'})}</div>
          </div>
        </div>

        <!-- TITLE + SUBTITLE -->
        <div style="padding:16px 32px 0;border-bottom:2px solid #F0D5CC">
          <h1 style="font-size:26px;font-weight:300;color:#2D2D2D;margin:0;letter-spacing:-0.5px">Residential Value Review</h1>
          <p style="font-size:10px;color:#7A5A5A;margin:4px 0 12px">Professional pricing and market-position summary for informed decision-making.</p>
        </div>

        <!-- SUBJECT PROPERTY BAR -->
        <div style="margin:12px 32px 0;background:#FFEEE3;border-radius:10px;padding:10px 16px;display:flex;align-items:center;gap:8px">
          <span style="font-size:16px">&#x1F4CD;</span>
          <span style="font-size:12px"><strong>Subject Property:</strong> ${p.address}, ${p.city}, ${p.state} ${p.zip}</span>
        </div>

        <!-- PROPERTY DETAILS ROW -->
        <div style="display:flex;gap:0;margin:12px 32px 0;border:1px solid #F0D5CC;border-radius:10px;overflow:hidden">
          ${[
            { icon: '&#x1F6CF;', val: p.beds || '—', label: 'Bedrooms' },
            { icon: '&#x1F6BF;', val: p.baths || '—', label: 'Bathrooms' },
            { icon: '&#x1F4D0;', val: p.sqft ? p.sqft.toLocaleString() : '—', label: 'Sq Ft' },
            { icon: '&#x1F333;', val: p.lot_size || '—', label: 'Lot' },
            { icon: '&#x1F3D7;', val: p.year_built || '—', label: 'Built' },
          ].map((d,i) => `<div style="flex:1;text-align:center;padding:10px 8px;${i > 0 ? 'border-left:1px solid #F0D5CC;' : ''}">
            <div style="font-size:14px;margin-bottom:2px">${d.icon}</div>
            <div style="font-size:16px;font-weight:600">${d.val}</div>
            <div style="font-size:8px;color:#7A5A5A;text-transform:uppercase;letter-spacing:0.5px">${d.label}</div>
          </div>`).join('')}
        </div>

        <!-- MAIN TWO-COLUMN -->
        <div style="display:flex;gap:12px;margin:12px 32px 0">
          <!-- LEFT: VALUATION BOX -->
          <div style="flex:1;border:2px solid #7F1330;border-radius:12px;padding:16px;text-align:center">
            <div style="font-size:9px;text-transform:uppercase;letter-spacing:1.5px;color:#7A5A5A;font-weight:600">Recommended List Price</div>
            <div style="font-size:32px;font-weight:700;color:#7F1330;margin:4px 0">${fmt(v.recommended)}</div>
            <div style="display:flex;border-top:1px solid #F0D5CC;margin-top:8px;padding-top:8px">
              <div style="flex:1;border-right:1px solid #F0D5CC">
                <div style="font-size:8px;text-transform:uppercase;color:#7A5A5A;letter-spacing:0.5px">Est. Market Value</div>
                <div style="font-size:16px;font-weight:600;color:#2D2D2D">${fmt(v.estimated)}</div>
              </div>
              <div style="flex:1;padding-left:12px">
                <div style="font-size:8px;text-transform:uppercase;color:#7A5A5A;letter-spacing:0.5px">Value Range</div>
                <div style="font-size:16px;font-weight:600;color:#2D2D2D">${fmt(v.low)}–${fmt(v.high)}</div>
              </div>
            </div>
            <div style="font-size:8px;color:#7A5A5A;margin-top:8px;line-height:1.4">The recommended list price positions near the upper-middle of the market value range based on current conditions.</div>
          </div>

          <!-- RIGHT: INSIGHTS -->
          <div style="flex:1;border:1px solid #F0D5CC;border-radius:12px;padding:16px">
            <div style="font-size:10px;text-transform:uppercase;letter-spacing:1px;font-weight:600;color:#2D2D2D;margin-bottom:10px">Subject Property at a Glance</div>
            ${insights}
          </div>
        </div>

        <!-- COMPS TABLE + TREND -->
        <div style="display:flex;gap:12px;margin:12px 32px 0">
          <!-- COMPS TABLE -->
          <div style="flex:1.3">
            <div style="font-size:10px;text-transform:uppercase;letter-spacing:1px;font-weight:600;margin-bottom:6px">Comparable Sales Summary</div>
            <table style="width:100%;border-collapse:collapse;border:1px solid #F0D5CC;border-radius:8px;overflow:hidden;font-size:9px">
              <thead>
                <tr style="background:#FFEEE3">
                  <th style="padding:5px 6px;text-align:left;font-weight:600;font-size:8px">#</th>
                  <th style="padding:5px 6px;text-align:left;font-weight:600;font-size:8px">Address</th>
                  <th style="padding:5px 6px;text-align:left;font-weight:600;font-size:8px">Price</th>
                  <th style="padding:5px 6px;text-align:left;font-weight:600;font-size:8px">SqFt</th>
                  <th style="padding:5px 6px;text-align:left;font-weight:600;font-size:8px">Beds</th>
                  <th style="padding:5px 6px;text-align:left;font-weight:600;font-size:8px">Baths</th>
                  <th style="padding:5px 6px;text-align:left;font-weight:600;font-size:8px">DOM</th>

    async function generateAndDownloadBPO(prospectId, buttonEl) {
      if (buttonEl) { buttonEl.disabled = true; buttonEl.textContent = 'Generating...'; }
      try {
        const res = await fetch(SUPABASE_URL + '/functions/v1/generate-bpo', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'apikey': SUPABASE_ANON_KEY },
          body: JSON.stringify({ prospect_id: prospectId })
        });
        const data = await res.json();
        if (!data.success || !data.bpo) { alert('BPO generation failed: ' + (data.error || 'Unknown')); return; }

        // Render HTML
        const container = document.createElement('div');
        container.innerHTML = renderBPOHtml(data.bpo);
        container.style.position = 'fixed';
        container.style.left = '-9999px';
        document.body.appendChild(container);

        // Generate PDF
        const element = container.querySelector('#bpo-render');
        await html2pdf().set({
          margin: 0,
          filename: 'BPO-' + data.bpo.prospect.address.replace(/[^a-zA-Z0-9]/g, '-') + '.pdf',
          image: { type: 'jpeg', quality: 0.98 },
          html2canvas: { scale: 2, useCORS: true, letterRendering: true },
          jsPDF: { unit: 'pt', format: 'letter', orientation: 'portrait' }
        }).from(element).save();

        document.body.removeChild(container);
      } catch (err) { alert('Error: ' + err.message); }
      if (buttonEl) { buttonEl.disabled = false; buttonEl.textContent = 'Generate BPO'; }
    }

    // PROSPECTING AGENT MODULE
    // ============================================================
    function Prospecting() {
      const [campaigns, setCampaigns] = useState([]);
      const [selectedCampaign, setSelectedCampaign] = useState(null);
      const [prospects, setProspects] = useState([]);
      const [outreach, setOutreach] = useState([]);
      const [view, setView] = useState('campaigns'); // campaigns | cold | queue | sent | replied
      const [loading, setLoading] = useState(true);
      const [showImport, setShowImport] = useState(false);
      const [showNewCampaign, setShowNewCampaign] = useState(false);
      const [importFile, setImportFile] = useState(null);
      const [importPreview, setImportPreview] = useState(null);
      const [importMapping, setImportMapping] = useState({});
      const [importing, setImporting] = useState(false);
      const [newCampaign, setNewCampaign] = useState({ name: '', description: '', source: 'propstream' });
      const [briefMessages, setBriefMessages] = useState([]);
      const [briefInput, setBriefInput] = useState('');
      const [briefLoading, setBriefLoading] = useState(false);
      const [briefCampaignId, setBriefCampaignId] = useState(null);
      const [briefComplete, setBriefComplete] = useState(false);
      const [briefResult, setBriefResult] = useState(null);
      const briefChatRef = React.useRef(null);
      const [selectedProspects, setSelectedProspects] = useState(new Set());
      const [detailProspect, setDetailProspect] = useState(null);
      const [stats, setStats] = useState({ imported: 0, valued: 0, queued: 0, sent: 0, replied: 0, converted: 0 });
      const [generating, setGenerating] = useState(false);
      const [genProgress, setGenProgress] = useState('');

      useEffect(() => { fetchCampaigns(); }, []);
      useEffect(() => {
        if (selectedCampaign) {
          fetchProspects();
          fetchOutreach();
        }
      }, [selectedCampaign, view]);

      const fetchCampaigns = async () => {
        setLoading(true);
        const { data } = await supabase.from('prospect_campaigns').select('*').order('created_at', { ascending: false });
        setCampaigns(data || []);
        setLoading(false);
      };

      const fetchProspects = async () => {
        if (!selectedCampaign) return;
        let query = supabase.from('prospects').select('*').eq('campaign_id', selectedCampaign.id);
        if (view === 'cold') query = query.in('status', ['imported', 'valued']);
        else if (view === 'queue') query = query.in('status', ['queued']);
        else if (view === 'sent') query = query.in('status', ['outreach_sent']);
        else if (view === 'replied') query = query.in('status', ['replied', 'in_conversation', 'converted']);
        const { data } = await query.order('created_at', { ascending: false });
        setProspects(data || []);
        // Update stats
        const { data: allP } = await supabase.from('prospects').select('status').eq('campaign_id', selectedCampaign.id);
        if (allP) {
          const s = { imported: 0, valued: 0, queued: 0, sent: 0, replied: 0, converted: 0 };
          allP.forEach(p => {
            if (p.status === 'imported') s.imported++;
            else if (p.status === 'valued') s.valued++;
            else if (p.status === 'queued') s.queued++;
            else if (p.status === 'outreach_sent') s.sent++;
            else if (p.status === 'replied' || p.status === 'in_conversation') s.replied++;
            else if (p.status === 'converted') s.converted++;
          });
          setStats(s);
        }
      };

      const fetchOutreach = async () => {
        if (!selectedCampaign) return;
        let query = supabase.from('prospect_outreach').select('*, prospects(id, property_address, property_city, property_zip, owner_name, owner_email, owner_phone, our_valuation, estimated_value, status)').eq('campaign_id', selectedCampaign.id);
        if (view === 'queue') query = query.in('status', ['draft', 'approved']);
        else if (view === 'sent') query = query.in('status', ['sent', 'opened']);
        else if (view === 'replied') query = query.in('status', ['replied']);
        const { data } = await query.order('created_at', { ascending: false });
        setOutreach(data || []);
      };

      const startNewCampaign = async () => {
        // Create a placeholder campaign, then start the guided brief
        const { data, error } = await supabase.from('prospect_campaigns').insert([{ name: 'New Campaign (drafting...)', source: 'propstream' }]).select().single();
        if (!error && data) {
          setBriefCampaignId(data.id);
          setBriefMessages([]);
          setBriefComplete(false);
          setBriefResult(null);
          setBriefInput('');
          setShowNewCampaign(true);
        }
      };

      const sendBriefMessage = async () => {
        if (!briefInput.trim() || briefLoading) return;
        const userMsg = briefInput.trim();
        setBriefInput('');
        const updated = [...briefMessages, { role: 'user', content: userMsg }];
        setBriefMessages(updated);
        setBriefLoading(true);
        setTimeout(() => { if (briefChatRef.current) briefChatRef.current.scrollTop = briefChatRef.current.scrollHeight; }, 50);
        try {
          const res = await fetch(SUPABASE_URL + '/functions/v1/prospect-outreach', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'apikey': SUPABASE_ANON_KEY },
            body: JSON.stringify({ action: 'brief_chat', messages: updated, campaign_id: briefCampaignId })
          });
          const data = await res.json();
          if (data.ready && data.brief) {
            const assistantMsg = { role: 'assistant', content: 'I have what I need. Here’s the campaign brief I’ve built:' };
            setBriefMessages([...updated, assistantMsg]);
            setBriefResult(data.brief);
            setBriefComplete(true);
            // Update campaign with the name from the brief
            await supabase.from('prospect_campaigns').update({ name: data.brief.campaign_name || 'Campaign', campaign_brief: data.brief, brief_conversation: [...updated, assistantMsg] }).eq('id', briefCampaignId);
            fetchCampaigns();
          } else {
            const assistantMsg = { role: 'assistant', content: data.message || data.error || 'Could you tell me more?' };
            setBriefMessages([...updated, assistantMsg]);
          }
        } catch (err) {
          setBriefMessages([...updated, { role: 'assistant', content: 'Something went wrong: ' + err.message }]);
        }
        setBriefLoading(false);
        setTimeout(() => { if (briefChatRef.current) briefChatRef.current.scrollTop = briefChatRef.current.scrollHeight; }, 50);
      };

      const finishCampaignSetup = async () => {
        const { data } = await supabase.from('prospect_campaigns').select('*').eq('id', briefCampaignId).single();
        if (data) {
          setCampaigns([data, ...campaigns.filter(c => c.id !== data.id)]);
          setSelectedCampaign(data);
          setView('cold');
        }
        setShowNewCampaign(false);
        setBriefMessages([]);
        setBriefCampaignId(null);
        setBriefComplete(false);
        setBriefResult(null);
      };

      const deleteCampaign = async (campaignId, e) => {
        e.stopPropagation();
        if (!confirm('Delete this campaign and all its prospects and outreach? This cannot be undone.')) return;
        await supabase.from('prospect_outreach').delete().eq('campaign_id', campaignId);
        await supabase.from('prospects').delete().eq('campaign_id', campaignId);
        await supabase.from('prospect_campaigns').delete().eq('id', campaignId);
        setCampaigns(campaigns.filter(c => c.id !== campaignId));
      };

      // CSV IMPORT
      const PROPSTREAM_FIELD_MAP = {
        'property_address': ['Property Address', 'Address', 'Site Address', 'property_address', 'Prop Address', 'Property Street Address'],
        'property_city': ['Property City', 'City', 'Site City', 'property_city'],
        'property_state': ['Property State', 'State', 'Site State', 'property_state'],
        'property_zip': ['Property Zip', 'Zip', 'Site Zip', 'Zip Code', 'property_zip'],
        'property_type': ['Property Type', 'Type', 'property_type', 'Prop Type'],
        'beds': ['Beds', 'Bedrooms', 'beds', 'Bed', 'BR'],
        'baths': ['Baths', 'Bathrooms', 'baths', 'Bath', 'BA'],
        'sqft': ['SqFt', 'Sq Ft', 'Square Feet', 'sqft', 'Living Area', 'Building Sq Ft'],
        'lot_size': ['Lot Size', 'Lot SqFt', 'Lot Acres', 'lot_size'],
        'year_built': ['Year Built', 'Yr Built', 'year_built'],
        'owner_name': ['Owner Name', 'Owner', 'owner_name', 'Owner 1 Full Name', 'Owner Full Name'],
        'owner_first_name': ['Owner First Name', 'Owner 1 First Name', 'owner_first_name'],
        'owner_last_name': ['Owner Last Name', 'Owner 1 Last Name', 'owner_last_name'],
        'owner_mailing_address': ['Mailing Address', 'Mail Address', 'Owner Mailing Address', 'Mailing Street Address'],
        'owner_mailing_city': ['Mailing City', 'Mail City', 'Owner Mailing City'],
        'owner_mailing_state': ['Mailing State', 'Mail State', 'Owner Mailing State'],
        'owner_mailing_zip': ['Mailing Zip', 'Mail Zip', 'Owner Mailing Zip'],
        'owner_phone': ['Phone', 'Owner Phone', 'Phone 1', 'owner_phone'],
        'owner_email': ['Email', 'Owner Email', 'Email 1', 'owner_email'],
        'estimated_value': ['Est. Value', 'Estimated Value', 'AVM', 'estimated_value', 'Est Value'],
        'estimated_equity': ['Est. Equity', 'Estimated Equity', 'Equity', 'estimated_equity', 'Est Equity'],
        'equity_percent': ['Equity %', 'Equity Percent', 'equity_percent', 'LTV'],
        'mortgage_balance': ['Mortgage Balance', 'Loan Balance', 'Total Loans', 'mortgage_balance', 'Mtg Balance', 'Open Mortgage Balance'],
        'last_sale_date': ['Last Sale Date', 'Sale Date', 'last_sale_date'],
        'last_sale_price': ['Last Sale Price', 'Sale Price', 'last_sale_price', 'Last Sale Amount'],
        'tax_assessed_value': ['Tax Assessed Value', 'Assessed Value', 'Total Assessed Value', 'tax_assessed_value'],
        'is_absentee': ['Absentee', 'Absentee Owner', 'Owner Occupied', 'is_absentee'],
        'latitude': ['Latitude', 'Lat', 'latitude'],
        'longitude': ['Longitude', 'Lng', 'Long', 'longitude'],
      };

      const autoMapFields = (headers) => {
        const mapping = {};
        Object.entries(PROPSTREAM_FIELD_MAP).forEach(([dbField, csvAliases]) => {
          const match = headers.find(h => csvAliases.some(a => a.toLowerCase() === h.toLowerCase().trim()));
          if (match) mapping[dbField] = match;
        });
        return mapping;
      };

      const parseCSV = (text) => {
        const lines = text.split('\n').filter(l => l.trim());
        if (lines.length < 2) return null;
        const headers = lines[0].split(',').map(h => h.replace(/^"|"$/g, '').trim());
        const rows = [];
        for (let i = 1; i < lines.length; i++) {
          const values = [];
          let current = '';
          let inQuotes = false;
          for (const char of lines[i]) {
            if (char === '"') inQuotes = !inQuotes;
            else if (char === ',' && !inQuotes) { values.push(current.trim()); current = ''; }
            else current += char;
          }
          values.push(current.trim());
          if (values.length >= headers.length - 2) {
            const row = {};
            headers.forEach((h, idx) => { row[h] = values[idx] || ''; });
            rows.push(row);
          }
        }
        return { headers, rows };
      };

      const parseExcel = (data) => {
        try {
          const wb = XLSX.read(data, { type: 'array', cellDates: true });
          const sheet = wb.Sheets[wb.SheetNames[0]];
          const json = XLSX.utils.sheet_to_json(sheet, { defval: '' });
          if (!json.length) return null;
          const headers = Object.keys(json[0]);
          const rows = json.map(row => {
            const clean = {};
            headers.forEach(h => { clean[h] = row[h] !== null && row[h] !== undefined ? String(row[h]) : ''; });
            return clean;
          });
          return { headers, rows };
        } catch (err) { console.error('Excel parse error:', err); return null; }
      };

      const handleFileSelect = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        setImportFile(file);
        const ext = file.name.split('.').pop().toLowerCase();
        const reader = new FileReader();
        if (ext === 'csv') {
          reader.onload = (ev) => {
            const parsed = parseCSV(ev.target.result);
            if (parsed) { setImportPreview(parsed); setImportMapping(autoMapFields(parsed.headers)); }
          };
          reader.readAsText(file);
        } else {
          reader.onload = (ev) => {
            const parsed = parseExcel(ev.target.result);
            if (parsed) { setImportPreview(parsed); setImportMapping(autoMapFields(parsed.headers)); }
          };
          reader.readAsArrayBuffer(file);
        }
      };

      const runImport = async () => {
        if (!importPreview || !selectedCampaign) return;
        setImporting(true);
        const records = importPreview.rows.map(row => {
          const rec = { campaign_id: selectedCampaign.id, raw_import: row };
          Object.entries(importMapping).forEach(([dbField, csvCol]) => {
            let val = row[csvCol];
            if (!val || val === '') return;
            if (['beds', 'sqft', 'year_built'].includes(dbField)) val = parseInt(val) || null;
            else if (['baths', 'estimated_value', 'estimated_equity', 'equity_percent', 'mortgage_balance', 'last_sale_price', 'tax_assessed_value', 'latitude', 'longitude'].includes(dbField)) {
              val = parseFloat(val.replace(/[$,%]/g, '')) || null;
            }
            else if (dbField === 'is_absentee') val = ['yes', 'y', 'true', '1', 'absentee'].includes(val.toLowerCase());
            else if (dbField === 'last_sale_date') { const d = new Date(val); val = isNaN(d) ? null : d.toISOString().split('T')[0]; }
            if (val !== null && val !== undefined) rec[dbField] = val;
          });
          // Derive years_owned from last_sale_date
          if (rec.last_sale_date) {
            const diff = (Date.now() - new Date(rec.last_sale_date).getTime()) / (365.25 * 24 * 60 * 60 * 1000);
            rec.years_owned = Math.round(diff * 10) / 10;
          }
          return rec;
        });
        // Batch insert in chunks of 100
        let inserted = 0;
        for (let i = 0; i < records.length; i += 100) {
          const chunk = records.slice(i, i + 100);
          const { data, error } = await supabase.from('prospects').insert(chunk);
          if (!error) inserted += chunk.length;
        }
        // Update campaign totals
        await supabase.from('prospect_campaigns').update({ total_imported: inserted }).eq('id', selectedCampaign.id);
        setSelectedCampaign({ ...selectedCampaign, total_imported: inserted });
        setImporting(false);
        setShowImport(false);
        setImportFile(null);
        setImportPreview(null);
        setImportMapping({});
        fetchProspects();
      };

      // OUTREACH ACTIONS
      const approveOutreach = async (id) => {
        await supabase.from('prospect_outreach').update({ status: 'approved', approved_at: new Date().toISOString() }).eq('id', id);
        fetchOutreach();
      };

      const rejectOutreach = async (id) => {
        await supabase.from('prospect_outreach').update({ status: 'rejected' }).eq('id', id);
        fetchOutreach();
      };

      const sendOutreach = async (item) => {
        if (!window.__amyCRM?.gmailConnected) { alert('Connect Gmail first to send emails.'); return; }
        const toEmail = item.prospects?.owner_email;
        if (!toEmail) { alert('No email address for this owner.'); return; }
        if (!confirm('Send email to ' + toEmail + '?')) return;
        try {
          const res = await fetch(SUPABASE_URL + '/functions/v1/gmail', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'apikey': SUPABASE_ANON_KEY },
            body: JSON.stringify({ action: 'send_email', user_id: window.__amyCRM.userId, to: toEmail, subject: item.subject, email_body: item.body })
          });
          const data = await res.json();
          if (data.success) {
            await supabase.from('prospect_outreach').update({ status: 'sent', sent_at: new Date().toISOString() }).eq('id', item.id);
            await supabase.from('prospects').update({ status: 'outreach_sent' }).eq('id', item.prospect_id);
            fetchOutreach();
            fetchProspects();
          } else { alert('Send failed: ' + (data.error || 'Unknown')); }
        } catch (err) { alert('Error: ' + err.message); }
      };

      const markProspectStatus = async (ids, newStatus) => {
        const idArr = Array.isArray(ids) ? ids : [ids];
        await supabase.from('prospects').update({ status: newStatus }).in('id', idArr);
        setSelectedProspects(new Set());
        // Auto-generate outreach when queuing prospects that have email addresses
        if (newStatus === 'queued') {
          const { data: withEmail } = await supabase.from('prospects').select('id, owner_email').in('id', idArr);
          const emailIds = (withEmail || []).filter(p => p.owner_email).map(p => p.id);
          if (emailIds.length > 0) {
            generateOutreach(emailIds);
          }
        }
        fetchProspects();
      };

      const convertToLead = async (prospect) => {
        // Create contact
        const nameParts = (prospect.owner_name || '').split(' ');
        const { data: contact } = await supabase.from('contacts').insert([{
          first_name: prospect.owner_first_name || nameParts[0] || 'Unknown',
          last_name: prospect.owner_last_name || nameParts.slice(1).join(' ') || '',
          email: prospect.owner_email,
          phone: prospect.owner_phone,
          address_street: prospect.owner_mailing_address,
          address_city: prospect.owner_mailing_city,
          address_state: prospect.owner_mailing_state,
          address_zip: prospect.owner_mailing_zip,
          contact_type: 'lead',
          source: 'other',
          source_detail: 'Prospecting Agent - ' + (selectedCampaign?.name || ''),
        }]).select().single();
        if (!contact) { alert('Failed to create contact'); return; }
        // Create lead
        const { data: stages } = await supabase.from('pipeline_stages').select('id').eq('name', 'New Lead').single();
        const { data: lead } = await supabase.from('leads').insert([{
          contact_id: contact.id,
          stage_id: stages?.id,
          lead_type: 'seller',
          temperature: 'warm',
        }]).select().single();
        // Update prospect
        await supabase.from('prospects').update({
          status: 'converted',
          contact_id: contact.id,
          lead_id: lead?.id,
        }).eq('id', prospect.id);
        // Update campaign totals
        await supabase.from('prospect_campaigns').update({
          total_converted: (selectedCampaign.total_converted || 0) + 1
        }).eq('id', selectedCampaign.id);
        fetchProspects();
        alert('Converted! ' + (prospect.owner_name || 'Owner') + ' added to pipeline as seller lead.');
      };

      const generateOutreach = async (ids) => {
        const idArr = Array.isArray(ids) ? ids : [ids];
        if (!idArr.length) return;
        setGenerating(true);
        setGenProgress(`Generating drafts for ${idArr.length} prospect${idArr.length > 1 ? 's' : ''}...`);
        try {
          const res = await fetch(SUPABASE_URL + '/functions/v1/prospect-outreach', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'apikey': SUPABASE_ANON_KEY },
            body: JSON.stringify({ action: 'generate_batch', prospect_ids: idArr, campaign_id: selectedCampaign?.id })
          });
          const data = await res.json();
          if (data.success) {
            setGenProgress(`Done — ${data.generated} draft${data.generated !== 1 ? 's' : ''} created`);
            setSelectedProspects(new Set());
            fetchProspects();
            fetchOutreach();
            setTimeout(() => { setGenProgress(''); setGenerating(false); }, 3000);
          } else {
            setGenProgress('Error: ' + (data.error || 'Unknown'));
            setTimeout(() => { setGenProgress(''); setGenerating(false); }, 5000);
          }
        } catch (err) {
          setGenProgress('Error: ' + err.message);
          setTimeout(() => { setGenProgress(''); setGenerating(false); }, 5000);
        }
      };

      const regenerateOutreach = async (outreachId) => {
        try {
          const res = await fetch(SUPABASE_URL + '/functions/v1/prospect-outreach', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json', 'apikey': SUPABASE_ANON_KEY },
            body: JSON.stringify({ action: 'regenerate', outreach_id: outreachId })
          });
          const data = await res.json();
          if (data.success) fetchOutreach();
          else alert('Regenerate failed: ' + (data.error || 'Unknown'));
        } catch (err) { alert('Error: ' + err.message); }
      };

      const formatCurrency = (v) => v ? '$' + Number(v).toLocaleString() : '—';
      const formatDate = (d) => d ? new Date(d).toLocaleDateString() : '—';

      // ---- CAMPAIGNS LIST VIEW ----
      if (view === 'campaigns' && !selectedCampaign) {
        return (
          <div className="flex-1 overflow-y-auto p-6">
            <div className="flex items-center justify-between mb-6">
              <div>
                <h2 className="text-lg font-semibold" style={{color:'#7F1330'}}>Prospecting Agent</h2>
                <p className="text-secondary text-sm mt-1">Import property lists, generate valuations, and manage outreach campaigns</p>
              </div>
              <button onClick={startNewCampaign} className="btn-primary">+ New Campaign</button>
            </div>

            {showNewCampaign && (
              <div className="glass mb-6" style={{overflow:'hidden'}}>
                <div className="p-4 border-b border-[#F0D5CC] flex items-center justify-between">
                  <div>
                    <h3 className="font-medium">Campaign Builder</h3>
                    <p className="text-xs text-secondary mt-0.5">Tell me about this campaign and I'll build the outreach strategy</p>
                  </div>
                  <button onClick={() => { setShowNewCampaign(false); if (briefCampaignId && !briefComplete) supabase.from('prospect_campaigns').delete().eq('id', briefCampaignId); }} className="text-secondary hover:text-[#7F1330]"><IconClose /></button>
                </div>
                <div ref={briefChatRef} className="p-4 space-y-3" style={{maxHeight:'400px', overflowY:'auto', background:'#FFEEE3'}}>
                  {briefMessages.length === 0 && !briefLoading && (
                    <div className="text-center py-6">
                      <p className="text-secondary text-sm mb-1">Who is this campaign targeting?</p>
                      <p className="text-xs text-secondary">Example: "Failed listings in Lake County from the last 18 months" or "Absentee owners with high equity in Crown Point"</p>
                    </div>
                  )}
                  {briefMessages.map((m, i) => (
                    <div key={i} className={`flex ${m.role === 'user' ? 'justify-end' : 'justify-start'}`}>
                      <div className={`rounded-xl px-4 py-2.5 max-w-[85%] text-sm`} style={{
                        background: m.role === 'user' ? '#7F1330' : '#FFFFFF',
                        color: m.role === 'user' ? 'white' : '#2D2D2D',
                        border: m.role === 'assistant' ? '1px solid #F0D5CC' : 'none',
                      }}>
                        {m.content}
                      </div>
                    </div>
                  ))}
                  {briefLoading && (
                    <div className="flex justify-start">
                      <div className="rounded-xl px-4 py-2.5 bg-white border border-[#F0D5CC] text-sm text-secondary">Thinking...</div>
                    </div>
                  )}
                </div>
                {briefComplete && briefResult ? (
                  <div className="p-4 border-t border-[#F0D5CC]">
                    <div className="glass p-4 mb-3" style={{background:'#FFF5F0'}}>
                      <h4 className="font-medium text-sm mb-2" style={{color:'#7F1330'}}>{briefResult.campaign_name}</h4>
                      <div className="grid grid-cols-2 gap-3 text-xs">
                        <div><span className="font-medium">Target:</span> {briefResult.target_profile}</div>
                        <div><span className="font-medium">Tone:</span> {briefResult.tone}</div>
                        <div><span className="font-medium">Value Prop:</span> {briefResult.value_proposition}</div>
                        <div><span className="font-medium">Pain Points:</span> {(briefResult.pain_points || []).join(', ')}</div>
                      </div>
                      {briefResult.talking_points?.length > 0 && (
                        <div className="mt-2 text-xs"><span className="font-medium">Talking Points:</span> {briefResult.talking_points.join(' | ')}</div>
                      )}
                      {briefResult.avoid?.length > 0 && (
                        <div className="mt-1 text-xs text-secondary"><span className="font-medium">Avoid:</span> {briefResult.avoid.join(', ')}</div>
                      )}
                    </div>
                    <div className="flex gap-2">
                      <button onClick={finishCampaignSetup} className="btn-primary">Start Campaign &rarr;</button>
                      <button onClick={() => { setBriefComplete(false); setBriefResult(null); setBriefMessages([...briefMessages, {role:'user', content:'Let me adjust — '} ]); }} className="btn-secondary">Refine Brief</button>
                    </div>
                  </div>
                ) : (
                  <div className="p-3 border-t border-[#F0D5CC] flex gap-2">
                    <input className="input-glass flex-1" placeholder="Describe your campaign target..." value={briefInput} onChange={e => setBriefInput(e.target.value)} onKeyDown={e => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendBriefMessage(); } }} disabled={briefLoading} />
                    <button onClick={sendBriefMessage} disabled={briefLoading || !briefInput.trim()} className="btn-primary">{briefLoading ? '...' : 'Send'}</button>
                  </div>
                )}
              </div>
            )}

            {loading ? <p className="text-secondary">Loading...</p> : campaigns.length === 0 ? (
              <div className="glass p-12 text-center">
                <p className="text-secondary mb-2">No campaigns yet</p>
                <p className="text-secondary text-sm">Create a campaign, then import a PropStream CSV to get started.</p>
              </div>
            ) : (
              <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                {campaigns.map(c => (
                  <div key={c.id} onClick={() => { setSelectedCampaign(c); setView('cold'); }} className="glass-hover p-5 cursor-pointer">
                    <div className="flex items-start justify-between mb-3">
                      <div>
                        <h3 className="font-medium">{c.name}</h3>
                        {c.description && <p className="text-secondary text-xs mt-1">{c.description}</p>}
                      </div>
                      <div className="flex items-center gap-2">
                        {c.campaign_brief && Object.keys(c.campaign_brief).length > 0 && <span className="badge" style={{background:'#EEF2FF', color:'#4f46e5', fontSize:9}}>Brief</span>}
                        <span className="badge" style={{background: c.status === 'active' ? '#E8F9EE' : '#F5F5F5', color: c.status === 'active' ? '#22c55e' : '#999'}}>{c.status}</span>
                      </div>
                    </div>
                    <div className="flex gap-4 text-xs text-secondary">
                      <span>{c.total_imported || 0} imported</span>
                      <span>{c.total_outreach_sent || 0} sent</span>
                      <span>{c.total_replies || 0} replies</span>
                      <span style={{color:'#22c55e', fontWeight:500}}>{c.total_converted || 0} converted</span>
                    </div>
                    <div className="flex items-center justify-between mt-2">
                      <p className="text-xs text-secondary">{formatDate(c.created_at)}</p>
                      <button onClick={(e) => deleteCampaign(c.id, e)} className="text-xs text-secondary hover:text-[#B72552] transition" title="Delete campaign">&#x2715;</button>
                    </div>
                  </div>
                ))}
              </div>
            )}
          </div>
        );
      }

      // ---- CAMPAIGN DETAIL VIEW (queue / outbox / active) ----
      return (
        <div className="flex-1 overflow-hidden flex flex-col">
          {/* Campaign header */}
          <div className="px-6 pt-5 pb-3 border-b border-[#F0D5CC] bg-white">
            <div className="flex items-center gap-3 mb-3">
              <button onClick={() => { setSelectedCampaign(null); setView('campaigns'); }} className="text-secondary hover:text-[#7F1330] transition text-sm">&larr; All Campaigns</button>
              <h2 className="font-semibold" style={{color:'#7F1330'}}>{selectedCampaign?.name}</h2>
            </div>

            {/* Stats bar */}
            <div className="flex gap-5 mb-3 text-xs">
              <div className="text-center"><span className="block text-lg font-semibold">{stats.imported}</span><span className="text-secondary">Imported</span></div>
              <div className="text-center"><span className="block text-lg font-semibold">{stats.valued}</span><span className="text-secondary">Valued</span></div>
              <div className="text-center"><span className="block text-lg font-semibold">{stats.queued}</span><span className="text-secondary">Queued</span></div>
              <div className="text-center"><span className="block text-lg font-semibold">{stats.sent}</span><span className="text-secondary">Sent</span></div>
              <div className="text-center"><span className="block text-lg font-semibold" style={{color: stats.replied > 0 ? '#22c55e' : undefined}}>{stats.replied}</span><span className="text-secondary">Replied</span></div>
              <div className="text-center"><span className="block text-lg font-semibold" style={{color: stats.converted > 0 ? '#7F1330' : undefined}}>{stats.converted}</span><span className="text-secondary">Converted</span></div>
            </div>

            {/* View tabs */}
            <div className="flex gap-1">
              {[
                { id: 'cold', label: 'Cold' },
                { id: 'queue', label: 'Queue' },
                { id: 'sent', label: 'Sent' },
                { id: 'replied', label: 'Replied' },
              ].map(t => (
                <button key={t.id} onClick={() => setView(t.id)} className="px-4 py-2 text-xs font-medium transition-all" style={{ borderBottom: view === t.id ? '2px solid #7F1330' : '2px solid transparent', color: view === t.id ? '#7F1330' : '#7A5A5A' }}>
                  {t.label}
                </button>
              ))}
              <div className="flex-1" />
              <button onClick={() => setShowImport(true)} className="btn-primary text-xs">Import CSV</button>
            </div>
          </div>

          {/* Import modal */}
          {showImport && (
            <div style={{position:'fixed', inset:0, background:'rgba(0,0,0,0.3)', zIndex:2000, display:'flex', alignItems:'center', justifyContent:'center'}} onClick={() => setShowImport(false)}>
              <div className="glass p-6" style={{width:'700px', maxHeight:'80vh', overflow:'auto'}} onClick={e => e.stopPropagation()}>
                <h3 className="font-semibold mb-4">Import PropStream Data</h3>
                <input type="file" accept=".csv,.xls,.xlsx" onChange={handleFileSelect} className="mb-4 text-sm" />
                {importPreview && (
                  <div>
                    <p className="text-sm mb-3 text-secondary">{importPreview.rows.length} records found &middot; {Object.keys(importMapping).length} fields auto-mapped</p>
                    <div className="mb-4" style={{maxHeight:'300px', overflow:'auto'}}>
                      <table className="w-full text-xs">
                        <thead>
                          <tr className="border-b border-[#F0D5CC]">
                            <th className="text-left py-2 px-2 font-medium">Our Field</th>
                            <th className="text-left py-2 px-2 font-medium">CSV Column</th>
                            <th className="text-left py-2 px-2 font-medium">Sample</th>
                          </tr>
                        </thead>
                        <tbody>
                          {Object.entries(PROPSTREAM_FIELD_MAP).map(([dbField]) => (
                            <tr key={dbField} className="border-b border-[#F0D5CC]/50">
                              <td className="py-1.5 px-2 font-medium">{dbField.replace(/_/g, ' ')}</td>
                              <td className="py-1.5 px-2">
                                <select className="input-glass text-xs py-1 px-2" value={importMapping[dbField] || ''} onChange={e => setImportMapping({...importMapping, [dbField]: e.target.value})}>
                                  <option value="">— skip —</option>
                                  {importPreview.headers.map(h => <option key={h} value={h}>{h}</option>)}
                                </select>
                              </td>
                              <td className="py-1.5 px-2 text-secondary">{importMapping[dbField] ? (importPreview.rows[0]?.[importMapping[dbField]] || '').substring(0, 40) : ''}</td>
                            </tr>
                          ))}
                        </tbody>
                      </table>
                    </div>
                    <div className="flex gap-2">
                      <button onClick={runImport} disabled={importing} className="btn-primary">{importing ? 'Importing...' : 'Import ' + importPreview.rows.length + ' Records'}</button>
                      <button onClick={() => { setShowImport(false); setImportPreview(null); }} className="btn-secondary">Cancel</button>
                    </div>
                  </div>
                )}
              </div>
            </div>
          )}

          {/* Prospect detail slide panel */}
          <div className={`slide-panel ${detailProspect ? 'active' : ''}`} style={{width:'480px'}}>
            {detailProspect && (
              <div className="p-6">
                <div className="flex items-start justify-between mb-4">
                  <h3 className="font-semibold">{detailProspect.property_address}</h3>
                  <button onClick={() => setDetailProspect(null)}><IconClose /></button>
                </div>
                <p className="text-secondary text-sm mb-4">{detailProspect.property_city}, {detailProspect.property_state} {detailProspect.property_zip}</p>

                <div className="grid grid-cols-2 gap-3 mb-4">
                  <div className="glass p-3"><p className="text-xs text-secondary">Est. Value</p><p className="font-semibold">{formatCurrency(detailProspect.estimated_value)}</p></div>
                  <div className="glass p-3"><p className="text-xs text-secondary">Our Valuation</p><p className="font-semibold" style={{color:'#7F1330'}}>{formatCurrency(detailProspect.our_valuation)}</p></div>
                  <div className="glass p-3"><p className="text-xs text-secondary">Equity</p><p className="font-semibold">{formatCurrency(detailProspect.estimated_equity)} {detailProspect.equity_percent ? '(' + detailProspect.equity_percent + '%)' : ''}</p></div>
                  <div className="glass p-3"><p className="text-xs text-secondary">Mortgage</p><p className="font-semibold">{formatCurrency(detailProspect.mortgage_balance)}</p></div>
                </div>

                <div className="grid grid-cols-3 gap-3 mb-4 text-xs">
                  <div><span className="text-secondary">Beds:</span> {detailProspect.beds || '—'}</div>
                  <div><span className="text-secondary">Baths:</span> {detailProspect.baths || '—'}</div>
                  <div><span className="text-secondary">SqFt:</span> {detailProspect.sqft?.toLocaleString() || '—'}</div>
                  <div><span className="text-secondary">Built:</span> {detailProspect.year_built || '—'}</div>
                  <div><span className="text-secondary">Type:</span> {detailProspect.property_type || '—'}</div>
                  <div><span className="text-secondary">Yrs Owned:</span> {detailProspect.years_owned || '—'}</div>
                </div>

                <h4 className="font-medium text-sm mb-2 mt-4">Owner Info</h4>
                <div className="text-xs space-y-1.5 mb-4">
                  <p><span className="text-secondary">Name:</span> {detailProspect.owner_name || '—'}</p>
                  <p><span className="text-secondary">Phone:</span> {detailProspect.owner_phone || '—'}</p>
                  <p><span className="text-secondary">Email:</span> {detailProspect.owner_email || '—'}</p>
                  <p><span className="text-secondary">Mailing:</span> {[detailProspect.owner_mailing_address, detailProspect.owner_mailing_city, detailProspect.owner_mailing_state, detailProspect.owner_mailing_zip].filter(Boolean).join(', ') || '—'}</p>
                  <p><span className="text-secondary">Absentee:</span> {detailProspect.is_absentee ? 'Yes' : 'No'}</p>
                </div>

                <h4 className="font-medium text-sm mb-2">Signals</h4>
                <div className="flex flex-wrap gap-1.5 mb-4">
                  {detailProspect.is_absentee && <span className="badge badge-warm">Absentee</span>}
                  {detailProspect.is_pre_foreclosure && <span className="badge badge-hot">Pre-Foreclosure</span>}
                  {detailProspect.is_tax_lien && <span className="badge badge-hot">Tax Lien</span>}
                  {detailProspect.is_vacant && <span className="badge badge-warm">Vacant</span>}
                  {detailProspect.equity_percent > 50 && <span className="badge" style={{background:'#E8F9EE', color:'#16a34a'}}>High Equity</span>}
                  {detailProspect.years_owned > 10 && <span className="badge" style={{background:'#EEF2FF', color:'#4f46e5'}}>Long-term Owner</span>}
                </div>

                <div className="flex gap-2 mt-4 flex-wrap">
                  {['imported', 'valued'].includes(detailProspect.status) && <button onClick={() => { markProspectStatus(detailProspect.id, 'queued'); setDetailProspect(null); }} disabled={generating} className="btn-primary text-xs">{generating ? 'Queuing...' : 'Queue'}</button>}
                  {['replied', 'in_conversation'].includes(detailProspect.status) && <button onClick={() => convertToLead(detailProspect)} className="btn-primary text-xs">Convert to Lead</button>}
                  <button onClick={(e) => generateAndDownloadBPO(detailProspect.id, e.target)} className="btn-secondary text-xs">Generate BPO</button>
                  <button onClick={() => { markProspectStatus(detailProspect.id, 'passed'); setDetailProspect(null); }} className="btn-secondary text-xs">Pass</button>
                </div>
              </div>
            )}
          </div>

          {/* Main content area */}
          <div className="flex-1 overflow-y-auto p-6">
            {/* Generation progress banner */}
            {generating && genProgress && (
              <div className="glass p-3 mb-4 flex items-center gap-3" style={{borderColor:'#7F1330'}}>
                <div className="ai-sparkle">&#x2728;</div>
                <span className="text-sm font-medium" style={{color:'#7F1330'}}>{genProgress}</span>
              </div>
            )}

            {/* COLD VIEW — imported prospects, not yet actioned */}
            {view === 'cold' && (
              <div>
                {selectedProspects.size > 0 && (
                  <div className="glass p-3 mb-4 flex items-center gap-3">
                    <span className="text-sm font-medium">{selectedProspects.size} selected</span>
                    <button onClick={() => markProspectStatus([...selectedProspects], 'queued')} disabled={generating} className="btn-primary text-xs" style={{background: generating ? '#ccc' : '#7F1330'}}>{generating ? 'Queuing...' : 'Queue Selected'}</button>
                    <button onClick={() => markProspectStatus([...selectedProspects], 'passed')} className="btn-secondary text-xs">Pass Selected</button>
                    <button onClick={() => setSelectedProspects(new Set())} className="btn-secondary text-xs">Clear</button>
                  </div>
                )}
                {prospects.length === 0 ? (
                  <div className="glass p-12 text-center">
                    <p className="text-secondary mb-2">No cold prospects</p>
                    <p className="text-secondary text-sm">Import a PropStream CSV to populate this campaign.</p>
                  </div>
                ) : (
                  <table className="w-full text-xs">
                    <thead>
                      <tr className="border-b border-[#F0D5CC] text-left">
                        <th className="py-2 px-2 w-8"><input type="checkbox" className="checkbox-glass" style={{width:14,height:14}} onChange={e => { if (e.target.checked) setSelectedProspects(new Set(prospects.map(p=>p.id))); else setSelectedProspects(new Set()); }} /></th>
                        <th className="py-2 px-2 font-medium">Address</th>
                        <th className="py-2 px-2 font-medium">Owner</th>
                        <th className="py-2 px-2 font-medium">Est. Value</th>
                        <th className="py-2 px-2 font-medium">Equity</th>
                        <th className="py-2 px-2 font-medium">Signals</th>
                        <th className="py-2 px-2 font-medium">Actions</th>
                      </tr>
                    </thead>
                    <tbody>
                      {prospects.map(p => (
                        <tr key={p.id} className="border-b border-[#F0D5CC]/30 hover:bg-[#FFF5F0] transition cursor-pointer" onClick={() => setDetailProspect(p)}>
                          <td className="py-2 px-2" onClick={e => e.stopPropagation()}>
                            <input type="checkbox" className="checkbox-glass" style={{width:14,height:14}} checked={selectedProspects.has(p.id)} onChange={e => { const s = new Set(selectedProspects); if (e.target.checked) s.add(p.id); else s.delete(p.id); setSelectedProspects(s); }} />
                          </td>
                          <td className="py-2 px-2">
                            <span className="font-medium">{p.property_address}</span>
                            <br /><span className="text-secondary">{p.property_city}, {p.property_state} {p.property_zip}</span>
                          </td>
                          <td className="py-2 px-2">{p.owner_name || '—'}<br /><span className="text-secondary">{p.owner_email || p.owner_phone || ''}</span></td>
                          <td className="py-2 px-2">{formatCurrency(p.estimated_value)}</td>
                          <td className="py-2 px-2">{formatCurrency(p.estimated_equity)}{p.equity_percent ? <span className="text-secondary ml-1">({p.equity_percent}%)</span> : ''}</td>
                          <td className="py-2 px-2">
                            <div className="flex flex-wrap gap-1">
                              {p.is_absentee && <span className="badge badge-warm" style={{fontSize:9, padding:'1px 6px'}}>Absentee</span>}
                              {p.is_pre_foreclosure && <span className="badge badge-hot" style={{fontSize:9, padding:'1px 6px'}}>Pre-FC</span>}
                              {p.is_vacant && <span className="badge badge-warm" style={{fontSize:9, padding:'1px 6px'}}>Vacant</span>}
                              {p.equity_percent > 50 && <span className="badge" style={{background:'#E8F9EE', color:'#16a34a', fontSize:9, padding:'1px 6px'}}>Hi Eq</span>}
                              {!p.owner_email && <span className="badge" style={{background:'#FFF5F0', color:'#B72552', fontSize:9, padding:'1px 6px'}}>No Email</span>}
                            </div>
                          </td>
                          <td className="py-2 px-2" onClick={e => e.stopPropagation()}>
                            <div className="flex gap-1">
                              <button onClick={() => markProspectStatus(p.id, 'queued')} disabled={generating} className="btn-primary" style={{fontSize:10,padding:'3px 8px'}}>{generating ? '...' : 'Queue'}</button>
                              <button onClick={() => markProspectStatus(p.id, 'passed')} className="btn-secondary" style={{fontSize:10,padding:'3px 8px'}}>Pass</button>
                            </div>
                          </td>
                        </tr>
                      ))}
                    </tbody>
                  </table>
                )}
              </div>
            )}

            {/* QUEUE VIEW — drafted outreach, review and send */}
            {view === 'queue' && (
              <div>
                {outreach.length === 0 && prospects.length === 0 ? (
                  <div className="glass p-12 text-center">
                    <p className="text-secondary mb-2">Queue is empty</p>
                    <p className="text-secondary text-sm">Move prospects from Cold to Queue — outreach emails will be drafted automatically.</p>
                  </div>
                ) : (
                  <div className="space-y-3">
                    {outreach.map(o => (
                      <div key={o.id} className="glass p-4">
                        <div className="flex items-start justify-between mb-2">
                          <div>
                            <p className="font-medium text-sm">{o.prospects?.property_address || 'Unknown'}, {o.prospects?.property_city}</p>
                            <p className="text-secondary text-xs">To: {o.prospects?.owner_name} &middot; {o.prospects?.owner_email || 'No email'}</p>
                          </div>
                          <div className="flex items-center gap-1">
                            {o.validated === true && <span className="badge" style={{background:'#E8F9EE', color:'#16a34a', fontSize:9}}>Verified</span>}
                            {o.validated === false && <span className="badge" style={{background:'#FFE5E8', color:'#B72552', fontSize:9}}>Needs Review</span>}
                            <span className="badge" style={{background: o.status==='draft'?'#FFEEE3':o.status==='approved'?'#E8F9EE':'#F5F5F5', color: o.status==='draft'?'#FE8982':o.status==='approved'?'#22c55e':'#999'}}>{o.status}</span>
                          </div>
                        </div>
                        {o.validated === false && o.validation_issues?.length > 0 && (
                          <div className="bg-[#FFE5E8] rounded-lg p-2.5 mb-2 text-xs" style={{color:'#B72552'}}>
                            <span className="font-medium">Data check flagged:</span> {o.validation_issues.join(' | ')}
                          </div>
                        )}
                        <div className="bg-[#FFF5F0] rounded-lg p-3 mb-3">
                          <p className="text-xs font-medium mb-1">Subject: {o.subject}</p>
                          <p className="text-xs text-secondary whitespace-pre-wrap mt-2">{o.body}</p>
                        </div>
                        {o.comps_provided?.length > 0 && (
                          <div className="mb-2">
                            <p className="text-xs text-secondary font-medium mb-1">Comps provided ({o.comps_provided.length}):</p>
                            <div className="flex flex-wrap gap-1">
                              {o.comps_provided.map((c, i) => (
                                <span key={i} className="badge" style={{fontSize:8, padding:'2px 6px', background:'#EEF2FF', color:'#4f46e5'}}>{c.address} — ${Number(c.sale_price).toLocaleString()}</span>
                              ))}
                            </div>
                          </div>
                        )}
                        <div className="flex items-center gap-2">
                          <p className="text-xs text-secondary flex-1">Est. Value: {formatCurrency(o.prospects?.our_valuation || o.prospects?.estimated_value)}</p>
                          <div className="flex gap-2">
                            {o.status === 'draft' && (
                              <>
                                <button onClick={() => sendOutreach(o)} className="btn-primary text-xs">Send</button>
                                <button onClick={(e) => generateAndDownloadBPO(o.prospect_id, e.target)} className="btn-secondary text-xs">Generate BPO</button>
                                <button onClick={() => regenerateOutreach(o.id)} className="btn-secondary text-xs">Regenerate</button>
                                <button onClick={() => rejectOutreach(o.id)} className="btn-secondary text-xs">Discard</button>
                              </>
                            )}
                            {o.status === 'approved' && (
                              <button onClick={() => sendOutreach(o)} className="btn-primary text-xs">Send Now</button>
                            )}
                          </div>
                        </div>
                      </div>
                    ))}
                  </div>
                )}
              </div>
            )}

            {/* SENT VIEW — emails that have been sent */}
            {view === 'sent' && (
              <div>
                {outreach.length === 0 ? (
                  <div className="glass p-12 text-center">
                    <p className="text-secondary mb-2">No sent outreach yet</p>
                    <p className="text-secondary text-sm">Approved and sent emails will appear here.</p>
                  </div>
                ) : (
                  <div className="space-y-3">
                    {outreach.map(o => (
                      <div key={o.id} className="glass p-4">
                        <div className="flex items-start justify-between mb-2">
                          <div>
                            <p className="font-medium text-sm">{o.prospects?.property_address || 'Unknown'}, {o.prospects?.property_city}</p>
                            <p className="text-secondary text-xs">To: {o.prospects?.owner_name} &middot; {o.prospects?.owner_email || ''}</p>
                          </div>
                          <div className="flex items-center gap-2">
                            <span className="badge" style={{background: o.status==='opened'?'#EEF2FF':'#FFF5F0', color: o.status==='opened'?'#4f46e5':'#7A5A5A'}}>{o.status}</span>
                            {o.sent_at && <span className="text-xs text-secondary">{formatDate(o.sent_at)}</span>}
                          </div>
                        </div>
                        <div className="bg-[#FFF5F0] rounded-lg p-3">
                          <p className="text-xs font-medium mb-1">{o.subject}</p>
                          <p className="text-xs text-secondary whitespace-pre-wrap mt-1">{(o.body || '').substring(0, 200)}{o.body?.length > 200 ? '...' : ''}</p>
                        </div>
                      </div>
                    ))}
                  </div>
                )}
              </div>
            )}

            {/* REPLIED VIEW — prospects who responded */}
            {view === 'replied' && (
              <div>
                {outreach.length === 0 ? (
                  <div className="glass p-12 text-center">
                    <p className="text-secondary mb-2">No replies yet</p>
                    <p className="text-secondary text-sm">When prospects reply to your outreach, conversations will show here.</p>
                  </div>
                ) : (
                  <div className="space-y-3">
                    {outreach.map(o => (
                      <div key={o.id} className="glass p-4">
                        <div className="flex items-start justify-between mb-2">
                          <div>
                            <p className="font-medium text-sm">{o.prospects?.property_address || 'Unknown'}, {o.prospects?.property_city}</p>
                            <p className="text-secondary text-xs">{o.prospects?.owner_name} &middot; {o.prospects?.owner_email || ''}</p>
                          </div>
                          <div className="flex items-center gap-2">
                            {o.reply_sentiment && <span className="badge" style={{background: o.reply_sentiment==='positive'?'#E8F9EE':o.reply_sentiment==='negative'?'#FFE5E8':'#F5F5F5', color: o.reply_sentiment==='positive'?'#22c55e':o.reply_sentiment==='negative'?'#B72552':'#7A5A5A'}}>{o.reply_sentiment}</span>}
                            {o.replied_at && <span className="text-xs text-secondary">{formatDate(o.replied_at)}</span>}
                          </div>
                        </div>
                        <div className="bg-[#FFF5F0] rounded-lg p-3 mb-2">
                          <p className="text-xs font-medium mb-1">Your email: {o.subject}</p>
                          <p className="text-xs text-secondary whitespace-pre-wrap mt-1">{(o.body || '').substring(0, 150)}{o.body?.length > 150 ? '...' : ''}</p>
                        </div>
                        {o.reply_body && (
                          <div className="bg-[#E8F9EE] rounded-lg p-3 mb-2">
                            <p className="text-xs font-medium mb-1">Their reply:</p>
                            <p className="text-xs whitespace-pre-wrap">{o.reply_body}</p>
                          </div>
                        )}
                        <div className="flex gap-2 mt-2">
                          <button onClick={() => { const pr = prospects.find(p => p.id === o.prospect_id); if (pr) convertToLead(pr); }} className="btn-primary text-xs">Convert to Lead</button>
                        </div>
                      </div>
                    ))}
                  </div>
                )}
              </div>
            )}

          </div>
        </div>
      );
    }

    // ============================================================
    // COMPS MODULE (standalone sidebar item)
    // ============================================================
    function CompsModule() {
      const [comps, setComps] = useState([]);
      const [loading, setLoading] = useState(true);
      const [stats, setStats] = useState({ total: 0, cities: {} });
      const [showImport, setShowImport] = useState(false);
      const [importFile, setImportFile] = useState(null);
      const [importPreview, setImportPreview] = useState(null);
      const [importMapping, setImportMapping] = useState({});
      const [importing, setImporting] = useState(false);
      // Filters
      const [cityFilter, setCityFilter] = useState('');
      const [searchText, setSearchText] = useState('');
      const [priceMin, setPriceMin] = useState('');
      const [priceMax, setPriceMax] = useState('');
      const [dateFrom, setDateFrom] = useState('');
      const [dateTo, setDateTo] = useState('');
      const [bedsFilter, setBedsFilter] = useState('');
      const [propTypeFilter, setPropTypeFilter] = useState('');
      const [zipFilter, setZipFilter] = useState('');
      // Sort
      const [sortCol, setSortCol] = useState('sale_date');
      const [sortAsc, setSortAsc] = useState(false);
      // Pagination
      const [page, setPage] = useState(0);
      const PAGE_SIZE = 100;
      const [totalFiltered, setTotalFiltered] = useState(0);
      const [showFilters, setShowFilters] = useState(false);
      const [selectedComp, setSelectedComp] = useState(null);

      const COMP_FIELD_MAP = {
        'address': ['Address', 'Property Address', 'Site Address', 'Street Address', 'Prop Address'],
        'city': ['City', 'Property City', 'Site City'],
        'state': ['State', 'Property State'],
        'zip': ['Zip', 'Zip Code', 'Property Zip'],
        'property_type': ['Property Type', 'Type', 'Prop Type'],
        'beds': ['Beds', 'Bedrooms', 'BR', 'Bed'],
        'baths': ['Baths', 'Bathrooms', 'BA', 'Bath', 'Total Bathrooms'],
        'sqft': ['SqFt', 'Sq Ft', 'Square Feet', 'Living Area', 'Building Sqft', 'Building Sq Ft'],
        'lot_size_sqft': ['Lot Size', 'Lot SqFt', 'Lot Size Sqft', 'Lot Sq Ft'],
        'year_built': ['Year Built', 'Yr Built', 'Effective Year Built'],
        'sale_price': ['Sale Price', 'Sold Price', 'Close Price', 'Last Sale Amount', 'Last Sale Price', 'Closed Price'],
        'sale_date': ['Sale Date', 'Sold Date', 'Close Date', 'Last Sale Date', 'Last Sale Recording Date', 'Closed Date'],
        'list_price': ['List Price', 'Original List Price', 'Listing Price'],
        'days_on_market': ['DOM', 'Days on Market', 'Days On Market', 'CDOM'],
        'latitude': ['Latitude', 'Lat'],
        'longitude': ['Longitude', 'Lng', 'Long'],
      };

      const autoMapFields = (headers) => {
        const mapping = {};
        Object.entries(COMP_FIELD_MAP).forEach(([dbField, aliases]) => {
          const match = headers.find(h => aliases.some(a => a.toLowerCase() === h.toLowerCase().trim()));
          if (match) mapping[dbField] = match;
        });
        return mapping;
      };

      const parseCSVLocal = (text) => {
        const lines = text.split('\n').filter(l => l.trim());
        if (lines.length < 2) return null;
        const headers = lines[0].split(',').map(h => h.replace(/^"|"$/g, '').trim());
        const rows = [];
        for (let i = 1; i < lines.length; i++) {
          const values = []; let current = ''; let inQuotes = false;
          for (const char of lines[i]) { if (char === '"') inQuotes = !inQuotes; else if (char === ',' && !inQuotes) { values.push(current.trim()); current = ''; } else current += char; }
          values.push(current.trim());
          if (values.length >= headers.length - 2) { const row = {}; headers.forEach((h, idx) => { row[h] = values[idx] || ''; }); rows.push(row); }
        }
        return { headers, rows };
      };

      const parseExcelLocal = (data) => {
        try {
          const wb = XLSX.read(data, { type: 'array', cellDates: true });
          const sheet = wb.Sheets[wb.SheetNames[0]];
          const json = XLSX.utils.sheet_to_json(sheet, { defval: '' });
          if (!json.length) return null;
          const headers = Object.keys(json[0]);
          const rows = json.map(row => { const clean = {}; headers.forEach(h => { clean[h] = row[h] !== null && row[h] !== undefined ? String(row[h]) : ''; }); return clean; });
          return { headers, rows };
        } catch (err) { return null; }
      };

      const buildQuery = (countOnly) => {
        let query = countOnly
          ? supabase.from('sold_comps').select('id', { count: 'exact', head: true })
          : supabase.from('sold_comps').select('*');
        if (cityFilter) query = query.ilike('city', cityFilter);
        if (zipFilter) query = query.eq('zip', zipFilter);
        if (searchText) query = query.ilike('address', '%' + searchText + '%');
        if (priceMin) query = query.gte('sale_price', parseFloat(priceMin));
        if (priceMax) query = query.lte('sale_price', parseFloat(priceMax));
        if (dateFrom) query = query.gte('sale_date', dateFrom);
        if (dateTo) query = query.lte('sale_date', dateTo);
        if (bedsFilter) query = query.eq('beds', parseInt(bedsFilter));
        if (propTypeFilter) query = query.ilike('property_type', propTypeFilter);
        return query;
      };

      const fetchComps = async () => {
        setLoading(true);
        const countQ = buildQuery(true);
        const { count } = await countQ;
        setTotalFiltered(count || 0);
        let query = buildQuery(false);
        query = query.order(sortCol, { ascending: sortAsc }).range(page * PAGE_SIZE, (page + 1) * PAGE_SIZE - 1);
        const { data } = await query;
        setComps(data || []);
        // Stats via server-side view (handles 30K+ records)
        const { data: cityStats } = await supabase.from('sold_comps_city_stats').select('city, comp_count');
        if (cityStats) {
          const cities = {};
          let total = 0;
          cityStats.forEach(r => { cities[r.city] = r.comp_count; total += r.comp_count; });
          setStats({ total, cities });
        }
        setLoading(false);
      };

      useEffect(() => { setPage(0); }, [cityFilter, searchText, priceMin, priceMax, dateFrom, dateTo, bedsFilter, propTypeFilter, sortCol, sortAsc]);
      useEffect(() => { fetchComps(); }, [cityFilter, searchText, priceMin, priceMax, dateFrom, dateTo, bedsFilter, propTypeFilter, sortCol, sortAsc, page]);

      const handleSort = (col) => {
        if (sortCol === col) setSortAsc(!sortAsc);
        else { setSortCol(col); setSortAsc(col === 'address' || col === 'city'); }
      };

      const SortIcon = ({ col }) => {
        if (sortCol !== col) return <span className="text-secondary ml-1" style={{fontSize:9}}>&#x25B4;&#x25BE;</span>;
        return <span className="ml-1" style={{fontSize:9, color:'#7F1330'}}>{sortAsc ? '&#x25B4;' : '&#x25BE;'}</span>;
      };

      const clearFilters = () => { setCityFilter(''); setSearchText(''); setPriceMin(''); setPriceMax(''); setDateFrom(''); setDateTo(''); setBedsFilter(''); setPropTypeFilter(''); setZipFilter(''); };
      const hasFilters = cityFilter || searchText || priceMin || priceMax || dateFrom || dateTo || bedsFilter || propTypeFilter || zipFilter;

      const handleFileSelect = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        setImportFile(file);
        const ext = file.name.split('.').pop().toLowerCase();
        const reader = new FileReader();
        if (ext === 'csv') {
          reader.onload = (ev) => { const parsed = parseCSVLocal(ev.target.result); if (parsed) { setImportPreview(parsed); setImportMapping(autoMapFields(parsed.headers)); } };
          reader.readAsText(file);
        } else {
          reader.onload = (ev) => { const parsed = parseExcelLocal(ev.target.result); if (parsed) { setImportPreview(parsed); setImportMapping(autoMapFields(parsed.headers)); } };
          reader.readAsArrayBuffer(file);
        }
      };

      const runImport = async () => {
        if (!importPreview) return;
        setImporting(true);
        const batchName = importFile?.name || 'import-' + new Date().toISOString().split('T')[0];
        const records = importPreview.rows.map(row => {
          const rec = { raw_import: row, import_batch: batchName, source: 'mls_export' };
          Object.entries(importMapping).forEach(([dbField, csvCol]) => {
            let val = row[csvCol]; if (!val || val === '') return;
            if (['beds', 'sqft', 'lot_size_sqft', 'year_built', 'days_on_market'].includes(dbField)) val = parseInt(val) || null;
            else if (['baths', 'sale_price', 'list_price', 'latitude', 'longitude'].includes(dbField)) val = parseFloat(String(val).replace(/[$,%]/g, '')) || null;
            else if (dbField === 'sale_date') { const d = new Date(val); val = isNaN(d) ? null : d.toISOString().split('T')[0]; }
            if (val !== null && val !== undefined) rec[dbField] = val;
          });
          return rec;
        }).filter(r => r.address && r.sale_price && r.sale_date);
        let inserted = 0;
        for (let i = 0; i < records.length; i += 100) {
          const chunk = records.slice(i, i + 100);
          const { error } = await supabase.from('sold_comps').upsert(chunk, { onConflict: 'address,city,sale_date,sale_price', ignoreDuplicates: true });
          if (!error) inserted += chunk.length;
        }
        setImporting(false); setShowImport(false); setImportFile(null); setImportPreview(null); setImportMapping({});
        fetchComps();
        alert('Imported ' + inserted + ' comps');
      };

      const fmt = (v) => v ? '$' + Number(v).toLocaleString() : '—';
      const totalPages = Math.ceil(totalFiltered / PAGE_SIZE);

      return (
        <div className="flex-1 overflow-y-auto p-6">
          <div className="flex items-center justify-between mb-4">
            <div>
              <h2 className="text-lg font-semibold" style={{color:'#7F1330'}}>Sold Comps</h2>
              <p className="text-secondary text-sm mt-1">{stats.total.toLocaleString()} total &middot; {totalFiltered.toLocaleString()} shown</p>
            </div>
            <div className="flex gap-2">
              <button onClick={() => setShowFilters(!showFilters)} className="btn-secondary text-xs">{showFilters ? 'Hide Filters' : 'Filters'}{hasFilters ? ' *' : ''}</button>
              <button onClick={() => setShowImport(true)} className="btn-primary text-xs">Upload Comps</button>
            </div>
          </div>

          {/* Search bar */}
          <div className="flex gap-2 mb-3">
            <input className="input-glass flex-1" placeholder="Search address..." value={searchText} onChange={e => setSearchText(e.target.value)} />
            <select className="input-glass" style={{width:160}} value={cityFilter} onChange={e => setCityFilter(e.target.value)}>
              <option value="">All Cities</option>
              {Object.entries(stats.cities).sort((a,b) => b[1]-a[1]).map(([city, count]) => (
                <option key={city} value={city}>{city} ({count})</option>
              ))}
            </select>
          </div>

          {/* Advanced filters */}
          {showFilters && (
            <div className="glass p-4 mb-3">
              <div className="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-3 text-xs">
                <div>
                  <label className="text-secondary mb-1 block">Price Min</label>
                  <input className="input-glass w-full" type="number" placeholder="$0" value={priceMin} onChange={e => setPriceMin(e.target.value)} />
                </div>
                <div>
                  <label className="text-secondary mb-1 block">Price Max</label>
                  <input className="input-glass w-full" type="number" placeholder="No max" value={priceMax} onChange={e => setPriceMax(e.target.value)} />
                </div>
                <div>
                  <label className="text-secondary mb-1 block">Sale Date From</label>
                  <input className="input-glass w-full" type="date" value={dateFrom} onChange={e => setDateFrom(e.target.value)} />
                </div>
                <div>
                  <label className="text-secondary mb-1 block">Sale Date To</label>
                  <input className="input-glass w-full" type="date" value={dateTo} onChange={e => setDateTo(e.target.value)} />
                </div>
                <div>
                  <label className="text-secondary mb-1 block">Beds</label>
                  <select className="input-glass w-full" value={bedsFilter} onChange={e => setBedsFilter(e.target.value)}>
                    <option value="">Any</option>
                    {[1,2,3,4,5,6].map(b => <option key={b} value={b}>{b}+</option>)}
                  </select>
                </div>
                <div>
                  <label className="text-secondary mb-1 block">Zip</label>
                  <input className="input-glass w-full" placeholder="46307" value={zipFilter} onChange={e => setZipFilter(e.target.value)} />
                </div>
              </div>
              {hasFilters && <button onClick={clearFilters} className="btn-secondary text-xs mt-3">Clear All Filters</button>}
            </div>
          )}

          {/* Import modal */}
          {showImport && (
            <div style={{position:'fixed', inset:0, background:'rgba(0,0,0,0.3)', zIndex:2000, display:'flex', alignItems:'center', justifyContent:'center'}} onClick={() => setShowImport(false)}>
              <div className="glass p-6" style={{width:'700px', maxHeight:'80vh', overflow:'auto'}} onClick={e => e.stopPropagation()}>
                <h3 className="font-semibold mb-2">Upload Sold Comps</h3>
                <p className="text-xs text-secondary mb-4">Upload MLS sold data — CSV, XLS, or XLSX. Duplicates are automatically skipped.</p>
                <input type="file" accept=".csv,.xls,.xlsx" onChange={handleFileSelect} className="mb-4 text-sm" />
                {importPreview && (
                  <div>
                    <p className="text-sm mb-3 text-secondary">{importPreview.rows.length} records &middot; {Object.keys(importMapping).length} auto-mapped</p>
                    <div className="mb-4" style={{maxHeight:'300px', overflow:'auto'}}>
                      <table className="w-full text-xs">
