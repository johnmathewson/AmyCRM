      ['boldtrail', 'bt_listings', 1],
      ['boldtrail', 'bt_leads', 1],
      ['boldtrail', 'bt_activity', 1],
      ['boldtrail', 'bt_contacts', 1],
      ['supabase', 'sb_db', 1],
      ['supabase', 'sb_auth', 1],
      ['supabase', 'sb_edge', 1],
      ['supabase', 'sb_realtime', 1],
      ['supabase', 'netlify', 1],

      // Communication
      ['comms_layer', 'email_out', 1],
      ['comms_layer', 'sms_out', 1],
      ['comms_layer', 'comms_log', 1],

      // Market intelligence
      ['market', 'mkt_inventory', 1],
      ['market', 'mkt_dom', 1],
      ['market', 'mkt_price', 1],

      // Cross-branch connections (the magic)
      ['auto_lead', 'crm_pipeline', 1.2],
      ['bt_leads', 'crm_pipeline', 1],
      ['bt_listings', 'portal_matches', 1],
      ['bt_listings', 'ai_match', 1],
      ['bt_listings', 'market', 1],
      ['ai_draft', 'comms_layer', 1.2],
      ['ai_draft', 'portal_comms', 1],
      ['comms_layer', 'portal_comms', 1],
      ['match_save', 'crm_pipeline', 0.8],
      ['sb_auth', 'portal_auth', 1],
      ['sb_auth', 'auto_account', 1],
    ];

    // ─── RENDERING ───
    const svg = document.getElementById('canvas');
    const ns = 'http://www.w3.org/2000/svg';
    let scale = 0.72;
    let panX = window.innerWidth / 2;
    let panY = window.innerHeight / 2;
    let isDragging = false;
    let dragStartX, dragStartY;

    const g = document.createElementNS(ns, 'g');
    svg.appendChild(g);

    function updateTransform() {
      g.setAttribute('transform', `translate(${panX},${panY}) scale(${scale})`);
    }

    // Draw connections
    const nodeMap = {};
    nodes.forEach(n => nodeMap[n.id] = n);

    connections.forEach(([fromId, toId, width]) => {
      const from = nodeMap[fromId];
      const to = nodeMap[toId];
      if (!from || !to) return;

      const line = document.createElementNS(ns, 'line');
      line.setAttribute('x1', from.x);
      line.setAttribute('y1', from.y);
      line.setAttribute('x2', to.x);
      line.setAttribute('y2', to.y);

      // Cross-branch connections get dashed style
      const fromBranch = from.color;
      const toBranch = to.color;
      const isCross = fromBranch !== toBranch && !['core'].includes(fromId);

      line.setAttribute('stroke', isCross ? '#BFADA8' : '#D1CBC6');
      line.setAttribute('stroke-width', width || 1);
      line.setAttribute('stroke-opacity', isCross ? 0.5 : 0.35);
      if (isCross) line.setAttribute('stroke-dasharray', '6,4');

      g.appendChild(line);
    });

    // Draw nodes
    nodes.forEach(node => {
      const group = document.createElementNS(ns, 'g');
      group.setAttribute('transform', `translate(${node.x},${node.y})`);
      group.style.cursor = 'default';

      // Ring effect for center node
      if (node.ring) {
        const ring = document.createElementNS(ns, 'circle');
        ring.setAttribute('r', node.r + 6);
        ring.setAttribute('fill', 'none');
        ring.setAttribute('stroke', node.color);
        ring.setAttribute('stroke-width', '2');
        ring.setAttribute('stroke-opacity', '0.25');
        group.appendChild(ring);
      }

      // Circle
      const circle = document.createElementNS(ns, 'circle');
      circle.setAttribute('r', node.r);
      circle.setAttribute('fill', node.color);
      group.appendChild(circle);

      // Text (multi-line support)
      const lines = node.label.split('\n');
      lines.forEach((line, i) => {
        const text = document.createElementNS(ns, 'text');
        text.setAttribute('text-anchor', 'middle');
        text.setAttribute('dominant-baseline', 'central');
        text.setAttribute('fill', node.textColor);
        text.setAttribute('font-family', 'Inter, sans-serif');
        text.setAttribute('font-size', node.fontSize);
        text.setAttribute('font-weight', node.fontWeight);
        const offset = (i - (lines.length - 1) / 2) * (node.fontSize + 2);
        text.setAttribute('dy', offset);
        text.textContent = line;
        group.appendChild(text);
      });

      g.appendChild(group);
    });

    updateTransform();

    // ─── PAN & ZOOM ───
    svg.addEventListener('mousedown', e => {
      isDragging = true;
      dragStartX = e.clientX - panX;
      dragStartY = e.clientY - panY;
      document.body.classList.add('dragging');
    });
    window.addEventListener('mousemove', e => {
      if (!isDragging) return;
      panX = e.clientX - dragStartX;
      panY = e.clientY - dragStartY;
      updateTransform();
    });
    window.addEventListener('mouseup', () => {
      isDragging = false;
      document.body.classList.remove('dragging');
    });
    svg.addEventListener('wheel', e => {
      e.preventDefault();
      const delta = e.deltaY > 0 ? 0.92 : 1.08;
      scale = Math.min(3, Math.max(0.2, scale * delta));
      updateTransform();
    }, { passive: false });

    document.getElementById('zoomIn').onclick = () => { scale = Math.min(3, scale * 1.2); updateTransform(); };
    document.getElementById('zoomOut').onclick = () => { scale = Math.max(0.2, scale * 0.8); updateTransform(); };
    document.getElementById('zoomReset').onclick = () => { scale = 0.72; panX = window.innerWidth/2; panY = window.innerHeight/2; updateTransform(); };
  </script>
</body>
</html>
